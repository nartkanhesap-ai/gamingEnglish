<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelime Ava - İngilizce Oyunu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .title {
      font-family: 'Fredoka', sans-serif;
      font-size: 32px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .score-box {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .stat {
      text-align: center;
      background: rgba(255, 255, 255, 0.2);
      padding: 10px 16px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      margin-top: 4px;
    }

    .difficulty-selector {
      display: flex;
      gap: 8px;
    }

    .diff-btn {
      padding: 8px 16px;
      border: 2px solid white;
      background: transparent;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .diff-btn.active {
      background: white;
      color: #667eea;
    }

    .diff-btn:hover:not(.active) {
      background: rgba(255, 255, 255, 0.1);
    }

    .game-area {
      padding: 40px 30px;
    }

    .word-display {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .instruction {
      color: #999;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      font-weight: 500;
    }

    .word-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 16px;
      font-size: 48px;
      font-weight: 700;
      font-family: 'Fredoka', sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      margin-bottom: 20px;
      animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes popIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .sound-btn {
      background: white;
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .sound-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .sound-btn:active {
      transform: scale(0.95);
    }

    .images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .image-card {
      position: relative;
      cursor: grab;
      animation: slideInUp 0.5s ease-out;
      animation-fill-mode: both;
    }

    .image-card:nth-child(1) { animation-delay: 0.1s; }
    .image-card:nth-child(2) { animation-delay: 0.2s; }
    .image-card:nth-child(3) { animation-delay: 0.3s; }
    .image-card:nth-child(4) { animation-delay: 0.4s; }
    .image-card:nth-child(5) { animation-delay: 0.5s; }
    .image-card:nth-child(6) { animation-delay: 0.6s; }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .image-card.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .image-card.correct {
      animation: correctPulse 0.6s ease-out;
    }

    @keyframes correctPulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.15);
      }
      100% {
        transform: scale(1);
      }
    }

    .image-card.wrong {
      animation: wrongShake 0.4s ease-out;
    }

    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .image-wrapper {
      width: 100%;
      aspect-ratio: 1;
      background: #f5f5f5;
      border: 3px solid #e0e0e0;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .image-card:hover .image-wrapper {
      border-color: #667eea;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
      transform: translateY(-3px);
    }

    .image-card.selected .image-wrapper {
      border-color: #667eea;
      background: #f0f4ff;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }

    .label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.7) 60%, transparent);
      color: white;
      padding: 16px 8px 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      opacity: 0;
      transition: all 0.3s;
      letter-spacing: 0.5px;
      text-transform: capitalize;
      display: none;
    }

    .image-card:hover .label {
      opacity: 0;
      padding-bottom: 16px;
      display: none;
    }

    .drop-zone {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border: 3px dashed #667eea;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      margin-bottom: 30px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .drop-zone.active {
      background: linear-gradient(135deg, #e0f0ff 0%, #b8d4ff 100%);
      border-color: #667eea;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
    }

    .drop-text {
      color: #999;
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .drop-content {
      font-size: 60px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .button-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
    }

    .btn-secondary:hover {
      background: #f5f7fa;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 1000;
    }

    .modal.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      background: white;
      padding: 40px;
      border-radius: 24px;
      text-align: center;
      max-width: 400px;
      animation: bounceIn 0.5s ease-out;
    }

    @keyframes bounceIn {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-icon {
      font-size: 80px;
      margin-bottom: 20px;
      display: block;
    }

    .modal-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #667eea;
    }

    .modal-text {
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .feedback-text {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 30px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      transition: width 0.3s;
    }

    .level-badge {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    @media (max-width: 768px) {
      .images-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .word-card {
        font-size: 36px;
      }

      .title {
        font-size: 24px;
      }

      .header {
        padding: 20px;
      }

      .game-area {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">🎮 Kelime Ava</div>
      <div class="score-box">
        <div class="stat">
          <div class="stat-label">Skor</div>
          <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Doğru</div>
          <div class="stat-value" id="correct">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Yanlış</div>
          <div class="stat-value" id="wrong">0</div>
        </div>
        <div class="difficulty-selector">
          <button class="diff-btn active" onclick="setDifficulty('easy')">Easy</button>
          <button class="diff-btn" onclick="setDifficulty('medium')">Med</button>
          <button class="diff-btn" onclick="setDifficulty('hard')">Hard</button>
        </div>
      </div>
    </div>

    <div class="game-area">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>

      <div class="word-display">
        <div class="instruction">Dinle ve doğru resmi bul</div>
        <div class="word-card" id="wordCard">APPLE</div>
        <button class="sound-btn" onclick="playSound()" title="Dinle">🔊</button>
      </div>

      <div class="images-grid" id="imagesGrid">
        <!-- İmajlar buraya gelecek -->
      </div>

      <div class="drop-zone" id="dropZone">
        <div>
          <div class="drop-text">Veya resmi buraya sürükle</div>
          <div class="drop-content" id="dropContent">⬇️</div>
        </div>
      </div>

      <div class="button-group">
        <button class="btn-secondary" onclick="skipWord()">Atla</button>
        <button class="btn-secondary" onclick="resetGame()">Sıfırla</button>
      </div>
    </div>
  </div>

  <div class="modal" id="resultModal">
    <div class="modal-content">
      <span class="modal-icon" id="resultIcon">✅</span>
      <div class="modal-title" id="resultTitle">Harika!</div>
      <div class="modal-text" id="resultText">Doğru cevap!</div>
      <div class="feedback-text">+<span id="pointsEarned">10</span> Puan</div>
      <button class="btn-primary" onclick="nextWord()" style="width: 100%;">Sonraki Kelime</button>
    </div>
  </div>

  <script>
    // Veri
    const wordDatabase = {
      easy: [
        { word: 'APPLE', image: '🍎', label: 'Apple' },
        { word: 'BANANA', image: '🍌', label: 'Banana' },
        { word: 'CAT', image: '🐱', label: 'Cat' },
        { word: 'DOG', image: '🐕', label: 'Dog' },
        { word: 'HOUSE', image: '🏠', label: 'House' },
      ],
      medium: [
        { word: 'BUTTERFLY', image: '🦋', label: 'Butterfly' },
        { word: 'ELEPHANT', image: '🐘', label: 'Elephant' },
        { word: 'GUITAR', image: '🎸', label: 'Guitar' },
        { word: 'ICECREAM', image: '🍦', label: 'Ice Cream' },
        { word: 'JELLYFISH', image: '🪼', label: 'Jellyfish' },
      ],
      hard: [
        { word: 'CONSTELLATION', image: '⭐', label: 'Constellation' },
        { word: 'PHILOSOPHER', image: '🧑‍🎓', label: 'Philosopher' },
        { word: 'UNIVERSE', image: '🌌', label: 'Universe' },
        { word: 'ADVENTURE', image: '🏔️', label: 'Adventure' },
        { word: 'TSUNAMI', image: '🌊', label: 'Tsunami' },
      ]
    };

    let gameState = {
      difficulty: 'easy',
      currentWordIndex: 0,
      score: 0,
      correct: 0,
      wrong: 0,
      selectedImage: null,
      wordList: [],
      isAnswered: false
    };

    // Başlat
    function init() {
      gameState.wordList = [...wordDatabase.easy];
      gameState.currentWordIndex = 0;
      gameState.score = 0;
      gameState.correct = 0;
      gameState.wrong = 0;
      loadWord();
    }

    function setDifficulty(level) {
      document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      gameState.difficulty = level;
      gameState.wordList = [...wordDatabase[level]];
      gameState.currentWordIndex = 0;
      gameState.score = 0;
      gameState.correct = 0;
      gameState.wrong = 0;
      updateUI();
      loadWord();
    }

    function loadWord() {
      if (gameState.currentWordIndex >= gameState.wordList.length) {
        showCompletion();
        return;
      }

      const word = gameState.wordList[gameState.currentWordIndex];
      document.getElementById('wordCard').textContent = word.word;
      gameState.selectedImage = null;
      gameState.isAnswered = false;

      // İmajları karıştır
      let options = [word, ...getRandomOptions(4)];
      options = options.sort(() => Math.random() - 0.5);

      const grid = document.getElementById('imagesGrid');
      grid.innerHTML = options.map((item, idx) => `
        <div class="image-card" draggable="true" data-word="${item.word}" data-index="${idx}" onclick="selectImage(this)">
          <div class="image-wrapper">
            <span>${item.image}</span>
            <div class="label">${item.label}</div>
          </div>
        </div>
      `).join('');

      // Drag and drop
      document.querySelectorAll('.image-card').forEach(card => {
        card.addEventListener('dragstart', dragStart);
        card.addEventListener('dragend', dragEnd);
      });

      updateProgress();
    }

    function getRandomOptions(count) {
      let options = [];
      const currentWord = gameState.wordList[gameState.currentWordIndex].word;
      const available = gameState.wordList.filter(w => w.word !== currentWord);
      for (let i = 0; i < count && available.length > 0; i++) {
        const idx = Math.floor(Math.random() * available.length);
        options.push(available[idx]);
        available.splice(idx, 1);
      }
      return options;
    }

    function selectImage(element) {
      if (gameState.isAnswered) return;

      document.querySelectorAll('.image-card').forEach(card => card.classList.remove('selected'));
      element.classList.add('selected');
      gameState.selectedImage = element.dataset.word;
    }

    function playSound() {
      const word = gameState.wordList[gameState.currentWordIndex].word;
      
      // Eski ses varsa durdur
      if (gameState.audioElement) {
        gameState.audioElement.pause();
        gameState.audioElement.currentTime = 0;
      }
      
      // Önce Web Speech API ile sprechSynthesis kullan (daha doğal)
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = 'en-US';
      utterance.rate = 0.85;
      utterance.pitch = 1.1;
      utterance.volume = 1;
      
      // Erkek sesini kullan (daha net ve profesyonel)
      const voices = window.speechSynthesis.getVoices();
      const englishVoice = voices.find(v => v.lang.includes('en-US') && v.name.includes('Google')) || 
                           voices.find(v => v.lang.includes('en')) || 
                           voices[0];
      if (englishVoice) {
        utterance.voice = englishVoice;
      }
      
      // Ses oynamaya çalış, başarısız olursa Google Translate'i kullan
      utterance.onerror = () => {
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word)}&tl=en&client=tw-ob`;
        gameState.audioElement = new Audio(url);
        gameState.audioElement.play().catch(err => console.log('Ses oynatılamadı:', err));
      };
      
      window.speechSynthesis.speak(utterance);
    }

    function submitAnswer() {
      if (gameState.isAnswered) return;

      const correctWord = gameState.wordList[gameState.currentWordIndex].word;
      const isCorrect = gameState.selectedImage === correctWord;

      gameState.isAnswered = true;

      if (isCorrect) {
        gameState.correct++;
        const points = gameState.difficulty === 'easy' ? 10 : gameState.difficulty === 'medium' ? 20 : 30;
        gameState.score += points;
        showResult(true, points);
        document.querySelector(`[data-word="${correctWord}"]`).classList.add('correct');
      } else {
        gameState.wrong++;
        showResult(false, 0);
        document.querySelector(`[data-word="${correctWord}"]`).classList.add('wrong');
        if (gameState.selectedImage) {
          document.querySelector(`[data-word="${gameState.selectedImage}"]`).classList.add('wrong');
        }
      }

      updateUI();
    }

    function dragStart(e) {
      if (gameState.isAnswered) return;
      e.dataTransfer.effectAllowed = 'move';
      this.classList.add('dragging');
      e.dataTransfer.setData('text/html', this.innerHTML);
      gameState.selectedImage = this.dataset.word;
    }

    function dragEnd(e) {
      this.classList.remove('dragging');
    }

    document.getElementById('dropZone').addEventListener('dragover', (e) => {
      if (gameState.isAnswered) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.getElementById('dropZone').classList.add('active');
    });

    document.getElementById('dropZone').addEventListener('dragleave', () => {
      document.getElementById('dropZone').classList.remove('active');
    });

    document.getElementById('dropZone').addEventListener('drop', (e) => {
      if (gameState.isAnswered) return;
      e.preventDefault();
      document.getElementById('dropZone').classList.remove('active');
      submitAnswer();
    });

    function showResult(isCorrect, points) {
      const modal = document.getElementById('resultModal');
      const icon = document.getElementById('resultIcon');
      const title = document.getElementById('resultTitle');
      const text = document.getElementById('resultText');
      const pointsElem = document.getElementById('pointsEarned');

      if (isCorrect) {
        icon.textContent = '✅';
        title.textContent = 'Harika!';
        text.textContent = 'Doğru cevap!';
        pointsElem.textContent = points;
      } else {
        icon.textContent = '❌';
        title.textContent = 'Yanlış!';
        text.textContent = `Doğru cevap: ${gameState.wordList[gameState.currentWordIndex].label}`;
        pointsElem.textContent = '0';
      }

      modal.classList.add('active');
    }

    function nextWord() {
      document.getElementById('resultModal').classList.remove('active');
      gameState.currentWordIndex++;
      loadWord();
    }

    function skipWord() {
      nextWord();
    }

    function resetGame() {
      init();
    }

    function showCompletion() {
      const modal = document.getElementById('resultModal');
      const icon = document.getElementById('resultIcon');
      const title = document.getElementById('resultTitle');
      const text = document.getElementById('resultText');

      icon.textContent = '🏆';
      title.textContent = 'Tebrikler!';
      text.textContent = `${gameState.score} puan kazandın! Doğru: ${gameState.correct}, Yanlış: ${gameState.wrong}`;

      const btn = document.querySelector('#resultModal .btn-primary');
      btn.textContent = 'Yeniden Başla';
      btn.onclick = resetGame;

      modal.classList.add('active');
    }

    function updateUI() {
      document.getElementById('score').textContent = gameState.score;
      document.getElementById('correct').textContent = gameState.correct;
      document.getElementById('wrong').textContent = gameState.wrong;
    }

    function updateProgress() {
      const total = gameState.wordList.length;
      const progress = ((gameState.currentWordIndex + 1) / total) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
    }

    // Klavye desteği
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !gameState.isAnswered) {
        submitAnswer();
      }
    });

    // Başlat
    init();
  </script>
</body>
</html>
