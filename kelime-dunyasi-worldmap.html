function closeCountryGame() {
  const overlay = document.getElementById('kdOverlay');
  if (overlay) {
    overlay.classList.remove('open');
  }
  document.body.style.overflow = '';
  if (kdState.timerInterval) clearInterval(kdState.timerInterval);
}

window.addEventListener('DOMContentLoaded', function() {
  var ov = document.getElementById('kdOverlay');
  if (ov) ov.addEventListener('click', function(e) { if (e.target === this) closeCountryGame(); });
});

// ─── Tab Geçişi ───────────────────────────────────────────────────
function kdSwitchTab(tab) {
  kdState.tab = tab;
  document.getElementById('kdTab1').classList.toggle('active', tab === 1);
  document.getElementById('kdTab2').classList.toggle('active', tab === 2);
  document.getElementById('kdTab3').classList.toggle('active', tab === 3);
  document.getElementById('kdTab4').classList.toggle('active', tab === 4);
  if (tab === 1) kdRenderCards();
  else if (tab === 2) kdRenderMemory();
  else if (tab === 3) kdRenderScramble();
  else if (tab === 4) kdRenderTyping();
}

// ─── Progress Bar ────────────────────────────────────────────────
function kdUpdateProgress() {
  const total = kdState.words.length;
  const pct = total > 0 ? (kdState.learnedWords.size / total) * 100 : 0;
  document.getElementById('kdProgress').style.width = pct + '%';
}

// ─── Aşama 1: Kelime Kartları ─────────────────────────────────────
function kdRenderCards() {
  const { words, selectedCat, selectedDiff, learnedWords } = kdState;

  // Filtrele
  let filtered = words.filter(w => {
    const catOk = selectedCat === 'hepsi' || w.cat === selectedCat;
    const diffOk = w.level === selectedDiff;
    return catOk && diffOk;
  });

  // Mevcut kategoriler
  const cats = ['hepsi', ...new Set(words.map(w => w.cat))];

  const html = `
    <div class="kd-card-stage">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="font-size:13px;color:#6b7280;font-weight:600">
          ${learnedWords.size}/${words.length} öğrenildi
        </div>
        <div style="font-size:13px;color:#6b7280">
          💡 Karta tıkla, sesi duy
        </div>
      </div>

      <!-- Zorluk -->
      <div class="kd-diffs">
        ${['easy','medium','hard'].map(d => `
          <button class="kd-diff-btn ${d} ${selectedDiff === d ? 'active' : ''}"
            onclick="kdSetDiff('${d}')">
            ${DIFF_LABELS[d]}
          </button>
        `).join('')}
      </div>

      <!-- Kategori filtreleri -->
      <div class="kd-cats">
        ${cats.map(c => `
          <button class="kd-cat-pill ${selectedCat === c ? 'active' : ''}"
            onclick="kdSetCat('${c}')">
            ${CAT_LABELS[c] || c}
          </button>
        `).join('')}
      </div>

      <!-- Kelime kartları -->
      <div class="kd-words-grid" id="kdGrid">
        ${filtered.length === 0
          ? '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#9ca3af;font-size:16px">Bu filtreler için kelime yok</div>'
          : filtered.map((w, i) => `
            <div class="kd-word-card ${learnedWords.has(w.en) ? 'learned' : ''}"
              onclick="kdLearnWord(this, '${w.en.replace(/'/g,"\'")}')">
              <button class="kd-word-sound" onclick="event.stopPropagation();kdSpeak('${w.en.replace(/'/g,"\'")}')">🔊</button>
              <span class="kd-word-emoji">${w.emoji}</span>
              <span class="kd-word-en">${w.en}</span>
              <span class="kd-word-tr">${w.tr}</span>
              <span class="kd-word-cat" style="background:${kdCatColor(w.cat)}20;color:${kdCatColor(w.cat)}">${CAT_LABELS[w.cat]?.split(' ')[0] || ''} ${w.cat}</span>
            </div>
          `).join('')
        }
      </div>

      ${learnedWords.size >= Math.min(6, words.filter(w=>w.level===selectedDiff).length) ? `
        <button class="kd-go-game-btn" onclick="kdStartMemory()">
          🧠 Hafıza Oyununa Geç! <span style="font-size:22px">→</span>
        </button>
      ` : `
        <div style="text-align:center;margin-top:20px;padding:14px;background:#f8fafc;border-radius:14px;color:#6b7280;font-size:14px;font-weight:600">
          ${Math.min(6, words.filter(w=>w.level===selectedDiff).length) - learnedWords.size > 0
            ? `${Math.min(6, words.filter(w=>w.level===selectedDiff).length) - learnedWords.size} kelime daha öğren — hafıza oyunu açılsın! 🎯`
            : 'Tüm kelimeleri öğrendin! 🎉'
          }
        </div>
      `}
    </div>
  `;

  document.getElementById('kdBody').innerHTML = html;
}

function kdCatColor(cat) {
  const colors = { hayvan: '#f97316', yiyecek: '#22c55e', kültür: '#a855f7', kıyafet: '#3b82f6', doğa: '#10b981' };
  return colors[cat] || '#6b7280';
}

function kdSetCat(cat) {
  kdState.selectedCat = cat;
  kdRenderCards();
}

function kdSetDiff(diff) {
  kdState.selectedDiff = diff;
  kdRenderCards();
}

function kdLearnWord(el, wordEn) {
  if (!el.classList.contains('learned')) {
    // Seç
    el.classList.add('learned');
    kdState.learnedWords.add(wordEn);
    kdSpeak(wordEn);
    kdUpdateProgress();
    // Hafıza butonunu aç
    const diffWords = kdState.words.filter(w=>w.level===kdState.selectedDiff);
    if (kdState.learnedWords.size >= Math.min(6, diffWords.length)) {
      document.getElementById('kdTab2').disabled = false;
      document.getElementById('kdTab3').disabled = false;
      document.getElementById('kdTab4').disabled = false;
    }
    // Sayacı güncelle
    const counter = document.getElementById('kdLearnedCounter');
    if (counter) counter.textContent = kdState.learnedWords.size + '/' + kdState.words.length + ' seçildi';
    // "Oyuna geç" butonunu kontrol et
    const goBtn = document.getElementById('kdGoBtn');
    if (goBtn) goBtn.style.display = kdState.learnedWords.size >= Math.min(6, diffWords.length) ? 'flex' : 'none';
    const hint = document.getElementById('kdHint');
    if (hint) {
      const remaining = Math.min(6, diffWords.length) - kdState.learnedWords.size;
      hint.textContent = remaining > 0
        ? remaining + ' kelime daha seç — hafıza oyunu açılsın! 🎯'
        : 'Tüm seçimler tamamdı! 🎉';
    }
  } else {
    // Seçimi kaldır (toggle)
    el.classList.remove('learned');
    kdState.learnedWords.delete(wordEn);
    kdSpeak(wordEn);
    kdUpdateProgress();
    const diffWords = kdState.words.filter(w=>w.level===kdState.selectedDiff);
    // Sayacı güncelle
    const counter = document.getElementById('kdLearnedCounter');
    if (counter) counter.textContent = kdState.learnedWords.size + '/' + kdState.words.length + ' seçildi';
    // "Oyuna geç" butonunu gizle
    const goBtn = document.getElementById('kdGoBtn');
    if (goBtn) goBtn.style.display = kdState.learnedWords.size >= Math.min(6, diffWords.length) ? 'flex' : 'none';
    const hint = document.getElementById('kdHint');
    if (hint) {
      const remaining = Math.min(6, diffWords.length) - kdState.learnedWords.size;
      hint.textContent = remaining > 0
        ? remaining + ' kelime daha seç — hafıza oyunu açılsın! 🎯'
        : 'Tüm seçimler tamamdı! 🎉';
    }
  }
}

// ─── Aşama 2: Hafıza Oyunu ───────────────────────────────────────
function kdStartMemory() {
  document.getElementById('kdTab2').disabled = false;
  kdSwitchTab(2);
}

function kdRenderMemory() {
  // Seçilen zorluktan kelimeleri al (max 8 çift = 16 kart)
  const diffWords = kdState.words.filter(w => w.level === kdState.selectedDiff);
  const gameWords = diffWords.slice(0, 8);

  // Kartları oluştur (emoji çifti + kelime çifti)
  const pairs = gameWords.map(w => [
    { id: Math.random(), pairId: w.en, type: 'emoji', content: w.emoji, word: w },
    { id: Math.random(), pairId: w.en, type: 'word',  content: w.en, subContent: w.tr, word: w },
  ]).flat();

  // Karıştır
  kdState.memCards = pairs.sort(() => Math.random() - 0.5);
  kdState.flipped = [];
  kdState.matched = new Set();
  kdState.moves = 0;
  kdState.seconds = 0;
  if (kdState.timerInterval) clearInterval(kdState.timerInterval);
  kdState.timerInterval = setInterval(() => {
    kdState.seconds++;
    const el = document.getElementById('kdTimer');
    if (el) el.textContent = '⏱️ ' + kdFormatTime(kdState.seconds);
  }, 1000);

  kdRenderMemoryGrid();
}

function kdFormatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function kdRenderMemoryGrid() {
  const { memCards, matched, moves, seconds } = kdState;
  const total = memCards.length / 2;

  const html = `
    <div class="kd-memory-stage">
      <div class="kd-memory-info">
        <div class="kd-memory-score">✅ ${matched.size}/${total} eşleşti</div>
        <div id="kdTimer" class="kd-memory-timer">⏱️ ${kdFormatTime(seconds)}</div>
        <div class="kd-memory-moves">🖱️ ${moves} hamle</div>
      </div>

      <div class="kd-memory-grid" id="kdMemGrid">
        ${memCards.map((card, idx) => `
          <div class="kd-mem-card ${matched.has(card.pairId) ? 'matched' : ''}"
            id="kd-mc-${idx}"
            onclick="kdFlipCard(${idx})"
            data-pair="${card.pairId}"
            data-type="${card.type}">
            ${matched.has(card.pairId)
              ? (card.type === 'emoji'
                  ? `<span>${card.content}</span>`
                  : `<div class="kd-mem-word"><span class="kd-mem-word-en">${card.content}</span><span class="kd-mem-word-tr">${card.subContent||''}</span></div>`)
              : ''
            }
          </div>
        `).join('')}
      </div>

      <button onclick="kdRenderMemory()" style="
        margin-top:16px; background:white; border:2px solid #e5e7eb;
        padding:10px 20px; border-radius:12px; font-family:inherit;
        font-size:14px; font-weight:600; cursor:pointer; color:#6b7280;
        transition:all 0.2s; width:100%;
      " onmouseover="this.style.borderColor='var(--kd-accent)'"
         onmouseout="this.style.borderColor='#e5e7eb'">
        🔄 Oyunu Yeniden Başlat
      </button>
    </div>
  `;

  document.getElementById('kdBody').innerHTML = html;
}


function kdFlipCard(idx) {
  if (kdFlipLock) return;
  const card = kdState.memCards[idx];
  if (!card) return;
  if (kdState.matched.has(card.pairId)) return;
  if (kdState.flipped.includes(idx)) return;
  if (kdState.flipped.length >= 2) return;

  // Kartı görsel olarak çevir
  const el = document.getElementById(`kd-mc-${idx}`);
  el.classList.add('flipped');
  el.innerHTML = card.type === 'emoji'
    ? `<span>${card.content}</span>`
    : `<div class="kd-mem-word"><span class="kd-mem-word-en">${card.content}</span><span class="kd-mem-word-tr">${card.subContent||''}</span></div>`;

  kdState.flipped.push(idx);

  if (kdState.flipped.length === 2) {
    kdFlipLock = true;
    kdState.moves++;

    const [i1, i2] = kdState.flipped;
    const c1 = kdState.memCards[i1];
    const c2 = kdState.memCards[i2];

    if (c1.pairId === c2.pairId && c1.type !== c2.type) {
      // Eşleşti!
      kdState.matched.add(c1.pairId);
      kdSpeak(c1.pairId);

      setTimeout(() => {
        [i1,i2].forEach(i => {
          const e = document.getElementById(`kd-mc-${i}`);
          if (e) { e.classList.remove('flipped'); e.classList.add('matched'); }
        });
        kdState.flipped = [];
        kdFlipLock = false;

        // Timer güncelle
        const timerEl = document.getElementById('kdTimer');
        if (timerEl) timerEl.textContent = '⏱️ ' + kdFormatTime(kdState.seconds);

        // Kazandı mı?
        if (kdState.matched.size === kdState.memCards.length / 2) {
          clearInterval(kdState.timerInterval);
          setTimeout(kdShowResult, 600);
        }
      }, 500);
    } else {
      // Eşleşmedi
      setTimeout(() => {
        [i1,i2].forEach(i => {
          const e = document.getElementById(`kd-mc-${i}`);
          if (e) {
            e.classList.add('wrong');
            setTimeout(() => {
              e.classList.remove('flipped', 'wrong');
              e.innerHTML = '';
            }, 400);
          }
        });
        kdState.flipped = [];
        kdFlipLock = false;
      }, 800);
    }
  }
}

function kdShowResult() {
  const { moves, seconds, memCards } = kdState;
  const total = memCards.length / 2;

  // Yıldız hesapla
  const stars = moves <= total + 2 ? 3 : moves <= total * 2 ? 2 : 1;
  const starStr = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);

  // Confetti
  kdSpawnConfetti();

  document.getElementById('kdBody').innerHTML = `
    <div class="kd-result">
      <span class="kd-result-emoji">🎉</span>
      <div class="kd-result-title">Harika!</div>
      <div class="kd-result-sub">${kdState.countryName} kelimelerini öğrendin!</div>
      <span class="kd-result-stars">${starStr}</span>
      <div class="kd-result-stats">
        <div class="kd-result-stat">
          <div class="kd-result-stat-val">${total}</div>
          <div class="kd-result-stat-label">Kelime</div>
        </div>
        <div class="kd-result-stat">
          <div class="kd-result-stat-val">${moves}</div>
          <div class="kd-result-stat-label">Hamle</div>
        </div>
        <div class="kd-result-stat">
          <div class="kd-result-stat-val">${kdFormatTime(seconds)}</div>
          <div class="kd-result-stat-label">Süre</div>
        </div>
      </div>
      <div class="kd-result-btns">
        <button class="kd-result-btn secondary" onclick="kdSwitchTab(1)">📚 Kelimelere Dön</button>
        <button class="kd-result-btn primary" onclick="kdRenderMemory()">🔄 Tekrar Oyna</button>
      </div>
    </div>
  `;
}

function kdSpawnConfetti() {
  const colors = ['#f59e0b','#ef4444','#22c55e','#3b82f6','#a855f7','#ec4899'];
  const modal = document.getElementById('kdModal');
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'kd-confetti-piece';
    el.style.cssText = `
      left: ${Math.random() * 100}%;
      top: 0;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      animation-delay: ${Math.random() * 0.5}s;
      animation-duration: ${1.5 + Math.random()}s;
      transform: rotate(${Math.random() * 360}deg);
    `;
    modal.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
}

    </div>
    <div class="kd-body" id="kdBody">
      <!-- JS ile doldurulacak -->
    </div>
  </div>
</div>


<script>
// ─── Oyun 3: Harf Karışık (Scramble) ──────────────────────────────
function kdRenderScramble() {
  var learned = Array.from(kdState.learnedWords).map(function(w){
    return kdState.words.find(function(word){ return word.en === w; });
  }).filter(Boolean);
  if (!learned.length) {
    document.getElementById('kdBody').innerHTML = '<div style="padding:40px;text-align:center;color:#666;font-family:Fredoka">Önce kelime öğrenmelisin!</div>';
    return;
  }
  var pick = learned[Math.floor(Math.random() * learned.length)];
  var letters = pick.en.toUpperCase().split('').sort(function(){ return Math.random()-0.5; });
  var attempt = 0;
  while (letters.join('') === pick.en.toUpperCase() && attempt++ < 10) {
    letters.sort(function(){ return Math.random()-0.5; });
  }
  var body = document.getElementById('kdBody');
  body.innerHTML = '';
  var div = document.createElement('div');
  div.style.cssText = 'font-family:Fredoka;padding:8px';
  div.innerHTML =
    '<div style="text-align:center;margin-bottom:24px">' +
      '<div style="font-size:64px;margin-bottom:8px">' + pick.emoji + '</div>' +
      '<div style="font-size:20px;color:#666;margin-bottom:20px">&#127481;&#127479; ' + pick.tr + '</div>' +
      '<div style="font-size:28px;font-weight:700;letter-spacing:6px;color:var(--kd-accent,#6366f1);background:#f3f4f6;padding:12px 24px;border-radius:14px;display:inline-block">' + letters.join(' ') + '</div>' +
    '</div>' +
    '<input id="kdScrambleInput" type="text" autocomplete="off" placeholder="Harfleri doğru sıraya diz..." ' +
      'style="width:100%;padding:14px;font-size:20px;border:3px solid #e5e7eb;border-radius:12px;text-align:center;font-family:Fredoka;outline:none;margin-bottom:12px;box-sizing:border-box">' +
    '<button id="kdScrambleBtn" style="width:100%;padding:13px;background:linear-gradient(135deg,var(--kd-accent,#6366f1),var(--kd-accent2,#8b5cf6));color:white;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;font-family:Fredoka">✅ Kontrol Et</button>' +
    '<div id="kdScrambleResult" style="margin-top:14px;text-align:center;font-size:18px;font-weight:700;min-height:28px"></div>' +
    '<button id="kdScrambleNext" style="margin-top:10px;width:100%;padding:10px;background:white;border:2px solid #e5e7eb;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;color:#6b7280;font-family:Fredoka">🔀 Yeni Kelime</button>';
  body.appendChild(div);
  document.getElementById('kdScrambleBtn').onclick = function(){ kdCheckScramble(pick.en); };
  document.getElementById('kdScrambleNext').onclick = kdRenderScramble;
  document.getElementById('kdScrambleInput').addEventListener('keydown', function(e){ if(e.key==='Enter') kdCheckScramble(pick.en); });
  document.getElementById('kdScrambleInput').focus();
}
function kdCheckScramble(correct) {
  var val = document.getElementById('kdScrambleInput').value.trim();
  var result = document.getElementById('kdScrambleResult');
  if (val.toLowerCase() === correct.toLowerCase()) {
    result.innerHTML = '🎉 Doğru! Harika!'; result.style.color = '#22c55e';
    kdSpeak(correct); setTimeout(kdRenderScramble, 1400);
  } else {
    result.innerHTML = '❌ Yanlış, tekrar dene!'; result.style.color = '#ef4444';
    document.getElementById('kdScrambleInput').value = '';
    document.getElementById('kdScrambleInput').focus();
  }
}

// ─── Oyun 4: Hızlı Yazma (Typing Race) ────────────────────────────
var kdTypingScore = 0, kdTypingWords = [], kdTypingIdx = 0;
function kdRenderTyping() {
  var learned = Array.from(kdState.learnedWords).map(function(w){ return kdState.words.find(function(word){ return word.en === w; }); }).filter(Boolean);
  if (!learned.length) { document.getElementById('kdBody').innerHTML = '<div style="padding:40px;text-align:center;color:#666;font-family:Fredoka">Önce kelime öğrenmelisin!</div>'; return; }
  kdTypingWords = learned.slice().sort(function(){ return Math.random()-0.5; });
  kdTypingIdx = 0; kdTypingScore = 0; kdShowTypingWord();
}
function kdShowTypingWord() {
  if (kdTypingIdx >= kdTypingWords.length) {
    document.getElementById('kdBody').innerHTML = '<div style="font-family:Fredoka;text-align:center;padding:40px"><div style="font-size:64px;margin-bottom:16px">🏆</div><div style="font-size:26px;font-weight:700;color:#1f2937;margin-bottom:8px">Tebrikler!</div><div style="font-size:18px;color:#6b7280;margin-bottom:24px">' + kdTypingScore + ' / ' + kdTypingWords.length + ' doğru</div><button onclick="kdRenderTyping()" style="padding:12px 28px;background:linear-gradient(135deg,var(--kd-accent,#6366f1),var(--kd-accent2,#8b5cf6));color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:Fredoka">🔄 Tekrar Oyna</button></div>';
    return;
  }
  var pick = kdTypingWords[kdTypingIdx];
  var prog = kdTypingIdx + 1, total = kdTypingWords.length;
  document.getElementById('kdBody').innerHTML = '<div style="font-family:Fredoka;padding:8px"><div style="text-align:center;margin-bottom:20px"><div style="font-size:12px;font-weight:600;color:#9ca3af;margin-bottom:12px">' + prog + ' / ' + total + '</div><div style="height:6px;background:#f3f4f6;border-radius:3px;margin-bottom:20px;overflow:hidden"><div style="height:100%;width:' + (prog/total*100) + '%;background:var(--kd-accent,#6366f1);border-radius:3px"></div></div><div style="font-size:64px;margin-bottom:8px">' + pick.emoji + '</div><div style="font-size:22px;color:#666;margin-bottom:4px">🇹🇷 ' + pick.tr + '</div></div><input id="kdTypingInput" type="text" autocomplete="off" placeholder="Yaz..." style="width:100%;padding:14px;font-size:22px;border:3px solid #e5e7eb;border-radius:12px;text-align:center;font-family:Fredoka;outline:none;margin-bottom:12px;box-sizing:border-box"><div style="display:flex;gap:8px"><button onclick="kdCheckTyping('' + pick.en + '')" style="flex:1;padding:12px;background:linear-gradient(135deg,var(--kd-accent,#6366f1),var(--kd-accent2,#8b5cf6));color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:Fredoka">✅ Gönder</button><button onclick="kdTypingSkip('' + pick.en + '')" style="padding:12px 16px;background:white;border:2px solid #e5e7eb;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;color:#6b7280;font-family:Fredoka">⏭️ Geç</button></div><div id="kdTypingResult" style="margin-top:12px;text-align:center;font-size:18px;font-weight:700;min-height:28px"></div><div style="margin-top:14px;text-align:center;font-size:14px;color:#9ca3af">Puan: <b style="color:var(--kd-accent,#6366f1)">' + kdTypingScore + '</b></div></div>';
  document.getElementById('kdTypingInput').addEventListener('keydown', function(e){ if(e.key==='Enter') kdCheckTyping(pick.en); });
  document.getElementById('kdTypingInput').focus();
}
function kdCheckTyping(correct) {
  var val = document.getElementById('kdTypingInput').value.trim();
  if (val.toLowerCase() === correct.toLowerCase()) {
    kdTypingScore++; kdSpeak(correct);
    var r = document.getElementById('kdTypingResult');
    if(r){r.innerHTML='🎉 Doğru!';r.style.color='#22c55e';}
    kdTypingIdx++; setTimeout(kdShowTypingWord, 900);
  } else if (val.length > 0) {
    var r = document.getElementById('kdTypingResult');
    if(r){r.innerHTML='❌ Yanlış!';r.style.color='#ef4444';}
  }
}
function kdTypingSkip(correct) {
  var r = document.getElementById('kdTypingResult');
  if(r){r.innerHTML='💡 Cevap: <span style="color:var(--kd-accent,#6366f1)">' + correct + '</span>';}
  kdSpeak(correct); kdTypingIdx++; setTimeout(kdShowTypingWord, 1400);
}
</script>
</body>
</html>
