<style>
/* WorldMap — global styles */
:root {
  --ocean-1: #BEE3F0;
  --ocean-2: #8FCDE5;
  --ocean-3: #5FAFD0;
  --ocean-deep: #2E7A9A;
  --sand: #F4D9A4;
  --ink: #1F3144;
  --ink-soft: #4A5E73;
  --paper: #FFF8EC;
  --gold: #F2B544;
  --coral: #E87A6E;
  --leaf: #6FB87A;
  --berry: #B66BB0;
  --sky: #7EBEE0;
  --snow: #EAF4FB;
  --shadow: rgba(15, 50, 80, 0.18);
  --shadow-deep: rgba(15, 50, 80, 0.32);
  --font-display: "Fredoka", "Baloo 2", system-ui, sans-serif;
  --font-body: "Nunito", system-ui, sans-serif;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: var(--font-body);
  color: var(--ink);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  background: var(--ocean-1);
}

#root { width: 100vw; height: 100vh; }

/* The ocean backdrop — gradient + soft radial spots that suggest depth */
.ocean {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(1200px 700px at 20% 15%, rgba(255,255,255,0.35), transparent 60%),
    radial-gradient(900px 600px at 85% 80%, rgba(46, 122, 154, 0.20), transparent 60%),
    linear-gradient(180deg, var(--ocean-1) 0%, var(--ocean-2) 50%, var(--ocean-3) 100%);
  overflow: hidden;
}

/* Subtle wave texture using SVG noise-like stripes */
.ocean::before {
  content: "";
  position: absolute;
  inset: -10%;
  background-image:
    radial-gradient(2px 2px at 30% 40%, rgba(255,255,255,0.25), transparent 50%),
    radial-gradient(2px 2px at 70% 70%, rgba(255,255,255,0.20), transparent 50%),
    radial-gradient(1px 1px at 50% 20%, rgba(255,255,255,0.18), transparent 50%);
  background-size: 400px 400px, 300px 300px, 200px 200px;
  opacity: 0.6;
  animation: drift 60s linear infinite;
}

@keyframes drift {
  0% { transform: translate(0,0); }
  100% { transform: translate(-200px,-150px); }
}

/* Clouds */
.cloud {
  position: absolute;
  pointer-events: none;
  opacity: 0.85;
  filter: drop-shadow(0 6px 14px rgba(31, 49, 68, 0.10));
  animation: cloudDrift linear infinite;
}
@keyframes cloudDrift {
  from { transform: translateX(-12vw); }
  to   { transform: translateX(112vw); }
}

/* Stage holds the SVG map */
.stage {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.map-svg {
  width: 100%;
  height: 100%;
  display: block;
}

/* Continent base style */
.continent {
  cursor: pointer;
  transition: transform 320ms cubic-bezier(.2,.9,.3,1.25),
              filter 280ms ease,
              opacity 280ms ease;
  transform-box: fill-box;
  transform-origin: center;
  filter: drop-shadow(0 8px 12px var(--shadow));
}

.continent:hover {
  filter: drop-shadow(0 18px 22px var(--shadow-deep))
          drop-shadow(0 0 0 rgba(255,255,255,0));
}

/* Dim non-hovered when one is hovered */
.map[data-hover="true"] .continent:not(.is-hover):not(.is-active) {
  opacity: 0.45;
  filter: drop-shadow(0 4px 6px var(--shadow)) saturate(0.7);
}

/* Active (clicked) continent */
.continent.is-active {
  filter: drop-shadow(0 22px 28px var(--shadow-deep));
}

/* Name label that floats over each continent */
.continent-label {
  font-family: var(--font-display);
  font-weight: 600;
  fill: var(--ink);
  text-anchor: middle;
  pointer-events: none;
  paint-order: stroke;
  stroke: rgba(255, 248, 236, 0.85);
  stroke-width: 6;
  stroke-linejoin: round;
  letter-spacing: 0.02em;
  transition: opacity 220ms ease, transform 320ms ease;
}

.map[data-active="true"] .continent-label:not(.is-active) { opacity: 0.0; }

/* Magnifier lens */
.lens-circle {
  fill: none;
  stroke: rgba(255,255,255,0.9);
  stroke-width: 3;
  filter: drop-shadow(0 8px 18px rgba(15,50,80,0.35));
  pointer-events: none;
}
.lens-handle {
  stroke: rgba(255,255,255,0.95);
  stroke-width: 6;
  stroke-linecap: round;
  pointer-events: none;
  filter: drop-shadow(0 6px 10px rgba(15,50,80,0.35));
}

/* Top chrome */
.chrome {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 20px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 30;
  pointer-events: none;
  gap: 16px;
}
.chrome > * { pointer-events: auto; }

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255, 248, 236, 0.85);
  backdrop-filter: blur(8px);
  padding: 10px 16px 10px 12px;
  border-radius: 999px;
  box-shadow: 0 6px 18px rgba(15, 50, 80, 0.12);
}
.brand-mark {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--coral));
  display: grid; place-items: center;
  color: white;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 20px;
  box-shadow: inset 0 -3px 0 rgba(0,0,0,0.12);
}
.brand-name {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 20px;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.brand-sub {
  font-size: 12px;
  color: var(--ink-soft);
  font-weight: 600;
  margin-top: -2px;
}

.hud {
  display: flex;
  align-items: center;
  gap: 10px;
}
.hud-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255, 248, 236, 0.85);
  backdrop-filter: blur(8px);
  padding: 9px 14px;
  border-radius: 999px;
  box-shadow: 0 6px 18px rgba(15, 50, 80, 0.12);
  font-family: var(--font-display);
  font-weight: 600;
  color: var(--ink);
  font-size: 14px;
}
.hud-chip svg { display: block; }
.hud-chip-val { font-variant-numeric: tabular-nums; }

.avatar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255, 248, 236, 0.85);
  backdrop-filter: blur(8px);
  padding: 6px 16px 6px 6px;
  border-radius: 999px;
  box-shadow: 0 6px 18px rgba(15, 50, 80, 0.12);
}
.avatar-ring {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FFE0A8, #FFB07A);
  display: grid; place-items: center;
  font-family: var(--font-display);
  font-weight: 700;
  color: white;
  font-size: 18px;
  box-shadow: inset 0 -3px 0 rgba(0,0,0,0.10);
}
.avatar-name {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 14px;
  line-height: 1.1;
}
.avatar-meta { font-size: 11px; color: var(--ink-soft); font-weight: 600; }

.xp-bar {
  width: 100px; height: 7px; border-radius: 999px;
  background: rgba(31, 49, 68, 0.10);
  overflow: hidden; margin-top: 4px;
}
.xp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--coral));
  border-radius: 999px;
  transition: width 600ms ease;
}

/* Bottom hint */
.hint {
  position: absolute;
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: rgba(255, 248, 236, 0.9);
  backdrop-filter: blur(6px);
  padding: 10px 18px;
  border-radius: 999px;
  font-family: var(--font-display);
  font-weight: 500;
  color: var(--ink);
  font-size: 14px;
  box-shadow: 0 6px 18px rgba(15, 50, 80, 0.12);
  z-index: 20;
  display: flex; align-items: center; gap: 10px;
  transition: opacity 300ms ease, transform 300ms ease;
}
.hint .kbd {
  font-family: var(--font-body);
  font-size: 11px;
  padding: 2px 8px;
  background: rgba(31, 49, 68, 0.08);
  border-radius: 6px;
  font-weight: 700;
  color: var(--ink-soft);
}

/* Country panel — radiating cards */
.country-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 25;
}
.country-layer.is-open { pointer-events: auto; }

.country-backdrop {
  position: absolute;
  inset: 0;
  background: radial-gradient(60% 50% at var(--ox, 50%) var(--oy, 50%), transparent 0%, rgba(15, 50, 80, 0.28) 80%);
  opacity: 0;
  transition: opacity 360ms ease;
  pointer-events: none;
}
.country-layer.is-open .country-backdrop {
  opacity: 1;
  pointer-events: auto;
}

.country-card {
  position: absolute;
  width: 200px;
  background: var(--paper);
  border-radius: 22px;
  padding: 14px 14px 16px;
  box-shadow: 0 14px 32px rgba(15, 50, 80, 0.22);
  transform: translate(-50%, -50%) scale(0.4);
  opacity: 0;
  transition:
    transform 560ms cubic-bezier(.2, .9, .3, 1.25),
    opacity 380ms ease;
  cursor: pointer;
  border: 2px solid rgba(31, 49, 68, 0.06);
}
.country-layer.is-open .country-card {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
.country-card:hover {
  transform: translate(-50%, -50%) scale(1.06) !important;
  box-shadow: 0 20px 40px rgba(15, 50, 80, 0.30);
  z-index: 2;
}
.country-card.is-locked { cursor: not-allowed; }
.country-card.is-locked:hover {
  transform: translate(-50%, -50%) scale(1.02) !important;
}
.country-card.is-dragging {
  transition: none !important;
  box-shadow: 0 28px 50px rgba(15, 50, 80, 0.40) !important;
  transform: translate(-50%, -50%) scale(1.04) !important;
}
.country-card.is-dragging:hover {
  transform: translate(-50%, -50%) scale(1.04) !important;
}

.cc-illo {
  height: 86px;
  border-radius: 14px;
  background: var(--snow);
  display: grid; place-items: center;
  margin-bottom: 10px;
  overflow: hidden;
  position: relative;
}
.cc-name {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 18px;
  color: var(--ink);
  line-height: 1.1;
}
.cc-row {
  display: flex; align-items: center; gap: 6px;
  margin-top: 6px;
  font-size: 12px;
  color: var(--ink-soft);
  font-weight: 600;
}
.cc-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--ink-soft); opacity: 0.45; }
.cc-lock {
  position: absolute; top: 8px; right: 8px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(31, 49, 68, 0.85);
  display: grid; place-items: center;
  color: white;
  font-size: 13px;
  z-index: 2;
}
.cc-card.is-locked .cc-illo,
.country-card.is-locked .cc-illo,
.country-card.is-locked .cc-name {
  filter: grayscale(0.6) opacity(0.7);
}

.cc-difficulty {
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.cc-difficulty .pip {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(31, 49, 68, 0.15);
}
.cc-difficulty .pip.on { background: var(--gold); }

/* Close button */
.close-btn {
  position: absolute;
  top: 86px;
  right: 32px;
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  background: rgba(255, 248, 236, 0.92);
  backdrop-filter: blur(8px);
  box-shadow: 0 6px 18px rgba(15, 50, 80, 0.18);
  cursor: pointer;
  font-size: 20px;
  color: var(--ink);
  display: grid; place-items: center;
  z-index: 40;
}
.close-btn:hover { background: white; }

/* Ambient idle motion */
.idle-bob {
  animation: bob 4s ease-in-out infinite;
  transform-box: fill-box;
  transform-origin: center;
}
.idle-bob.delay-1 { animation-delay: -1s; }
.idle-bob.delay-2 { animation-delay: -2s; }
.idle-bob.delay-3 { animation-delay: -3s; }

@keyframes bob {
  0%, 100% { transform: translateY(0) rotate(-1deg); }
  50%      { transform: translateY(-3px) rotate(1deg); }
}

/* Hover intensity variants */
.hover-subtle .continent.is-hover { transform: scale(1.03) translateY(-6px); }
.hover-medium .continent.is-hover { transform: scale(1.06) translateY(-12px); }
.hover-dramatic .continent.is-hover { transform: scale(1.10) translateY(-20px); }

/* In rearrange mode, suppress hover lift so dragging feels stable */
.continent.is-editable.is-hover { transform: none !important; }
.continent.is-editable {
  filter: drop-shadow(0 14px 18px rgba(15, 50, 80, 0.28));
}
.map[data-hover="true"] .continent.is-editable:not(.is-hover) {
  opacity: 1 !important;
  filter: drop-shadow(0 8px 12px var(--shadow)) !important;
}

/* Continent glow accent (a radial in the SVG handles this) */


@keyframes spin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
@keyframes toastIn {
  0%   { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
  20%  { transform: translate(-50%, -50%) scale(1.04); opacity: 1; }
  80%  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(0.96); opacity: 0; }
}
</style>

    box-shadow:0 0 0 .5px rgba(0,0,0,.18),0 4px 10px rgba(0,0,0,.12)}

    0 2px 6px rgba(0,0,0,.15)}

    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

function withTransform(x, y, scale, children, idle, idleDelay) {
  const cls = idle ? `idle-bob delay-${idleDelay || 0}` : '';
  // Outer g handles positioning (SVG transform attr); inner g handles idle bob via CSS
  // — keeping them on separate elements prevents the CSS keyframe from clobbering
  // the positioning transform.
  return (
    <g transform={`translate(${x},${y}) scale(${scale})`}>
      <g className={cls}>{children}</g>
    </g>
  );
}

<script type="text/babel">
/* WorldMap — SVG renderer with hover, magnifier lens, and camera zoom */

const ICON_BY_NAME = {
  Pyramid: IcoPyramid, Lion: IcoLion, Elephant: IcoElephant, Giraffe: IcoGiraffe,
  Panda: IcoPanda, Tiger: IcoTiger, Blossom: IcoBlossom, Bamboo: IcoBamboo,
  Castle: IcoCastle, Windmill: IcoWindmill, House: IcoHouse,
  Bear: IcoBear, Eagle: IcoEagle, Tree: IcoTree,
  Parrot: IcoParrot, Llama: IcoLlama, Palm: IcoPalm,
  Kangaroo: IcoKangaroo, Koala: IcoKoala, Reef: IcoReef,
  Penguin: IcoPenguin, Iceberg: IcoIceberg, Aurora: IcoAurora,
};

function ContinentContent({ c, density, animate = true }) {
  const icons = density === 'sparse'
    ? c.icons.slice(0, Math.max(2, c.icons.length - 2))
    : density === 'rich'
      ? [...c.icons, ...(c.extraIcons || [])]
      : c.icons;
  // c.paths is an array — mainland first, then islands
  return (
    <g style={{ pointerEvents: 'none' }}>
      {/* under-shadow for depth */}
      {c.paths.map((d, i) => (
        <path key={`s${i}`} d={d} fill={c.tintDeep} opacity="0.22" transform="translate(0,5)"/>
      ))}
      {/* tint fill */}
      {c.paths.map((d, i) => (
        <path key={`f${i}`} d={d} fill={c.tint}/>
      ))}
      {/* light rim */}
      {c.paths.map((d, i) => (
        <path key={`r${i}`} d={d} fill="none" stroke="rgba(255,255,255,0.55)" strokeWidth="2"/>
      ))}
      {/* subtle inner highlight on mainland only */}
      <path d={c.paths[0]} fill="none" stroke="rgba(255,255,255,0.25)" strokeWidth="6" transform="translate(0,-3)" style={{ mixBlendMode: 'overlay' }}/>
      {/* icons */}
      {icons.map((it, idx) => {
        const Ico = ICON_BY_NAME[it.type];
        if (!Ico) return null;
        return <Ico key={idx} x={it.x} y={it.y} s={it.s} d={it.d} idle={animate}/>;
      })}
    </g>
  );
}

function WorldMap({
  activeId, hoverId, onHover, onClick,
  hoverIntensity, density, theme, projection,
  showLens, lensPos, setLensPos,
  ambient,
  editMode, offsets, onOffsetsChange,
}) {
  const svgRef = React.useRef(null);
  const cameraRef = React.useRef(null);
  const offsetGroupRefs = React.useRef({});
  const dragRef = React.useRef(null);
  const LENS_R = 90;

  const handleMouseMove = (e) => {
    if (!svgRef.current) return;
    const pt = svgRef.current.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const ctm = svgRef.current.getScreenCTM();
    if (!ctm) return;
    const svgP = pt.matrixTransform(ctm.inverse());
    setLensPos({ x: svgP.x, y: svgP.y });
  };

  // ── Drag-to-rearrange ──────────────────────────────────────────────────────
  // While editMode is on, mousedown on a continent starts a drag that updates
  // the continent's offset group's transform in SVG coords. On mouseup we
  // commit the final offset to the tweak so it persists across reload.
  const screenDeltaToSvg = (dxScreen, dyScreen) => {
    if (!svgRef.current) return { dx: 0, dy: 0 };
    const ctm = svgRef.current.getScreenCTM();
    if (!ctm) return { dx: 0, dy: 0 };
    // SVG-units per screen-pixel = 1 / scale factor of getScreenCTM
    return { dx: dxScreen / ctm.a, dy: dyScreen / ctm.d };
  };

  const onContinentMouseDown = (e, c) => {
    if (!editMode) return;
    e.preventDefault();
    e.stopPropagation();
    const initial = offsets[c.id] || { dx: 0, dy: 0 };
    dragRef.current = {
      id: c.id,
      startX: e.clientX,
      startY: e.clientY,
      initial,
      currentDx: initial.dx,
      currentDy: initial.dy,
      moved: false,
    };
  };

  React.useEffect(() => {
    if (!editMode) return;
    const onMove = (e) => {
      const d = dragRef.current;
      if (!d) return;
      const { dx, dy } = screenDeltaToSvg(e.clientX - d.startX, e.clientY - d.startY);
      d.currentDx = d.initial.dx + dx;
      d.currentDy = d.initial.dy + dy;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) d.moved = true;
      const node = offsetGroupRefs.current[d.id];
      if (node) node.setAttribute('transform', `translate(${d.currentDx},${d.currentDy})`);
    };
    const onUp = () => {
      const d = dragRef.current;
      if (!d) return;
      if (d.moved && onOffsetsChange) {
        onOffsetsChange({
          ...offsets,
          [d.id]: { dx: d.currentDx, dy: d.currentDy },
        });
      }
      dragRef.current = null;
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, [editMode, offsets, onOffsetsChange]);

  const handleContinentClick = (c) => {
    // Suppress the zoom-in click if we're in edit mode (or just finished a drag)
    if (editMode) return;
    onClick(c.id);
  };

  // Camera transform for zoom-in on active continent. We use the SVG `transform`
  // attribute (not CSS transform) — Chromium has rendering issues applying CSS
  // transform to SVG <g> elements that live under a viewBox-scaled SVG, and
  // also breaks `transition: transform` on the same node. Driving the attribute
  // via rAF gives us a smooth animated zoom that actually paints.
  const active = activeId ? CONTINENTS.find(c => c.id === activeId) : null;
  const ZOOM = 1.5;
  const activeOff = active ? (offsets[active.id] || { dx: 0, dy: 0 }) : { dx: 0, dy: 0 };
  const targetCam = active
    ? {
        x: 800 - (active.cx + activeOff.dx) * ZOOM,
        y: 500 - (active.cy + activeOff.dy) * ZOOM,
        s: ZOOM,
      }
    : { x: 0, y: 0, s: 1 };
  const prevCamRef = React.useRef({ x: 0, y: 0, s: 1 });

  React.useLayoutEffect(() => {
    if (!cameraRef.current) return;
    const node = cameraRef.current;
    const from = prevCamRef.current;
    const to = targetCam;
    if (from.x === to.x && from.y === to.y && from.s === to.s) return;

    const DURATION = 720;
    const ease = (t) =>
      t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

    const start = performance.now();
    let timer = null;
    let tickCount = 0;
    const tick = () => {
      tickCount++;
      const now = performance.now();
      const t = Math.min(1, (now - start) / DURATION);
      const e = ease(t);
      const x = from.x + (to.x - from.x) * e;
      const y = from.y + (to.y - from.y) * e;
      const s = from.s + (to.s - from.s) * e;
      node.setAttribute('transform', `translate(${x},${y}) scale(${s})`);
      if (t < 1) timer = setTimeout(tick, 16);
    };
    timer = setTimeout(tick, 0);
    prevCamRef.current = { ...to };
    return () => { if (timer) clearTimeout(timer); };
  }, [targetCam.x, targetCam.y, targetCam.s]);

  const hovered = hoverId ? CONTINENTS.find(c => c.id === hoverId) : null;

  // Projection variants — apply per-continent translate/scale offsets
  const projOffset = (c) => {
    if (projection === 'islands') {
      // amplify spread + small bob already on parent .continent
      const dx = (c.cx - 800) * 0.04;
      const dy = (c.cy - 500) * 0.04;
      return { tx: dx, ty: dy };
    }
    return { tx: 0, ty: 0 };
  };

  return (
    <svg
      ref={svgRef}
      className="map-svg"
      viewBox="0 0 1600 1000"
      preserveAspectRatio="xMidYMid slice"
      onMouseMove={handleMouseMove}
      onMouseLeave={() => onHover(null)}
    >
      <defs>
        <clipPath id="lens-clip">
          <circle cx={lensPos.x} cy={lensPos.y} r={LENS_R} />
        </clipPath>
        <radialGradient id="lens-bg" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#F4FAFE"/>
          <stop offset="100%" stopColor="#D4E8F2"/>
        </radialGradient>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="white" stopOpacity="0.55"/>
          <stop offset="60%" stopColor="white" stopOpacity="0.0"/>
        </radialGradient>
      </defs>

      {/* Camera-transformed map — transform attribute is driven imperatively
          via cameraRef so the rAF animation isn't clobbered by React re-renders
          (which happen continuously due to mouse-move lens tracking). */}
      <g
        ref={cameraRef}
        className={`map hover-${hoverIntensity}`}
        data-hover={hoverId ? 'true' : 'false'}
        data-active={activeId ? 'true' : 'false'}
      >
        {/* Ambient hover glow under the hovered continent */}
        {hovered && (
          <ellipse
            cx={hovered.cx} cy={hovered.cy + 40}
            rx={150} ry={40}
            fill="url(#glow)"
            style={{ transition: 'opacity 240ms ease', pointerEvents: 'none' }}
          />
        )}

        {CONTINENTS.map(c => {
          const isHover = hoverId === c.id;
          const isActive = activeId === c.id;
          const { tx, ty } = projOffset(c);
          const userOffset = offsets[c.id] || { dx: 0, dy: 0 };
          return (
            <g
              key={c.id}
              ref={(el) => { offsetGroupRefs.current[c.id] = el; }}
              transform={`translate(${userOffset.dx},${userOffset.dy})`}
            >
              <g
                className={[
                  'continent',
                  isHover ? 'is-hover' : '',
                  isActive ? 'is-active' : '',
                  editMode ? 'is-editable' : '',
                ].join(' ')}
                style={{
                  transformBox: 'fill-box',
                  transformOrigin: 'center',
                  ...(tx || ty ? { transform: `translate(${tx}px, ${ty}px)` } : {}),
                  cursor: editMode ? 'grab' : 'pointer',
                }}
                onMouseEnter={() => onHover(c.id)}
                onMouseDown={(e) => onContinentMouseDown(e, c)}
                onClick={() => handleContinentClick(c)}
              >
                <ContinentContent c={c} density={density} animate={ambient}/>
                {/* Transparent hit-area drawn last so it sits above icons and reliably catches clicks */}
                {c.paths.map((d, i) => (
                  <path
                    key={`hit${i}`}
                    d={d}
                    fill="rgba(255,255,255,0.001)"
                    style={{ pointerEvents: 'all', cursor: editMode ? 'grab' : 'pointer' }}
                  />
                ))}
                {!activeId && (
                  <text
                    className={`continent-label ${isActive ? 'is-active' : ''}`}
                    x={c.labelX} y={c.labelY}
                    style={{ fontSize: c.labelSize, pointerEvents: 'none' }}
                  >
                    {c.label}
                  </text>
                )}
                {editMode && (
                  <g pointerEvents="none">
                    {/* Subtle drag affordance: dashed outline + small handle dot */}
                    <path d={c.paths[0]} fill="none" stroke="rgba(31,49,68,0.55)" strokeWidth="2" strokeDasharray="6 5"/>
                    <g transform={`translate(${c.cx},${c.cy})`}>
                      <circle r="18" fill="rgba(255,248,236,0.95)" stroke="rgba(31,49,68,0.6)" strokeWidth="1.5"/>
                      <g stroke="rgba(31,49,68,0.85)" strokeWidth="2" strokeLinecap="round" fill="none">
                        <path d="M-7,0 L7,0 M0,-7 L0,7 M-7,-3 L-10,0 L-7,3 M7,-3 L10,0 L7,3 M-3,-7 L0,-10 L3,-7 M-3,7 L0,10 L3,7"/>
                      </g>
                    </g>
                  </g>
                )}
              </g>
            </g>
          );
        })}
      </g>

      {/* Magnifier lens — drawn last, outside the camera */}
      {showLens && hovered && !activeId && (
        <g style={{ pointerEvents: 'none' }}>
          {/* Magnified content clipped to circle */}
          <g clipPath="url(#lens-clip)">
            <circle cx={lensPos.x} cy={lensPos.y} r={LENS_R} fill="url(#lens-bg)"/>
            <g
              transform={`translate(${lensPos.x},${lensPos.y}) scale(2.1) translate(${-lensPos.x},${-lensPos.y})`}
            >
              <ContinentContent c={hovered} density={density} animate={false}/>
            </g>
          </g>
          {/* Lens ring + handle */}
          <circle className="lens-circle" cx={lensPos.x} cy={lensPos.y} r={LENS_R}/>
          <circle cx={lensPos.x} cy={lensPos.y} r={LENS_R + 4} fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="2"/>
          <line
            className="lens-handle"
            x1={lensPos.x + 0.72 * LENS_R}
            y1={lensPos.y + 0.72 * LENS_R}
            x2={lensPos.x + 1.4 * LENS_R}
            y2={lensPos.y + 1.4 * LENS_R}
          />
        </g>
      )}
    </svg>
  );
}

window.WorldMap = WorldMap;
window.ContinentContent = ContinentContent;

</script>

<script type="text/babel">
/* CountryPanel — cards in an elliptical ring around screen center; each card
   is independently draggable inside the panel. Drag commits to a tweak so the
   custom layout persists across reload. Quick-click still triggers the lesson;
   movement > 4 px upgrades the gesture to a drag. */

const COUNTRY_ICON_BY_NAME = {
  'USA': 'Eagle', 'Canada': 'Bear', 'Mexico': 'Tree', 'Cuba': 'Palm', 'Jamaica': 'Palm',
  'Brazil': 'Parrot', 'Argentina': 'Llama', 'Peru': 'Llama', 'Colombia': 'Parrot', 'Chile': 'Palm',
  'UK': 'Castle', 'France': 'House', 'Spain': 'House', 'Germany': 'Castle', 'Italy': 'House',
  'Egypt': 'Pyramid', 'Kenya': 'Lion', 'South Africa': 'Elephant', 'Morocco': 'Pyramid', 'Nigeria': 'Giraffe',
  'Japan': 'Blossom', 'China': 'Panda', 'India': 'Tiger', 'South Korea': 'Blossom', 'Thailand': 'Bamboo',
  'Australia': 'Kangaroo', 'New Zealand': 'Koala', 'Fiji': 'Reef', 'Papua N.G.': 'Reef',
  'Penguin Coast': 'Penguin', 'Aurora Bay': 'Aurora', 'Iceberg Isle': 'Iceberg', 'Glacier Pass': 'Iceberg',
};

const ICON_MAP = {
  Pyramid: IcoPyramid, Lion: IcoLion, Elephant: IcoElephant, Giraffe: IcoGiraffe,
  Panda: IcoPanda, Tiger: IcoTiger, Blossom: IcoBlossom, Bamboo: IcoBamboo,
  Castle: IcoCastle, Windmill: IcoWindmill, House: IcoHouse,
  Bear: IcoBear, Eagle: IcoEagle, Tree: IcoTree,
  Parrot: IcoParrot, Llama: IcoLlama, Palm: IcoPalm,
  Kangaroo: IcoKangaroo, Koala: IcoKoala, Reef: IcoReef,
  Penguin: IcoPenguin, Iceberg: IcoIceberg, Aurora: IcoAurora,
};

function CountryCard({ country, basePos, customPos, open, delay, onPick, onCommitPosition }) {
  const cardRef = React.useRef(null);
  const dragRef = React.useRef(null);
  const [isDragging, setIsDragging] = React.useState(false);

  const pos = customPos || basePos;

  const onMouseDown = (e) => {
    // Only left button
    if (e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();
    dragRef.current = {
      startX: e.clientX,
      startY: e.clientY,
      baseX: pos.x,
      baseY: pos.y,
      hasMoved: false,
    };

    const onMove = (mv) => {
      const d = dragRef.current;
      if (!d) return;
      const dx = mv.clientX - d.startX;
      const dy = mv.clientY - d.startY;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
        if (!d.hasMoved) {
          d.hasMoved = true;
          setIsDragging(true);
        }
      }
      if (d.hasMoved && cardRef.current) {
        cardRef.current.style.left = `${d.baseX + dx}px`;
        cardRef.current.style.top = `${d.baseY + dy}px`;
      }
    };
    const onUp = (uu) => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      const d = dragRef.current;
      if (!d) return;
      if (d.hasMoved) {
        const newX = d.baseX + (uu.clientX - d.startX);
        const newY = d.baseY + (uu.clientY - d.startY);
        onCommitPosition && onCommitPosition({ x: newX, y: newY });
        setIsDragging(false);
      } else {
        if (!country.locked) onPick && onPick(country);
      }
      dragRef.current = null;
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };

  const iconName = COUNTRY_ICON_BY_NAME[country.name] || 'Tree';
  const IconComp = ICON_MAP[iconName];

  return (
    <div
      ref={cardRef}
      className={`country-card ${country.locked ? 'is-locked' : ''} ${isDragging ? 'is-dragging' : ''}`}
      style={{
        left: `${pos.x}px`,
        top: `${pos.y}px`,
        transitionDelay: open && !isDragging ? `${delay}ms` : '0ms',
        cursor: country.locked ? 'not-allowed' : (isDragging ? 'grabbing' : 'grab'),
        zIndex: isDragging ? 100 : undefined,
      }}
      onMouseDown={onMouseDown}
    >
      {country.locked && (
        <div className="cc-lock"><IcoLock size={14}/></div>
      )}
      <div className="cc-illo" style={{ background: `${country.illoColor}22` }}>
        <svg width="84" height="84" viewBox="-42 -42 84 84">
          <circle r="34" fill={country.illoColor} opacity="0.18"/>
          {IconComp && <IconComp x={0} y={0} s={1.4} idle={open && !country.locked && !isDragging} d={0}/>}
        </svg>
      </div>
      <div className="cc-name">{country.name}</div>
      <div className="cc-row">
        <span>{country.desc}</span>
        <span className="cc-dot"></span>
        <span className="cc-difficulty">
          {[1,2,3].map(i => (
            <span key={i} className={`pip ${i <= country.diff ? 'on' : ''}`}></span>
          ))}
        </span>
      </div>
    </div>
  );
}

function CountryPanel({ activeId, onClose, onPickCountry, countryPositions, onCountryPositionsChange }) {
  const c = activeId ? CONTINENTS.find(x => x.id === activeId) : null;
  const open = !!c;

  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => {
    const onResize = () => setVp({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const countries = c ? c.countries : [];
  const n = countries.length;

  const CARD_W = 200;
  const CARD_H = 200;
  const TOP_SAFE = 100;
  const BOT_SAFE = 80;
  const SIDE_SAFE = 24;

  const ringCx = vp.w / 2;
  const ringCy = vp.h / 2 + 30;
  const maxRx = (vp.w - SIDE_SAFE * 2 - CARD_W) / 2;
  const maxRyUp = ringCy - TOP_SAFE - CARD_H / 2;
  const maxRyDown = vp.h - BOT_SAFE - ringCy - CARD_H / 2;
  const maxRy = Math.min(maxRyUp, maxRyDown);
  const targetRx = Math.min(maxRx, 380);
  const targetRy = Math.min(maxRy, 270);

  const angles = Array.from({ length: n }, (_, i) => -Math.PI / 2 + (2 * Math.PI / n) * i);
  const basePositions = angles.map(a => ({
    x: ringCx + Math.cos(a) * targetRx,
    y: ringCy + Math.sin(a) * targetRy,
  }));

  const titleY = Math.max(TOP_SAFE - 18, ringCy - targetRy - 80);

  const commitPosition = (countryName, pos) => {
    if (!onCountryPositionsChange) return;
    onCountryPositionsChange({
      ...countryPositions,
      [`${c.id}.${countryName}`]: pos,
    });
  };

  return (
    <div className={`country-layer ${open ? 'is-open' : ''}`}>
      <div className="country-backdrop" onClick={onClose}></div>
      {c && countries.map((country, i) => {
        const key = `${c.id}.${country.name}`;
        const customPos = countryPositions && countryPositions[key];
        return (
          <CountryCard
            key={country.name}
            country={country}
            basePos={basePositions[i]}
            customPos={customPos}
            delay={120 + i * 80}
            open={open}
            onPick={onPickCountry}
            onCommitPosition={(p) => commitPosition(country.name, p)}
          />
        );
      })}
      {c && (
        <div
          style={{
            position: 'absolute',
            left: '50%',
            top: `${titleY}px`,
            transform: 'translateX(-50%)',
            opacity: open ? 1 : 0,
            transition: `opacity 380ms ease ${open ? 280 : 0}ms`,
            background: 'rgba(255, 248, 236, 0.92)',
            backdropFilter: 'blur(8px)',
            padding: '10px 24px',
            borderRadius: '999px',
            fontFamily: 'var(--font-display)',
            fontSize: 22,
            fontWeight: 600,
            color: 'var(--ink)',
            boxShadow: '0 8px 20px rgba(15, 50, 80, 0.18)',
            whiteSpace: 'nowrap',
          }}
        >
          {c.label} <span style={{ opacity: 0.5 }}>·</span> Pick a country
          <span style={{ marginLeft: 14, fontSize: 12, fontWeight: 500, color: 'var(--ink-soft)', opacity: 0.75 }}>
            (drag cards to rearrange)
          </span>
        </div>
      )}
    </div>
  );
}

window.CountryPanel = CountryPanel;

</script>

<script type="text/babel">
/* App — top chrome, map, panel, tweaks */

const { useState, useEffect, useMemo, useRef } = React;

const PALETTES = {
  classic: {
    label: 'Sunny Sky',
    ocean1: '#BEE3F0', ocean2: '#8FCDE5', ocean3: '#5FAFD0',
    paper: '#FFF8EC', ink: '#1F3144', accent: '#F2B544', accent2: '#E87A6E',
    chips: ['#7FC79A','#A8D77A','#C3A7E0','#F2C66B','#F4A2B6','#F2A56B','#E6F1F8'],
  },
  meadow: {
    label: 'Meadow Pop',
    ocean1: '#FFE9C7', ocean2: '#F9CFA2', ocean3: '#F2B070',
    paper: '#FFFBF2', ink: '#3D2A1F', accent: '#E27F4A', accent2: '#9CCC65',
    chips: ['#9CCC65','#7BC4A8','#A78CE0','#F4C84B','#F08D7A','#F2A56B','#F0E6DA'],
  },
  dusk: {
    label: 'Cosmic Dusk',
    ocean1: '#3D4E78', ocean2: '#2A3D5C', ocean3: '#1B2A44',
    paper: '#FFF5E1', ink: '#FFF5E1', accent: '#FFD166', accent2: '#EF476F',
    chips: ['#06D6A0','#9CE0B3','#A78CE0','#FFD166','#EF476F','#FF8C42','#EAF4FB'],
  },
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "classic",
  "hoverIntensity": "medium",
  "projection": "blobs",
  "density": "rich",
  "showChrome": true,
  "showLens": true,
  "ambient": true,
  "sound": false,
  "rearrangeMode": false,
  "continentOffsets": {
    "na": { "dx": -5.91, "dy": 0 },
    "sa": { "dx": 5.91, "dy": -2.96 },
    "eu": { "dx": 22.17, "dy": 14.78 },
    "as": { "dx": 47.30, "dy": -16.26 }
  },
  "countryPositions": {}
}/*EDITMODE-END*/;

function Cloud({ top, duration, delay, scale }) {
  return (
    <div
      className="cloud"
      style={{
        top: `${top}vh`,
        animationDuration: `${duration}s`,
        animationDelay: `${delay}s`,
      }}
    >
      <CloudShape scale={scale}/>
    </div>
  );
}

function TopChrome({ show, paletteVars }) {
  return (
    <div
      className="chrome"
      style={{
        opacity: show ? 1 : 0,
        transform: show ? 'translateY(0)' : 'translateY(-12px)',
        transition: 'opacity 320ms ease, transform 320ms ease',
        pointerEvents: show ? 'auto' : 'none',
      }}
    >
      <div className="brand">
        <div className="brand-mark">L</div>
        <div>
          <div className="brand-name">Gaming English</div>
          <div className="brand-sub">Dünya'yı Keşfet · Öğren</div>
        </div>
      </div>

      <div className="hud">
        <div className="hud-chip">
          <IcoStreak/>
          <span className="hud-chip-val">14</span>
          <span style={{ color: 'var(--ink-soft)', fontWeight: 500, fontSize: 12 }}>day streak</span>
        </div>
        <div className="hud-chip">
          <IcoGem/>
          <span className="hud-chip-val">238</span>
        </div>
        <div className="hud-chip">
          <IcoStar/>
          <span className="hud-chip-val">1,820</span>
        </div>
        <div className="avatar">
          <div className="avatar-ring">A</div>
          <div>
            <div className="avatar-name">Ava · Lv 12</div>
            <div className="avatar-meta">Globe Trotter</div>
            <div className="xp-bar"><div className="xp-fill" style={{ width: '62%' }}></div></div>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const palette = PALETTES[t.palette] || PALETTES.classic;

  const [hoverId, setHoverId] = useState(null);
  const [activeId, setActiveId] = useState(null);
  const [lensPos, setLensPos] = useState({ x: 800, y: 500 });

  // Apply palette as CSS variables on root
  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--ocean-1', palette.ocean1);
    r.style.setProperty('--ocean-2', palette.ocean2);
    r.style.setProperty('--ocean-3', palette.ocean3);
    r.style.setProperty('--paper', palette.paper);
    r.style.setProperty('--ink', palette.ink);
    r.style.setProperty('--gold', palette.accent);
    r.style.setProperty('--coral', palette.accent2);
  }, [t.palette]);

  // Esc closes the country panel
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape' && activeId) setActiveId(null);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [activeId]);

  const handleContinentClick = (id) => {
    if (activeId === id) return;
    setActiveId(id);
    setHoverId(null);
  };

  const handlePickCountry = (country) => {
    // For prototype, just briefly flash a toast
    // Gaming English siteye yönlendir
    const continent = CONTINENTS.find(c => c.countries.some(x => x.name === country.name));
    const continentMap = {
      'na': 'NorthAmerica', 'sa': 'SouthAmerica', 'eu': 'Europe',
      'af': 'Africa', 'as': 'Asia', 'oc': 'Oceania', 'an': null
    };
    const continentId = continent ? continentMap[continent.id] : null;

    const el = document.createElement('div');
    el.textContent = `Starting lesson: ${country.name} →`;
    el.style.cssText = `
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: var(--ink); color: var(--paper);
      padding: 14px 22px; border-radius: 999px;
      font-family: var(--font-display); font-weight: 600; font-size: 18px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.3);
      z-index: 1000; pointer-events: none;
      animation: toastIn 1600ms ease forwards;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  };

  const clouds = useMemo(() => [
    { top: 8,  duration: 80,  delay: -10, scale: 0.7 },
    { top: 22, duration: 110, delay: -40, scale: 1.0 },
    { top: 60, duration: 95,  delay: -20, scale: 0.55 },
    { top: 78, duration: 130, delay: -60, scale: 0.85 },
  ], []);

  return (
    <div style={{ width: '100vw', height: '100vh', position: 'relative' }}>
      <div className="ocean">
        {t.ambient && clouds.map((c, i) => <Cloud key={i} {...c}/>)}
      </div>

      <TopChrome show={t.showChrome} />

      <div className="stage">
        <WorldMap
          activeId={activeId}
          hoverId={hoverId}
          onHover={setHoverId}
          onClick={handleContinentClick}
          hoverIntensity={t.hoverIntensity}
          density={t.density}
          theme={t.palette}
          projection={t.projection}
          showLens={t.showLens && !activeId && !t.rearrangeMode}
          lensPos={lensPos}
          setLensPos={setLensPos}
          ambient={t.ambient}
          editMode={t.rearrangeMode}
          offsets={t.continentOffsets || {}}
          onOffsetsChange={(o) => setTweak('continentOffsets', o)}
        />
      </div>

      <CountryPanel
        activeId={activeId}
        onClose={() => setActiveId(null)}
        onPickCountry={handlePickCountry}
        countryPositions={t.countryPositions || {}}
        onCountryPositionsChange={(p) => setTweak('countryPositions', p)}
      />

      {activeId && (
        <button className="close-btn" onClick={() => setActiveId(null)} aria-label="Close">
          ←
        </button>
      )}

      {/* Ana sayfa butonu */}
      <a href="index.html" style={{
        position:'absolute', top:20, right:20,
        background:'rgba(255,248,236,0.85)', backdropFilter:'blur(8px)',
        padding:'10px 18px', borderRadius:999, textDecoration:'none',
        fontFamily:'var(--font-display)', fontWeight:600, fontSize:13,
        color:'var(--ink)', boxShadow:'0 6px 18px rgba(15,50,80,0.12)',
        zIndex:30, letterSpacing:'0.02em', textTransform:'uppercase'
      }}>
        ← Ana Sayfa
      </a>

      {!activeId && (
        <div className="hint">
          <span>Bir kıtanın üzerine gel</span>
          <span className="kbd">click</span>
          <span>→ ülkeleri gör</span>
        </div>
      )}

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakColor
          label="Palette"
          value={
            t.palette === 'classic' ? ['#BEE3F0', '#7FC79A', '#F2C66B']
            : t.palette === 'meadow' ? ['#F9CFA2', '#9CCC65', '#F08D7A']
            : ['#2A3D5C', '#06D6A0', '#FFD166']
          }
          options={[
            ['#BEE3F0', '#7FC79A', '#F2C66B'],
            ['#F9CFA2', '#9CCC65', '#F08D7A'],
            ['#2A3D5C', '#06D6A0', '#FFD166'],
          ]}
          onChange={(v) => {
            const name = v[0] === '#BEE3F0' ? 'classic' : v[0] === '#F9CFA2' ? 'meadow' : 'dusk';
            setTweak('palette', name);
          }}
        />

        <TweakSection label="Interaction" />
        <TweakRadio
          label="Hover lift"
          value={t.hoverIntensity}
          options={['subtle','medium','dramatic']}
          onChange={(v) => setTweak('hoverIntensity', v)}
        />
        <TweakToggle
          label="Magnifying lens"
          value={t.showLens}
          onChange={(v) => setTweak('showLens', v)}
        />
        <TweakToggle
          label="Ambient motion"
          value={t.ambient}
          onChange={(v) => setTweak('ambient', v)}
        />

        <TweakSection label="Map" />
        <TweakRadio
          label="Projection"
          value={t.projection}
          options={['blobs','islands']}
          onChange={(v) => setTweak('projection', v)}
        />
        <TweakRadio
          label="Icon density"
          value={t.density}
          options={['sparse','normal','rich']}
          onChange={(v) => setTweak('density', v)}
        />

        <TweakSection label="Rearrange" />
        <TweakToggle
          label="Drag continents"
          value={t.rearrangeMode}
          onChange={(v) => setTweak('rearrangeMode', v)}
        />
        <TweakButton
          label="Reset continent positions"
          onClick={() => setTweak('continentOffsets', {})}
        />
        <TweakButton
          label="Reset country card positions"
          onClick={() => setTweak('countryPositions', {})}
        />

        <TweakSection label="Chrome" />
        <TweakToggle
          label="Show top HUD"
          value={t.showChrome}
          onChange={(v) => setTweak('showChrome', v)}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
