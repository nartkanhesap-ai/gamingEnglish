<style>

/* ============================================================= THEME TOKENS */
:root {
  /* KIDS (default) — cozy candy */
  --bg:        oklch(0.96 0.015 85);
  --bg-2:      oklch(0.93 0.02 82);
  --panel:     oklch(0.99 0.008 80);
  --panel-2:   oklch(0.96 0.015 75);
  --ink:       oklch(0.34 0.045 50);
  --ink-soft:  oklch(0.52 0.04 55);
  --line:      oklch(0.88 0.02 70);
  --primary:   oklch(0.58 0.10 135);
  --primary-d: oklch(0.48 0.10 135);
  --primary-ink: oklch(0.99 0.01 80);
  --mint:      oklch(0.78 0.13 165);
  --mint-d:    oklch(0.68 0.13 165);
  --sky:       oklch(0.76 0.11 235);
  --sun:       oklch(0.85 0.14 88);
  --sun-d:     oklch(0.76 0.14 80);
  --gem:       oklch(0.72 0.14 200);
  --gem-d:     oklch(0.60 0.14 200);
  --coin:      oklch(0.82 0.15 85);
  --heart:     oklch(0.70 0.18 18);
  --shadow:    oklch(0.55 0.06 50 / 0.22);
  --hud-blur: 0px;
  --display: 'Fredoka', system-ui, sans-serif;
  --body: 'Nunito', system-ui, sans-serif;
  --r-lg: 26px;
  --r-md: 18px;
  --r-sm: 12px;
}

/* ============================================================= BASE */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; height: 100%; }
body {
  font-family: var(--body);
  color: var(--ink);
  background:
    radial-gradient(120% 80% at 50% -10%, var(--bg) 0%, var(--bg-2) 70%, var(--bg-2) 100%);
  overflow: hidden;
  -webkit-user-select: none; user-select: none;
  transition: background 0.4s ease;
}
h1,h2,h3,h4 { font-family: var(--display); margin: 0; font-weight: 600; }
#root { height: 100%; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
.tabular { font-variant-numeric: tabular-nums; }

/* ===========================================================================
   TELEFON / TABLET — SABİT TASARIM + ÖLÇEKLE-SIĞDIR
   Dokunmatik cihazlarda oyun sabit 1100x680 yatay tuvalde render edilir,
   sonra JS ile ekrana sığacak şekilde orantılı küçültülür (iç içe geçmez).
   Bilgisayar (fare) HİÇ etkilenmez.
   =========================================================================== */
body.mw-scaled { overflow: hidden; }
body.mw-scaled #root {
  position: fixed;
  top: 50%;
  left: 50%;
  width: var(--mw-w, 1200px);
  height: var(--mw-h, 720px);
  transform: translate(-50%, -50%) scale(var(--mw-scale, 1));
  transform-origin: center center;
}

/* "Telefonu yan çevir" ekranı (dik tutuşta) */
#mw-rotate-prompt {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 99999;
  background: radial-gradient(120% 80% at 50% -10%, var(--bg, #f5f0e6) 0%, var(--bg-2, #ece4d6) 100%);
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 32px;
}
#mw-rotate-prompt .mw-rp-inner { max-width: 320px; }
#mw-rotate-prompt .mw-rp-phone {
  width: 92px; height: 56px;
  margin: 0 auto 28px;
  border: 4px solid var(--ink, #5a4a3a);
  border-radius: 12px;
  position: relative;
  animation: mwRotatePhone 2.2s ease-in-out infinite;
}
#mw-rotate-prompt .mw-rp-phone-body {
  position: absolute; inset: 5px;
  border-radius: 5px;
  background: var(--primary, #7cb342);
  opacity: .55;
}
@keyframes mwRotatePhone {
  0%, 30%   { transform: rotate(90deg); }
  60%, 100% { transform: rotate(0deg); }
}
#mw-rotate-prompt .mw-rp-title {
  font-family: var(--display, sans-serif);
  font-weight: 800;
  font-size: 22px;
  color: var(--ink, #5a4a3a);
  margin-bottom: 10px;
}
#mw-rotate-prompt .mw-rp-text {
  font-family: var(--body, sans-serif);
  font-size: 14.5px;
  font-weight: 600;
  line-height: 1.6;
  color: var(--ink-soft, #8a7a68);
}


/* ============================================================= JUICY PRIMITIVES */
/* chunky pressable button with a solid bottom edge = depth */
.btn3d {
  position: relative; border-radius: var(--r-md);
  font-family: var(--display); font-weight: 600;
  color: var(--primary-ink); background: var(--primary);
  box-shadow: 0 5px 0 0 var(--primary-d), 0 9px 14px -4px var(--shadow);
  transition: transform .08s ease, box-shadow .08s ease, filter .15s ease;
  padding: 11px 18px; line-height: 1;
}
.btn3d:hover { filter: brightness(1.04); }
.btn3d:active { transform: translateY(4px); box-shadow: 0 1px 0 0 var(--primary-d), 0 3px 8px -3px var(--shadow); }
.btn3d.mint { background: var(--mint); box-shadow: 0 5px 0 0 var(--mint-d), 0 9px 14px -4px var(--shadow); color: oklch(0.25 0.05 165); }
.btn3d.sun  { background: var(--sun);  box-shadow: 0 5px 0 0 var(--sun-d),  0 9px 14px -4px var(--shadow); color: oklch(0.32 0.08 70); }
.btn3d.ghost { background: var(--panel); color: var(--ink); box-shadow: 0 5px 0 0 var(--line), 0 9px 14px -4px var(--shadow); }
.btn3d:disabled { opacity: .5; filter: grayscale(.4); cursor: not-allowed; box-shadow: 0 5px 0 0 var(--primary-d); }
.btn3d:disabled:active { transform: none; }

.card {
  background: var(--panel); border-radius: var(--r-lg);
  box-shadow: 0 1px 0 oklch(1 0 0 / .5) inset, 0 10px 26px -12px var(--shadow);
  border: 1.5px solid var(--line);
}

/* icon circle button in docks/HUD */
.iconbtn {
  width: 54px; height: 54px; border-radius: 50%;
  display: grid; place-items: center; font-size: 24px;
  background: var(--panel); color: var(--ink);
  box-shadow: 0 4px 0 var(--line), 0 7px 12px -5px var(--shadow);
  transition: transform .08s ease, box-shadow .08s ease, background .2s;
  border: 1.5px solid var(--line);
}
.iconbtn:hover { transform: translateY(-1px); }
.iconbtn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--line); }
.iconbtn.active { background: var(--primary); color: var(--primary-ink); box-shadow: 0 4px 0 var(--primary-d), 0 7px 12px -5px var(--shadow); border-color: transparent; }

/* glassy HUD pill (currency) */
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--panel); border-radius: 999px;
  padding: 6px 14px 6px 7px; border: 1.5px solid var(--line);
  box-shadow: 0 4px 0 var(--line), 0 8px 16px -8px var(--shadow);
  font-family: var(--display); font-weight: 600;
}

.rarity-chip {
  font-family: var(--display); font-weight: 600; font-size: 11px;
  padding: 2px 9px; border-radius: 999px; letter-spacing: .3px;
  text-transform: uppercase;
}

/* ============================================================= SCROLLBARS */
.scroll::-webkit-scrollbar { height: 8px; width: 8px; }
.scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }
.scroll { scrollbar-width: thin; scrollbar-color: var(--line) transparent; }

/* hide scrollbar for ribbons */
.noscroll::-webkit-scrollbar { display: none; }
.noscroll { -ms-overflow-style: none; scrollbar-width: none; }

/* ============================================================= ANIMATIONS */
@keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }

/* ===== v3 TRUE WALK CYCLE — contact / passing / peak ===== */
/* hip-pivoting stride: 0% contact front → 25% passing (lifted) → 50% contact back → 75% passing */
@keyframes stride {
  0%   { transform: rotate(26deg); }
  25%  { transform: rotate(0deg) translateY(-7px); }
  50%  { transform: rotate(-24deg); }
  75%  { transform: rotate(0deg) translateY(-7px); }
  100% { transform: rotate(26deg); }
}
@keyframes walkbob { /* weight transfer: dips on each contact (twice per cycle) */
  0%,50%,100% { transform: translateY(2px); }
  25%,75%     { transform: translateY(-4px); }
}
@keyframes armswing {
  0%   { transform: rotate(-30deg); }
  50%  { transform: rotate(26deg); }
  100% { transform: rotate(-30deg); }
}
@keyframes earflop {
  0%,100% { transform: rotate(var(--ear-rot, -18deg)); }
  50% { transform: rotate(calc(var(--ear-rot, -18deg) + var(--ear-amt, -9deg))); }
}
@keyframes breathe { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.025) translateY(-1px); } }
@keyframes tailswish { 0%,100% { transform: rotate(-4deg); } 50% { transform: rotate(12deg); } }
@keyframes sitsettle { 0% { transform: translateY(-26px) scaleY(1.04); } 55% { transform: translateY(4px) scaleY(0.94); } 100% { transform: translateY(0) scaleY(1); } }

/* ===== v4 ACTIVITY ANIMATIONS ===== */
@keyframes digchop { 0%,100% { transform: rotate(-50deg); } 50% { transform: rotate(-95deg); } }
@keyframes digbob { 0%,100% { transform: translateY(0) rotate(2deg); } 50% { transform: translateY(3px) rotate(-2deg); } }
@keyframes ballbounce { 0%,100% { transform: translateY(34px); } 50% { transform: translateY(-16px); } }
@keyframes droplet { 0% { transform: translate(0,0) scale(1); opacity: .9; } 100% { transform: translate(var(--dx,0), 38px) scale(.6); opacity: 0; } }
@keyframes dirtfling { 0% { transform: translate(0,0) rotate(0); opacity: 1; } 100% { transform: translate(var(--dx), -34px) rotate(160deg); opacity: 0; } }
@keyframes sproutpop { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }
@keyframes fruitfly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--dx), -70px) scale(.5); opacity: 0; } }

/* ===== v7 wings / fish / minigame keyframes ===== */
@keyframes flutter { 0%,100% { transform: rotate(-18deg) scaleX(1); } 50% { transform: rotate(-26deg) scaleX(0.88); } }
@keyframes fishswim { 0% { transform: translateX(0) scaleX(1); } 46% { transform: translateX(var(--swim, 40px)) scaleX(1); } 50% { transform: translateX(var(--swim, 40px)) scaleX(-1); } 96% { transform: translateX(0) scaleX(-1); } 100% { transform: translateX(0) scaleX(1); } }
@keyframes bobble { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
@keyframes pinwobble { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
@keyframes pinfall { 0% { transform: rotate(0) translateY(0); opacity: 1; } 100% { transform: rotate(86deg) translateY(14px); opacity: 0; } }
@keyframes ballroll { from { transform: translateY(0) scale(1) rotate(0); } to { transform: translateY(-290px) scale(0.45) rotate(720deg); } }
@keyframes gemfountain { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--gx), -110px) scale(.5); opacity: 0; } }
@keyframes wavebob { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-26px); } }

/* ===== v9 mythic furniture keyframes ===== */
@keyframes eqbar { 0%,100% { transform: scaleY(0.3); } 50% { transform: scaleY(1); } }
@keyframes notefloat { 0% { transform: translateY(0); opacity: 0; } 15% { opacity: 1; } 100% { transform: translateY(-64px); opacity: 0; } }
@keyframes bubblerise { 0% { transform: translateY(0) scale(0.6); opacity: 0; } 20% { opacity: 0.9; } 100% { transform: translateY(-44px) scale(1.1); opacity: 0; } }
@keyframes mythicaura { 0%,100% { box-shadow: 0 0 0 1.5px oklch(0.62 0.24 305), 0 0 14px -2px oklch(0.62 0.24 305 / .7), 0 10px 24px -12px var(--shadow); } 50% { box-shadow: 0 0 0 2px oklch(0.70 0.24 305), 0 0 26px 0 oklch(0.65 0.24 305 / .9), 0 10px 24px -12px var(--shadow); } }
@keyframes capewave { 0%,100% { transform: rotate(-3deg) skewX(2deg) scaleY(1); } 50% { transform: rotate(3deg) skewX(-2deg) scaleY(1.04); } }
@keyframes audiopulse { 0% { transform: scale(1); opacity: .5; } 100% { transform: scale(1.5); opacity: 0; } }
@keyframes slidein { from { transform: translateX(-16px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes chomp { 0%,100% { transform: translateY(0) scale(1); } 20% { transform: translateY(-8px) scale(1.1); } 45% { transform: translateY(-2px) scale(0.85); } 70% { transform: translateY(-6px) scale(1.05); } }
@keyframes missyou { 0% { transform: translateY(8px) scale(.8); opacity: 0; } 15%,85% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-6px); opacity: 0; } }

/* ===== v14 per-species idle personality animations ===== */
@keyframes idle-lick   { 0%,100% { transform: rotate(0) translateY(0); } 30%,65% { transform: rotate(-12deg) translateY(3px); } }
@keyframes idle-scratch{ 0%,100% { transform: rotate(0) translate(0,0); } 20%,40%,60% { transform: rotate(11deg) translate(5px, 2px); } 30%,50% { transform: rotate(7deg) translate(3px, 4px); } }
@keyframes idle-spin   { 0% { transform: rotate(0) scaleX(1); } 12% { transform: rotate(0) scaleX(1) translateY(-4px); } 55% { transform: rotate(370deg) scaleX(1); } 72% { transform: rotate(360deg) rotate(14deg); } 86% { transform: rotate(360deg) rotate(-8deg); } 100% { transform: rotate(360deg); } }
@keyframes idle-yawn   { 0%,100% { transform: scaleY(1) rotate(0); } 35% { transform: scaleY(1.05) rotate(-5deg) translateY(-3px); } 55%,70% { transform: scaleY(1.16) rotate(-7deg) translateY(2px); } }
@keyframes idle-peck   { 0%,100% { transform: translateY(0) rotate(0); } 20% { transform: translateY(16px) rotate(-9deg); } 40% { transform: translateY(0) rotate(0); } 60% { transform: translateY(16px) rotate(9deg); } 80% { transform: translateY(0) rotate(0); } }
@keyframes idle-dance  { 0%,100% { transform: translateX(0) rotate(0); } 25% { transform: translateX(-12px) rotate(-8deg); } 75% { transform: translateX(12px) rotate(8deg); } }
@keyframes idle-pushup { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(18px) rotate(2deg); } }
@keyframes idle-chew   { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(4px) rotate(-3deg); } }
@keyframes idle-fxpop  { 0% { transform: translateY(0) scale(.5); opacity: 0; } 25% { opacity: 1; } 100% { transform: translateY(-22px) scale(1.1); opacity: 0; } }
@keyframes idle-pawlift { 0%,100% { transform: rotate(0) translateY(0); } 35%,65% { transform: rotate(-128deg) translateY(-4px); } }
@keyframes hoverglide { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
@keyframes moonhop { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-16px); } 70% { transform: translateY(-4px); } }
@keyframes winghop { 0%,100% { transform: translateY(0); } 45% { transform: translateY(-10px); } }
@keyframes thruster { 0%,100% { transform: scaleY(1) scaleX(1); opacity: .85; } 50% { transform: scaleY(1.3) scaleX(0.8); opacity: 1; } }
@keyframes wingflap { 0%,100% { transform: scaleX(var(--wf,1)) rotate(-12deg); } 50% { transform: scaleX(var(--wf,1)) rotate(18deg); } }

/* ===== v10 shell-shift keyframes ===== */
@keyframes flicker { 0%,100% { transform: scaleY(1) scaleX(1); opacity: .95; } 30% { transform: scaleY(1.15) scaleX(0.92); opacity: 1; } 60% { transform: scaleY(0.88) scaleX(1.06); opacity: .85; } }
@keyframes caustics { 0%,100% { background-position: 0 0; } 50% { background-position: 30px 14px; } }
@keyframes whalepass { 0% { transform: translateX(-120%); } 100% { transform: translateX(360%); } }
@keyframes neonrun { 0% { background-position: 0 0; } 100% { background-position: 200px 0; } }
@keyframes shroomglow { 0%,100% { filter: drop-shadow(0 0 4px oklch(0.75 0.15 200)); opacity: .8; } 50% { filter: drop-shadow(0 0 12px oklch(0.80 0.18 200)); opacity: 1; } }
@keyframes scansweep { 0%,100% { top: 8%; } 50% { top: 92%; } }
@keyframes sheensweep { 0%,55% { left: -70%; } 95%,100% { left: 140%; } }

/* ===== v3 PARTICLES ===== */
@keyframes dustpuff {
  0%   { transform: translate(0, 0) scale(0.5); opacity: .8; }
  100% { transform: translate(var(--dx, -14px), -16px) scale(1.5); opacity: 0; }
}
@keyframes sparklepop {
  0%   { transform: translate(0,0) scale(0) rotate(0deg); opacity: 1; }
  35%  { transform: translate(calc(var(--sx) * .6), calc(var(--sy) * .6)) scale(1.25) rotate(90deg); opacity: 1; }
  100% { transform: translate(var(--sx), var(--sy)) scale(0) rotate(220deg); opacity: 0; }
}
@keyframes placedpop { 0% { transform: translate(-50%,-50%) scale(.4); } 60% { transform: translate(-50%,-50%) scale(1.12); } 100% { transform: translate(-50%,-50%) scale(1); } }

/* ===== v3 BOUTIQUE SHINE ===== */
.item-frame { position: relative; overflow: hidden; border-radius: 14px;
  background: radial-gradient(120% 90% at 50% 18%, oklch(1 0.01 85) 0%, var(--panel-2) 78%);
  box-shadow: inset 0 0 0 1.5px var(--line), inset 0 -10px 16px -12px var(--shadow); }
.item-frame::after { content: ''; position: absolute; top: -30%; bottom: -30%; left: -80%; width: 45%;
  background: linear-gradient(105deg, transparent 0%, oklch(1 0 0 / .55) 50%, transparent 100%);
  transform: skewX(-18deg); animation: shinesweep 3.4s ease-in-out infinite; }
@keyframes shinesweep { 0%, 55% { left: -80%; } 90%, 100% { left: 150%; } }
@keyframes blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.1); } }
@keyframes tailwag { 0%,100% { transform: rotate(-6deg); } 50% { transform: rotate(10deg); } }
@keyframes popin { 0% { transform: scale(.7); opacity: 0; } 70% { transform: scale(1.06); } 100% { transform: scale(1); opacity: 1; } }
@keyframes slideup { from { transform: translateY(24px); } to { transform: translateY(0); } }
@keyframes coinfly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--fx,0), var(--fy,-120px)) scale(.4); opacity: 0; } }
@keyframes shake { 0%,100% { transform: rotate(0) translateX(0); } 20% { transform: rotate(-7deg) translateX(-6px); } 40% { transform: rotate(6deg) translateX(6px); } 60% { transform: rotate(-5deg) translateX(-4px); } 80% { transform: rotate(4deg) translateX(4px); } }
@keyframes burst { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2.6); opacity: 0; } }
@keyframes spark { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; } }
@keyframes glowpulse { 0%,100% { filter: drop-shadow(0 0 6px var(--g)); } 50% { filter: drop-shadow(0 0 22px var(--g)); } }
@keyframes ringspin { to { transform: rotate(360deg); } }
@keyframes toastin { 0% { transform: translateY(20px) scale(.9); opacity: 0; } 15% { transform: translateY(0) scale(1); opacity: 1; } 85% { opacity: 1; transform: translateY(0); } 100% { transform: translateY(-8px); opacity: 0; } }

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: .001ms !important; }
}


/* Üretim: Tweaks/demo panelini gizle */

// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.
// Exports (to window): useTweaks, TweaksPanel, TweakSection, TweakRow, TweakSlider,
//   TweakToggle, TweakRadio, TweakSelect, TweakText, TweakNumber, TweakColor, TweakButton.
//
// Owns the host protocol (listens for __activate_edit_mode / __deactivate_edit_mode,
// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so
// individual prototypes don't re-roll it. Ships a consistent set of controls so you

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel" data-presets="react">
// firebase.jsx — My World için Firebase COMPAT entegrasyonu (Gaming English ile uyumlu).
// Compat SDK senkron yüklenir; window.firebase global'i hazır olur.
// Mevcut değilse mock/localStorage moduna düşer.

(function () {
  function defaultDoc(name) {
    return {
      profile: { name: name || 'Explorer', ageBand: 'kids', level: 1 },
      wallet: { gems: 0, coins: 0, hearts: 0 },
      pet: { name: 'Mochi', species: 'cat', custom: { coatId: 'coat_natural', eyeId: 'eye_forest', blushId: 'bl_peach', markId: 'mk_none' }, worn: ['c_straw', 'c_overall'] },
      inventory: { owned: ['c_straw', 'c_overall', 'c_tee', 'c_bow'], counts: { f_bed: 1, f_table: 1 } },
      rooms: null,
      needs: { hunger: 80, happy: 85, lastSeen: Date.now() },
      progress: [], pantry: {}, social: { cardsSentToday: {}, board: [] },
      houseWealth: 0,
    };
  }

  function deepMerge(a, b) {
    const out = { ...a };
    for (const k in b) {
      if (b[k] && typeof b[k] === 'object' && !Array.isArray(b[k]) && typeof out[k] === 'object') out[k] = deepMerge(out[k], b[k]);
      else out[k] = b[k];
    }
    return out;
  }

  // Firebase compat hazır mı? (window.firebase + initializeApp yapılmış)
  const LIVE = !!(window.firebase && window.firebase.auth && window.firebase.firestore && window.__MW_FB_READY);

  let saveTimer = null, pendingPatch = {}, currentUid = null, authCbs = [];

  // ====================== LIVE (Firebase compat) ======================
  function liveModule() {
    const auth = window.firebase.auth();
    const db = window.firebase.firestore();
    const FieldValue = window.firebase.firestore.FieldValue;

    auth.onAuthStateChanged((user) => {
      currentUid = user ? user.uid : null;
      window.__mcUid = currentUid;
      const payload = user ? { uid: user.uid, name: user.displayName || user.email } : null;
      authCbs.forEach((cb) => cb(payload));
    });

    return {
      ready: () => Promise.resolve(),
      isLive: () => true,
      uid: () => currentUid || 'guest',
      onAuth: (cb) => { authCbs.push(cb); if (currentUid) cb({ uid: currentUid }); },
      signIn: (email, pw) => auth.signInWithEmailAndPassword(email, pw),
      signOut: () => auth.signOut(),
      loadMe: async () => {
        if (!currentUid) return defaultDoc('Student');
        const ref = db.collection('users').doc(currentUid);
        const snap = await ref.get();
        if (snap.exists) {
          const d = snap.data();
          // GAMING ENGLISH KÖPRÜSÜ: kök gems tek doğruluk kaynağı
          if (d.gems != null) { d.wallet = d.wallet || {}; d.wallet.gems = d.gems; }
          // Mevcut English Coach öğrencisi için My World alanlarını tamamla
          if (!d.pet || !d.inventory) {
            const fresh = defaultDoc(d.firstName || (d.profile && d.profile.name));
            d.pet = d.pet || fresh.pet;
            d.inventory = d.inventory || fresh.inventory;
            d.needs = d.needs || fresh.needs;
            d.social = d.social || fresh.social;
            if (!d.wallet) d.wallet = { gems: d.gems || 0 };
          }
          return d;
        }
        const fresh = defaultDoc(auth.currentUser && (auth.currentUser.displayName || auth.currentUser.email));
        await ref.set(fresh, { merge: true });
        return fresh;
      },
      save: (patch) => {
        if (!currentUid) return;
        // GAMING ENGLISH KÖPRÜSÜ: wallet.gems → kök gems (quiz sistemi okur)
        if (patch.wallet && patch.wallet.gems != null) patch = { ...patch, gems: patch.wallet.gems };
        pendingPatch = deepMerge(pendingPatch, patch);
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
          const p = pendingPatch; pendingPatch = {};
          try {
            await db.collection('users').doc(currentUid).set(p, { merge: true });
            // PUBLIC OYUN VERİSİ: ziyaret için sadece gerekli alanlar (gizli veri yok)
            const pub = {};
            if (p.pet) pub.pet = p.pet;
            if (p.rooms) pub.rooms = p.rooms;
            if (p.profile) pub.profile = { name: p.profile.name || '' };
            if (Object.keys(pub).length > 0) {
              await db.collection('users').doc(currentUid).collection('myWorld').doc('public').set(pub, { merge: true });
            }
          } catch (e) { console.warn('save failed', e); }
        }, 900);
      },
      loadStudent: async (uid) => {
        // GİZLİLİK: sadece public oyun verisini oku — özel veri görünmez
        try {
          const snap = await db.collection('users').doc(uid).collection('myWorld').doc('public').get();
          return snap.exists ? snap.data() : null;
        } catch (e) { return null; }
      },
      listStudents: async () => {
        try {
          const snap = await db.collectionGroup('myWorld').orderBy('houseWealth', 'desc').limit(50).get();
          return snap.docs.map((d) => ({ uid: d.ref.parent.parent.id, ...d.data() }));
        } catch (e) {
          return (window.FRIENDS || []).map((f) => ({ uid: f.id, name: f.name, species: (f.pet && f.pet.species) || 'cat', houseWealth: f.wealth, level: f.level }));
        }
      },
    };
  }

  // ====================== MOCK (localStorage) ======================
  function mockModule() {
    const KEY = 'myworld_cloud_v1';
    const read = () => { try { return JSON.parse(localStorage.getItem(KEY) || 'null'); } catch (e) { return null; } };
    const write = (d) => { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch (e) {} };
    return {
      ready: () => Promise.resolve(),
      isLive: () => false,
      uid: () => 'mock-student',
      onAuth: (cb) => cb({ uid: 'mock-student', name: 'Ayşe' }),
      signIn: () => Promise.resolve({ user: { uid: 'mock-student' } }),
      signOut: () => Promise.resolve(),
      loadMe: () => Promise.resolve(read() || defaultDoc('Ayşe')),
      save: (patch) => { write(deepMerge(read() || defaultDoc('Ayşe'), patch)); },
      loadStudent: (uid) => {
        const f = (window.FRIENDS || []).find((x) => x.id === uid);
        if (!f) return Promise.resolve(null);
        return Promise.resolve({ profile: { name: f.name, level: f.level }, pet: f.pet, rooms: f.rooms, houseWealth: f.wealth, social: { board: f.cards || [] } });
      },
      listStudents: () => Promise.resolve((window.FRIENDS || []).map((f) => ({ uid: f.id, name: f.name, species: (f.pet && f.pet.species) || 'cat', houseWealth: f.wealth, level: f.level }))),
    };
  }

  const m = LIVE ? liveModule() : mockModule();
  // SENKRON tanım — app.jsx çalışmadan önce hazır
  window.MyCloud = {
    ready: () => m.ready(),
    isLive: () => m.isLive(),
    uid: () => (window.__mcUid || (m.uid && m.uid()) || 'guest'),
    onAuth: (cb) => m.onAuth((p) => { window.__mcUid = p && p.uid; cb(p); }),
    signIn: (e, p) => m.signIn(e, p),
    signOut: () => m.signOut(),
    loadMe: () => m.loadMe(),
    save: (patch) => m.save(patch),
    loadStudent: (uid) => m.loadStudent(uid),
    listStudents: () => m.listStudents(),
    defaultDoc,
  };
  console.log('My World: MyCloud hazır (' + (LIVE ? 'LIVE/Firebase' : 'MOCK/local') + ')');
})();

</script>

<script type="text/babel" data-presets="react">
// audio.jsx — procedural lo-fi study loop via Web Audio (no asset files).
// A soft chord pad + gentle pluck arpeggio + light kick/hat at ~78bpm.
// Exports window.MyAudio { toggle, isOn, init } and an AudioToggle React control.
(function () {
  let ctx = null, master = null, started = false, on = false, schedTimer = null;
  let nextNoteTime = 0, step = 0;

  // C-major-ish cozy progression (Cmaj7 · Am7 · Fmaj7 · G6) in Hz
  const CHORDS = [
    [261.63, 329.63, 392.00, 493.88],
    [220.00, 261.63, 329.63, 392.00],
    [174.61, 220.00, 261.63, 349.23],
    [196.00, 246.94, 293.66, 392.00],
  ];
  const ARP = [523.25, 659.25, 783.99, 659.25, 587.33, 783.99, 698.46, 587.33];
  const BPM = 78, stepDur = 60 / BPM / 2; // eighth notes

  function ensure() {
    if (ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    ctx = new AC();
    master = ctx.createGain();
    master.gain.value = 0.0;
    // gentle low-pass for the "lo-fi" warmth
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 2600; lp.Q.value = 0.5;
    master.connect(lp); lp.connect(ctx.destination);
  }

  function note(freq, t, dur, type, gain, detune) {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type || 'sine'; o.frequency.value = freq; if (detune) o.detune.value = detune;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gain, t + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + dur + 0.05);
  }
  function perc(t, freq, dur, gain) {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(freq, t); o.frequency.exponentialRampToValueAtTime(freq * 0.5, t + dur);
    g.gain.setValueAtTime(gain, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(master); o.start(t); o.stop(t + dur + 0.02);
  }
  function hat(t, gain) {
    const bufSize = ctx.sampleRate * 0.04;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 7000;
    const g = ctx.createGain(); g.gain.value = gain;
    src.connect(hp); hp.connect(g); g.connect(master); src.start(t);
  }

  // ---- DJ tracks (v14): swap the global vibe. Each tweaks chords/arp/tempo/wave. ----
  const TRACKS = {
    lofi:    { name: 'Cozy Lo-Fi',    bpm: 78, wave: 'triangle', arp: [523.25, 659.25, 783.99, 659.25, 587.33, 783.99, 698.46, 587.33] },
    jazzy:   { name: 'Jazzy Study',   bpm: 96, wave: 'sine',     arp: [587.33, 698.46, 880.00, 698.46, 659.25, 830.61, 698.46, 587.33] },
    focus:   { name: 'Focus Techno',  bpm: 120, wave: 'sawtooth', arp: [440.00, 554.37, 659.25, 554.37, 493.88, 659.25, 587.33, 493.88] },
    dreamy:  { name: 'Dreamy Pads',   bpm: 66, wave: 'sine',     arp: [392.00, 523.25, 659.25, 783.99, 659.25, 523.25, 466.16, 392.00] },
    chill:   { name: 'Chillhop',      bpm: 84, wave: 'triangle', arp: [466.16, 587.33, 698.46, 587.33, 523.25, 698.46, 622.25, 523.25] },
    arcade:  { name: '8-Bit Arcade',  bpm: 132, wave: 'square',   arp: [523.25, 659.25, 783.99, 1046.50, 783.99, 659.25, 587.33, 523.25] },
    sunny:   { name: 'Sunny Pop',     bpm: 108, wave: 'triangle', arp: [587.33, 739.99, 880.00, 739.99, 659.25, 880.00, 783.99, 659.25] },
    rainy:   { name: 'Rainy Window',  bpm: 60, wave: 'sine',     arp: [349.23, 440.00, 523.25, 659.25, 523.25, 440.00, 392.00, 349.23] },
    night:   { name: 'Night Drive',   bpm: 112, wave: 'sawtooth', arp: [415.30, 523.25, 622.25, 523.25, 466.16, 622.25, 554.37, 466.16] },
    forest:  { name: 'Forest Calm',   bpm: 72, wave: 'sine',     arp: [392.00, 493.88, 587.33, 698.46, 587.33, 493.88, 440.00, 392.00] },
  };
  let curTrack = 'lofi';

  // ---- 7 charming piano mini-compositions (Grand Piano), picked at random ----
  const MELODIES = [
    [523.25, 587.33, 659.25, 783.99, 659.25, 587.33, 523.25],
    [659.25, 587.33, 523.25, 587.33, 659.25, 659.25, 659.25],
    [392.00, 523.25, 659.25, 523.25, 440.00, 587.33, 523.25],
    [783.99, 659.25, 523.25, 659.25, 783.99, 880.00, 783.99],
    [523.25, 659.25, 587.33, 698.46, 659.25, 783.99, 698.46],
    [440.00, 554.37, 659.25, 880.00, 659.25, 554.37, 440.00],
    [587.33, 523.25, 466.16, 523.25, 587.33, 698.46, 587.33],
  ];
  function playMelody() {
    ensure(); if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();
    const wasGain = master.gain.value;
    if (master.gain.value < 0.05) master.gain.setValueAtTime(0.2, ctx.currentTime);
    const m = MELODIES[Math.floor(Math.random() * MELODIES.length)];
    let t = ctx.currentTime + 0.05;
    m.forEach((f) => { note(f, t, 0.42, 'triangle', 0.16); note(f / 2, t, 0.5, 'sine', 0.06); t += 0.26; });
    if (!on) { master.gain.setValueAtTime(0.2, ctx.currentTime); setTimeout(() => { if (!on && ctx) master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.4); }, m.length * 270 + 200); }
  }

  function scheduler() {
    const T = TRACKS[curTrack], sd = 60 / T.bpm / 2;
    while (nextNoteTime < ctx.currentTime + 0.2) {
      const bar = Math.floor(step / 8) % CHORDS.length;
      const s = step % 8;
      if (s === 0) CHORDS[bar].forEach((f, i) => note(f, nextNoteTime, sd * 7.5, T.wave, 0.05, (i - 1.5) * 4));
      note(T.arp[s], nextNoteTime, sd * 1.6, T.wave === 'square' ? 'square' : 'sine', 0.045);
      if (s === 0 || s === 4) perc(nextNoteTime, 110, 0.18, 0.16);
      if (s % 2 === 1) hat(nextNoteTime, 0.018);
      nextNoteTime += sd; step++;
    }
  }

  function start() {
    ensure(); if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();
    if (!started) { started = true; nextNoteTime = ctx.currentTime + 0.1; step = 0; schedTimer = setInterval(scheduler, 60); }
    master.gain.cancelScheduledValues(ctx.currentTime);
    master.gain.linearRampToValueAtTime(0.28, ctx.currentTime + 0.6);
    on = true;
  }
  function stop() {
    if (!ctx) return;
    master.gain.cancelScheduledValues(ctx.currentTime);
    master.gain.linearRampToValueAtTime(0.0, ctx.currentTime + 0.4);
    on = false;
  }
  window.MyAudio = {
    isOn: () => on,
    toggle: () => { on ? stop() : start(); return on; },
    init: () => ensure(),
    playMelody,
    tracks: () => Object.entries(TRACKS).map(([id, t]) => ({ id, name: t.name })),
    currentTrack: () => curTrack,
    setTrack: (id) => { if (TRACKS[id]) { curTrack = id; if (!on) start(); } },
  };
})();

const { useState: useAudState } = React;
function AudioToggle() {
  const [on, setOn] = useAudState(false);
  return (
    <button className="iconbtn" title={on ? 'Mute music' : 'Play lo-fi study music'} aria-label="Toggle music"
      onClick={() => { const next = window.MyAudio.toggle(); setOn(next); }}
      style={{ width: 46, height: 46, fontSize: 19, background: on ? 'var(--mint)' : 'var(--panel)', borderColor: on ? 'var(--mint-d)' : 'var(--line)', boxShadow: on ? '0 4px 0 var(--mint-d)' : '0 4px 0 var(--line)' }}>
      <span style={{ position: 'relative', display: 'inline-block' }}>
        {on ? '🔊' : '🔇'}
        {on && <span style={{ position: 'absolute', inset: -8, borderRadius: '50%', border: '2px solid var(--mint-d)', opacity: .5, animation: 'audiopulse 1.6s ease-out infinite' }} />}
      </span>
    </button>
  );
}
Object.assign(window, { AudioToggle });

</script>

// thumbnail renderer — draws the fitted art alone, centered in a small box (for store/closet cards)
const CLOTH_THUMB_OFF = { hat: 105, glasses: 51, shirt: -25, pants: -49, back: -20, held: -45, necklace: -22, earring: 80, ring: -60 };
window.CLOTH_THUMB_OFF = CLOTH_THUMB_OFF;
function ClothThumb({ it, size = 84 }) {
  const Comp = CLOTH_ART[it.id];
  if (!Comp) return <div style={{ fontSize: size * 0.5, lineHeight: 1 }}>{it.art}</div>;
  const scale = size / 130;
  const off = CLOTH_THUMB_OFF[it.slot] || 0;
  return (
    <div style={{ width: size, height: size, position: 'relative', pointerEvents: 'none' }}>
      <div style={{ position: 'absolute', left: '50%', top: '50%', width: 150, height: 230, transform: `translate(-50%,-50%) scale(${scale}) translateY(${off}px)` }}>
        <Comp />
      </div>
    </div>

<script type="text/babel" data-presets="react">
// cat.jsx — v4 chibi mascot. Huge head, sparkly eyes, tiny body. Socket-rigged clothing.
// States: idle | walking | sitting | interact | dig | plant | water | juggle
// Exports: Cat, CAT_SOCKETS, SLOT_SOCKET

// ===================== THE SOCKET SYSTEM =====================
// Rigid anchors in the cat's 150×230 local space. Clothing renders INSIDE the
// animated rig, locked 1:1 to these sockets, so it follows every animation.
const CAT_SOCKETS = {
  head:  { x: 75, y: 22 },   // Head_Socket  — hats, crowns, bows

};
const SLOT_SOCKET = {
  hat:     { socket: 'head',  size: 44, z: 90 },
  glasses: { socket: 'face',  size: 40, z: 85 },
  shirt:   { socket: 'torso', size: 50, z: 42 },
  pants:   { socket: 'hips',  size: 42, z: 40 },
  shoes:   { socket: 'feet',  size: 22, z: 50, dual: true },

  necklace:{ socket: 'chest', size: 26, z: 88 },  // v11 accessories
  earring: { socket: 'ear',   size: 16, z: 91 },
  ring:    { socket: 'paw',   size: 16, z: 96 },
};
const EXTRA_SOCKET_POS = { chest: { x: 75, y: 118 }, ear: { x: 116, y: 26 }, paw: { x: 36, y: 152 } };

// ---- tiny CSS tools for garden states ----
function ShovelTool() {

    <div style={{ position: 'absolute', width: 10, height: 46 }}>

}
function WaterCanTool() {

function Cat({ worn = {}, scale = 1, anim = 'idle', facing = 'right', talking = false, custom = {} }) {

    : anim === 'interact' || anim === 'plant' ? `armswing 0.6s ease-in-out infinite ${d}` : 'none';

  const pawToFace = idleAct === 'lick' || idleAct === 'scratch' || idleAct === 'chew';

      {cuff && <div style={{ position: 'absolute', top: -3, left: -3, right: -3, height: cuff.h, background: cuff.bg, border: `2px solid oklch(0.42 0.06 50)`, borderRadius: '7px 7px 5px 5px', boxSizing: 'border-box' }}>

      {shoe && shoe.sock ? (

        </div>

<script type="text/babel" data-presets="react">
// room.jsx — layered room stage (the Z-Index Matrix engine), nav arrows, cat seating.
// Exports: RoomStage, LAYERS, computeZ
const { useRef: useRoomRef, useState: useRoomState, useEffect: useRoomEffect, useCallback: useRoomCb } = React;

// Z-Index Matrix — each band is 100 apart; items sort by y within a band.
const LAYERS = {
  0: 'Wallpaper',
  1: 'Wall objects (windows, mirrors, paintings, clocks)',
  2: 'Floor objects (rugs, carpets)',
  3: 'Primary furniture (beds, sofas, tables)',
  4: 'Surface props (lamps, books, cups, electronics)',
  5: 'Pet mascot',
  6: 'UI overlay',
};
function computeZ(layer, y) { return layer * 100 + Math.round(y); }

function patternBg(swatch) {
  if (!swatch) return {};
  const s = { background: swatch.css };
  if (swatch.dots) s.backgroundImage = 'radial-gradient(oklch(0.99 0.02 235) 2.5px, transparent 2.6px)', s.backgroundSize = '26px 26px';
  return s;
}

function RoomStage({
  room, wallData, floorData, worn, mode, editMode, visiting,
  seatUid, onSeat, onMove, onRemove, onUpdate, stageRef, catColors, friendPet,
  garden, onGardenAdvance, onHarvest, onMagicOutfit, onInteract, onMythic,
  roomName, roomIndex, roomCount, onPrev, onNext, canEdit = true, roomKey,
}) {
  const localRef = useRoomRef(null);
  const ref = stageRef || localRef;
  const dragState = useRoomRef(null);
  const isGarden = room.type === 'garden';
  const GARDEN_X = 30; // % position of the garden plot

  const wall = wallData[room.wall];
  const floor = floorData[room.floor];

  // ---------- POINT-AND-CLICK MOVEMENT ENGINE (v2) ----------
  // currentX (% across floor) · activeAnimation · facingDirection — the sprite state machine.
  const [catX, setCatX] = useRoomState(50);
  const [anim, setAnim] = useRoomState('idle');     // 'idle' | 'walking' | 'sitting'
  const [facing, setFacing] = useRoomState('right'); // 'left' | 'right'
  const [idleAct, setIdleAct] = useRoomState(null);  // v14 transient species idle personality
  const catXRef = useRoomRef(50);
  const targetRef = useRoomRef(50);
  const pendingSeat = useRoomRef(null);
  const pendingAct = useRoomRef(null); // { anim, dur, onDone }
  const interactTimer = useRoomRef(null);
  const rafRef = useRoomRef(null);
  const lastTickT = useRoomRef(0);
  const [selUid, setSelUid] = useRoomState(null); // edit-mode selection
  const [poweredUids, setPoweredUids] = useRoomState(() => new Set()); // living furniture: arcade/dj on/off
  const [pulseUid, setPulseUid] = useRoomState(null);                  // living furniture: brief reaction
  const [stateMap, setStateMap] = useRoomState({});                    // v9 mythic: per-uid click counter (TV channels etc.)
  const [darkUid, setDarkUid] = useRoomState(null);                    // v14 chandelier dark-mode (uid lit)

  // ---------- v3 PARTICLES ----------
  const [puffs, setPuffs] = useRoomState([]);   // dust clouds under walking feet
  const [sparks, setSparks] = useRoomState([]); // sparkle bursts on furniture placement
  const [popUid, setPopUid] = useRoomState(null); // newly placed item → magical pop

  // dust puffs spawn under the feet while walking
  useRoomEffect(() => {
    if (anim !== 'walking') return;
    const t = setInterval(() => {
      const id = Math.random();
      const dir = facing === 'left' ? 14 : -14;
      setPuffs((ps) => [...ps.slice(-7), { id, x: catXRef.current, dir }]);
      setTimeout(() => setPuffs((ps) => ps.filter((p) => p.id !== id)), 700);
    }, 190);
    return () => clearInterval(t);
  }, [anim, facing]);

  // sparkle pop when furniture is placed/moved-in (app dispatches 'mw-sparkle')
  useRoomEffect(() => {
    function onSparkle(e) {
      const { x, y, uid } = e.detail || {};
      const id = Math.random();
      const cluster = [...Array(10)].map((_, i) => {
        const a = (i / 10) * Math.PI * 2 + Math.random() * 0.5;
        const d = 30 + Math.random() * 34;
        return { k: id + '-' + i, sx: Math.cos(a) * d, sy: Math.sin(a) * d };
      });
      setSparks((ss) => [...ss, { id, x, y, cluster }]);
      setTimeout(() => setSparks((ss) => ss.filter((s) => s.id !== id)), 900);
      if (uid) { setPopUid(uid); setTimeout(() => setPopUid(null), 600); }
    }
    window.addEventListener('mw-sparkle', onSparkle);
    return () => window.removeEventListener('mw-sparkle', onSparkle);
  }, []);

  // activity particles — dirt flecks while digging, droplets while watering
  useRoomEffect(() => {
    if (anim !== 'dig' && anim !== 'water') return;
    const t = setInterval(() => {
      const id = Math.random();
      const kind = anim;
      setPuffs((ps) => [...ps.slice(-9), { id, x: catXRef.current + (facing === 'left' ? -7 : 7), dir: (Math.random() - 0.5) * 40, kind }]);
      setTimeout(() => setPuffs((ps) => ps.filter((p) => p.id !== id)), 800);
    }, 150);
    return () => clearInterval(t);
  }, [anim, facing]);

  // reset the pet whenever the room (or visited friend's room) changes
  useRoomEffect(() => {
    if (rafRef.current) clearInterval(rafRef.current);
    if (interactTimer.current) clearTimeout(interactTimer.current);
    rafRef.current = null; pendingSeat.current = null; pendingAct.current = null;
    catXRef.current = 50; targetRef.current = 50;
    setCatX(50); setAnim('idle'); setFacing('right'); setSelUid(null);
  }, [roomKey]);
  useRoomEffect(() => () => { if (rafRef.current) clearInterval(rafRef.current); if (interactTimer.current) clearTimeout(interactTimer.current); }, []);

  // v14 idle personality machine — fire a species action every 15-20s while idle
  useRoomEffect(() => {
    const ACTS = { cat: 'lick', fox: 'scratch', dog: 'spin', owl: 'yawn', chicken: 'peck', cow: 'dance', horse: 'pushup', panda: 'chew' };
    const act = ACTS[(catColors && catColors.species) || 'cat'] || 'lick';
    let actTimer, loop;
    const schedule = () => setTimeout(() => {
      if (anim === 'idle' && !editMode && !visiting) {
        setIdleAct(act);
      actTimer = setTimeout(() => setIdleAct(null), 3200);
      }
      loop = schedule();
    }, 15000 + Math.random() * 5000);
    loop = schedule();
    return () => { clearTimeout(loop); clearTimeout(actTimer); };
  }, [anim, editMode, visiting, catColors && catColors.species, roomKey]);

  const tick = useRoomCb(() => {
    const now = performance.now();
    const dt = Math.min(0.25, (now - lastTickT.current) / 1000) || 0.016; // clamp huge throttled gaps
    lastTickT.current = now;
    const cur = catXRef.current, tgt = targetRef.current, diff = tgt - cur;
    const maxStep = 26 * dt; // walk speed: 26% of room width per second, tick-rate independent
    if (Math.abs(diff) <= maxStep + 0.01) { // arrived
      catXRef.current = tgt; setCatX(tgt);
      if (rafRef.current) { clearInterval(rafRef.current); rafRef.current = null; }
      if (pendingSeat.current) { onSeat && onSeat(pendingSeat.current); setAnim('sitting'); pendingSeat.current = null; }
      else if (pendingAct.current) {
        const act = pendingAct.current; pendingAct.current = null;
        setAnim(act.anim);
        interactTimer.current = setTimeout(() => { setAnim('idle'); act.onDone && act.onDone(); }, act.dur || 1500);
      }
      else setAnim('idle');
      return;
    }
    setFacing(diff < 0 ? 'left' : 'right');
    const nx = cur + Math.sign(diff) * maxStep; // constant-speed march toward the click
    catXRef.current = nx; setCatX(nx);
  }, [onSeat]);

  const walkTo = useRoomCb((x, seatToSit, act) => {
    targetRef.current = Math.max(5, Math.min(95, x));
    pendingSeat.current = seatToSit || null;
    pendingAct.current = act || null;
    if (interactTimer.current) clearTimeout(interactTimer.current);
    lastTickT.current = performance.now();
    setAnim('walking');
    if (!rafRef.current) rafRef.current = setInterval(tick, 16); // ~60fps; self-completes even if tab is hidden
  }, [tick]);

  function handleFloorClick(e) {
    if (editMode) return;
    const r = ref.current.getBoundingClientRect();
    const x = ((e.clientX - r.left) / r.width) * 100;
    if (seatUid) onSeat && onSeat(null);   // stand up if seated
    walkTo(x, null);
  }
  function handleItemClick(p, it) {
    if (editMode) { setSelUid(p.uid); return; }
    // living furniture reacts when clicked (v7 + v9 mythic interactions)
    if (it.living) {
      onInteract && onInteract(it);
      const kind = it.interact;
      if (kind === 'dj' || kind === 'stars' || kind === 'arcade') {
        onMythic && onMythic(kind); // full-screen interactive overlay
      } else if (kind === 'channels') {
        setStateMap((m) => ({ ...m, [p.uid]: (m[p.uid] || 0) + 1 }));
      } else if (kind === 'chandelier') {
        setDarkUid((d) => d === p.uid ? null : p.uid); // dark-mode spotlight toggle
      } else if (kind === 'piano') {
        window.MyAudio && window.MyAudio.playMelody();
      } else if (kind === 'randomize') {
        setPulseUid(p.uid); setTimeout(() => setPulseUid(null), 1600);
        onMagicOutfit && setTimeout(onMagicOutfit, 700); // sparkle first, then the quick-change
      } else if (kind === 'bath') {
        setPulseUid(p.uid); setTimeout(() => setPulseUid(null), 10000); // 10s bubble timer
      } else if (kind === 'stars') {
        setPulseUid(p.uid); setTimeout(() => setPulseUid(null), 3400);
      } else {
        setPulseUid(p.uid); setTimeout(() => setPulseUid(null), 2400);
      }
    }
    if (!it.sit) { if (seatUid) onSeat && onSeat(null); walkTo(p.x - 6, null, { anim: 'interact', dur: 1500 }); return; } // walk over + interact
    if (seatUid === p.uid) { onSeat && onSeat(null); walkTo(Math.min(92, p.x + 13), null); return; } // hop off
    if (seatUid) onSeat && onSeat(null);
    walkTo(p.x, p.uid); // walk over, then sit on arrival
  }

  // ---------- GARDEN ACTIVITY LOOP (v4) ----------
  const GARDEN_FLOW = { empty: ['dig', 2200, 'dug'], dug: ['plant', 1800, 'planted'], planted: ['water', 2400, 'grown'], grown: ['interact', 1200, 'harvest'] };
  function handlePlotClick() {
    if (editMode || visiting || !garden) return;
    if (seatUid) onSeat && onSeat(null);
    const [animName, dur, next] = GARDEN_FLOW[garden.stage] || GARDEN_FLOW.empty;
    walkTo(GARDEN_X + 9, null, { anim: animName, dur, onDone: () => {
      if (next === 'harvest') { onHarvest && onHarvest(); window.dispatchEvent(new CustomEvent('mw-sparkle', { detail: { x: GARDEN_X, y: 48 } })); }
      else { onGardenAdvance && onGardenAdvance(next); window.dispatchEvent(new CustomEvent('mw-sparkle', { detail: { x: GARDEN_X, y: 62 } })); }
    } });
  }

  // click the pet → ball juggle play
  function handleCatClick(e) {
    if (editMode || visiting || anim === 'walking') return;
    e.stopPropagation();
    if (seatUid) onSeat && onSeat(null);
    if (interactTimer.current) clearTimeout(interactTimer.current);
    setAnim('juggle');
    interactTimer.current = setTimeout(() => setAnim('idle'), 2600);
  }

  function startDragPlaced(e, p) {
    if (!editMode || visiting) return;
    e.stopPropagation();
    const rect = ref.current.getBoundingClientRect();
    dragState.current = { uid: p.uid, rect };
    e.currentTarget.setPointerCapture(e.pointerId);
  }
  function moveDragPlaced(e) {
    const d = dragState.current; if (!d) return;
    const r = d.rect;
    const x = Math.max(4, Math.min(96, ((e.clientX - r.left) / r.width) * 100));
    const y = Math.max(20, Math.min(92, ((e.clientY - r.top) / r.height) * 100));
    onMove && onMove(d.uid, x, y);
  }
  function endDragPlaced(e) { dragState.current = null; }

  const seatedItem = room.placed.find((p) => p.uid === seatUid);

  return (
    <div className="room-wrap" style={{ position: 'relative', width: '100%', height: '100%' }}>
      {/* ===== STAGE ===== */}
      <div ref={ref} className="room-stage" data-screen-label={`Room: ${roomName}`} style={{
        position: 'absolute', inset: 0, overflow: 'hidden', isolation: 'isolate',
        borderRadius: 'var(--r-lg)', border: '3px solid var(--line)',
        boxShadow: 'inset 0 2px 18px var(--shadow)',
      }}>
        {/* L0 scenery */}
        {isGarden ? (
          <div style={{ position: 'absolute', inset: 0, zIndex: 0, background: 'linear-gradient(180deg, oklch(0.86 0.06 235) 0%, oklch(0.92 0.04 225) 100%)' }}>
            {/* sun */}
            <div style={{ position: 'absolute', top: '7%', right: '9%', width: 54, height: 54, borderRadius: '50%', background: 'radial-gradient(circle at 40% 35%, oklch(0.95 0.10 95), oklch(0.88 0.14 88))', boxShadow: '0 0 34px oklch(0.90 0.13 90 / .8)' }} />
            {/* puffy clouds */}
            {[[12, 14, 1], [38, 8, 0.7], [66, 18, 0.85]].map(([x, y, s], i) => (
              <div key={i} style={{ position: 'absolute', left: `${x}%`, top: `${y}%`, transform: `scale(${s})`, opacity: .95 }}>
                <div style={{ width: 74, height: 30, borderRadius: 18, background: 'white' }} />
                <div style={{ position: 'absolute', top: -13, left: 14, width: 32, height: 32, borderRadius: '50%', background: 'white' }} />
                <div style={{ position: 'absolute', top: -8, left: 38, width: 24, height: 24, borderRadius: '50%', background: 'white' }} />
              </div>
            ))}
            {/* rolling hill horizon */}
            <div style={{ position: 'absolute', left: '-10%', right: '-10%', bottom: '30%', height: 70, borderRadius: '50% 50% 0 0', background: 'oklch(0.78 0.11 145)' }} />
            {/* picket fence */}
            <div style={{ position: 'absolute', left: 0, right: 0, bottom: '37%', height: 44, background: 'repeating-linear-gradient(90deg, oklch(0.97 0.01 80) 0 14px, transparent 14px 30px)', opacity: .9 }} />
            <div style={{ position: 'absolute', left: 0, right: 0, bottom: 'calc(37% + 26px)', height: 7, background: 'oklch(0.97 0.01 80)', opacity: .9 }} />
          </div>
        ) : room.shell ? (
          <ShellScenery shell={room.shell} />
        ) : (
          <div style={{ position: 'absolute', inset: 0, zIndex: 0, ...patternBg(wall) }}>
            {wall && wall.stars && [...Array(14)].map((_, i) => (
              <div key={i} style={{ position: 'absolute', top: `${(i*37)%70}%`, left: `${(i*53)%96}%`, fontSize: 12, opacity: .7 }}>✦</div>
            ))}
            {/* cozy ceiling shadow + picture rail */}
            <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 46, background: 'linear-gradient(180deg, oklch(0.3 0.04 50 / .14), transparent)' }} />
            <div style={{ position: 'absolute', top: '12%', left: 0, right: 0, height: 4, background: 'oklch(1 0 0 / .35)', boxShadow: '0 1px 0 oklch(0.3 0.04 50 / .12)' }} />
            {/* v5 wood dado — dark paneled wainscot like the reference (sits above the floor band) */}
            <div style={{ position: 'absolute', left: 0, right: 0, bottom: '34%', height: '21%', backgroundColor: 'oklch(0.46 0.05 52)', backgroundImage: 'repeating-linear-gradient(90deg, oklch(1 0 0 / .10) 0 3px, transparent 3px 14px, oklch(0 0 0 / .16) 14px 17px, transparent 17px 96px), linear-gradient(180deg, oklch(0.51 0.05 55), oklch(0.40 0.05 50))', boxShadow: 'inset 0 8px 14px -8px oklch(0.2 0.03 50 / .6)' }} />
            <div style={{ position: 'absolute', left: 0, right: 0, bottom: '55%', height: 10, background: 'linear-gradient(180deg, oklch(0.92 0.02 80), oklch(0.78 0.035 70))', boxShadow: '0 2px 4px oklch(0.3 0.04 50 / .35)' }} />
          </div>
        )}
        {/* floor band (lower ~32%) with depth shading */}
        <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, height: '34%', zIndex: 1, ...patternBg(floor) }}>
          <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg, oklch(0.3 0.05 50 / .18) 0%, transparent 30%, oklch(0.3 0.05 50 / .10) 100%)' }} />
        </div>
        {/* baseboard — wall/floor seam (indoors only) */}
        {!isGarden && <div style={{ position: 'absolute', left: 0, right: 0, bottom: '34%', height: 11, zIndex: 1, background: 'linear-gradient(180deg, oklch(0.97 0.012 75), oklch(0.88 0.025 70))', boxShadow: '0 2px 3px oklch(0.3 0.04 50 / .25), inset 0 1px 0 oklch(1 0 0 / .7)' }} />}
        {/* warm vignette over everything scenic */}
        <div style={{ position: 'absolute', inset: 0, zIndex: 590, pointerEvents: 'none', background: 'radial-gradient(130% 110% at 50% 40%, transparent 62%, oklch(0.45 0.07 45 / .14) 100%)' }} />

        {/* CLICK-CATCHER — left-click anywhere empty to walk the pet there (z above surfaces, below items) */}
        {!editMode && (
          <div onClick={handleFloorClick} style={{ position: 'absolute', inset: 0, zIndex: 2, cursor: 'pointer' }} />
        )}

        {/* ===== GARDEN PLOT (v4 activity loop) ===== */}
        {isGarden && garden && (() => {
          const st = garden.stage;
          return (
            <div onClick={handlePlotClick} style={{ position: 'absolute', left: `${GARDEN_X}%`, top: '62%', transform: 'translate(-50%,-50%)', zIndex: computeZ(3, 62), cursor: 'pointer' }}>
              {/* dirt mound */}
              <div style={{ width: 110, height: 38, borderRadius: '50%', background: st === 'empty' ? 'oklch(0.62 0.08 60)' : 'oklch(0.50 0.08 55)', border: '3px solid oklch(0.45 0.08 55)', boxShadow: 'inset 0 4px 8px oklch(0.3 0.05 50 / .3)' }} />
              {st === 'dug' && <div style={{ position: 'absolute', top: -12, right: -6, width: 34, height: 22, borderRadius: '50% 50% 40% 40%', background: 'oklch(0.50 0.08 55)', border: '2.5px solid oklch(0.42 0.08 55)' }} />}
              {st === 'planted' && (
                <div style={{ position: 'absolute', top: -26, left: '50%', transform: 'translateX(-50%)', animation: 'sproutpop .4s ease' }}>
                  <div style={{ width: 4, height: 22, background: 'oklch(0.62 0.13 145)', borderRadius: 2, margin: '0 auto' }} />
                  <div style={{ position: 'absolute', top: -2, left: -8, width: 12, height: 9, borderRadius: '50% 50% 50% 0', background: 'oklch(0.72 0.13 145)' }} />
                  <div style={{ position: 'absolute', top: -2, right: -8, width: 12, height: 9, borderRadius: '50% 50% 0 50%', background: 'oklch(0.72 0.13 145)' }} />
                </div>
              )}
              {st === 'grown' && (
                <div style={{ position: 'absolute', bottom: 14, left: '50%', transform: 'translateX(-50%)', animation: 'sproutpop .5s cubic-bezier(.34,1.56,.64,1)' }}>
                  <div style={{ width: 26, height: 64, background: 'linear-gradient(90deg, oklch(0.55 0.09 55), oklch(0.46 0.08 50))', borderRadius: 10, margin: '0 auto', border: '2.5px solid oklch(0.40 0.07 50)' }} />
                  <div style={{ position: 'absolute', bottom: 46, left: '50%', transform: 'translateX(-50%)', width: 140, height: 110 }}>
                    {[[0, 28, 64], [40, 0, 72], [80, 28, 64], [40, 44, 70]].map(([x, y, s], i) => (
                      <div key={i} style={{ position: 'absolute', left: x, top: y, width: s, height: s * 0.82, borderRadius: '50%', background: 'radial-gradient(circle at 38% 30%, oklch(0.76 0.13 145), oklch(0.60 0.13 145))', border: '2.5px solid oklch(0.50 0.11 145)' }} />
                    ))}
                    {[[26, 52], [72, 30], [96, 62]].map(([x, y], i) => (
                      <div key={'f' + i} style={{ position: 'absolute', left: x, top: y, width: 17, height: 17, borderRadius: '50%', background: 'radial-gradient(circle at 35% 30%, oklch(0.78 0.15 30), oklch(0.62 0.18 28))', border: '2px solid oklch(0.50 0.15 28)' }} />
                    ))}
                  </div>
                </div>
              )}
              {/* action sign */}
              <div style={{ position: 'absolute', top: st === 'grown' ? -150 : -54, left: '50%', transform: 'translateX(-50%)', whiteSpace: 'nowrap', background: 'var(--panel)', border: '2px solid var(--line)', borderRadius: 999, padding: '4px 12px', fontFamily: 'var(--display)', fontWeight: 700, fontSize: 12, boxShadow: '0 3px 0 var(--line)', animation: 'floaty 2.6s ease-in-out infinite' }}>
                {st === 'empty' ? '🥄 Dig!' : st === 'dug' ? '🌱 Plant a seed' : st === 'planted' ? '💧 Water it' : '🍎 Harvest!'}
              </div>
            </div>
          );
        })()}

        {/* placed items */}
        {room.placed.map((p) => {
          const it = window.ALL_ITEMS[p.ref]; if (!it) return null;
          const z = computeZ(it.layer || 3, p.y);
          const sizeW = (it.w || 80) * (p.s || 1);
          const sel = editMode && selUid === p.uid;
          return (
            <div key={p.uid}
              onPointerDown={(e) => startDragPlaced(e, p)}
              onPointerMove={moveDragPlaced}
              onPointerUp={endDragPlaced}
              onClick={() => handleItemClick(p, it)}
              style={{
                position: 'absolute', left: `${p.x}%`, top: `${p.y}%`, zIndex: z,
                transform: 'translate(-50%,-50%)', cursor: editMode ? 'grab' : 'pointer',
                touchAction: 'none',
                animation: popUid === p.uid ? 'placedpop .5s cubic-bezier(.34,1.56,.64,1)' : 'none',
                pointerEvents: editMode ? 'auto' : ((it.layer || 3) >= 3 ? 'auto' : 'none'),
              }}>
              <div style={{ transform: p.flip ? 'scaleX(-1)' : 'none', position: 'relative', filter: p.pal ? (window.ITEM_SWATCHES[p.pal] || {}).filter : 'none' }}>
                <FurnArt it={it} w={sizeW} powered={poweredUids.has(p.uid)} pulsing={pulseUid === p.uid} stateN={stateMap[p.uid] || 0} seated={seatUid === p.uid} />
                {/* mirror aura — sparkles when the pet stands in front of it (v7) */}
                {it.id === 'f_mirror' && !editMode && Math.abs(catX - p.x) < 11 && (
                  <div style={{ position: 'absolute', inset: -10, pointerEvents: 'none' }}>
                    {[[8, 12], [78, 22], [16, 70], [70, 74], [44, -2]].map(([x, y], i) => (
                      <div key={i} style={{ position: 'absolute', left: `${x}%`, top: `${y}%`, fontSize: 13, color: 'oklch(0.88 0.14 88)', textShadow: '0 0 8px oklch(0.9 0.15 88)', animation: `glowpulse 1.4s ease-in-out infinite ${i * 0.22}s`, '--g': 'oklch(0.88 0.14 88)' }}>✦</div>
                    ))}
                  </div>
                )}
              </div>
              {/* v10 edit popup — [Move | Rotate | Store to Depot] */}
              {sel && !visiting && (
                <React.Fragment>
                  <div style={{ position: 'absolute', inset: -10, border: '2.5px dashed oklch(0.70 0.14 200)', borderRadius: 14, pointerEvents: 'none', animation: 'popin .2s' }} />
                  <div onPointerDown={(e) => e.stopPropagation()} style={{ position: 'absolute', top: -48, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 5, zIndex: 700, background: 'var(--panel)', border: '2px solid var(--line)', borderRadius: 999, padding: 4, boxShadow: '0 4px 0 var(--line), 0 8px 14px -6px var(--shadow)', animation: 'popin .2s' }}>
                    {[
                      { g: '✋', t: 'Move — drag the item anywhere', label: 'Move', f: () => {} },
                      { g: '⇄', t: 'Rotate (mirror flip)', label: 'Rotate', f: () => onUpdate && onUpdate(p.uid, { flip: !p.flip }) },
                      { g: '−', t: 'Smaller', f: () => onUpdate && onUpdate(p.uid, { s: Math.max(0.6, (p.s || 1) - 0.15) }) },
                      { g: '+', t: 'Bigger', f: () => onUpdate && onUpdate(p.uid, { s: Math.min(1.8, (p.s || 1) + 0.15) }) },
                      { g: '📦', t: 'Store to Depot — despawns & returns to inventory', label: 'Depot', f: () => { onRemove && onRemove(p.uid); setSelUid(null); } },
                    ].map((b) => (
                      <button key={b.t} title={b.t} onClick={(e) => { e.stopPropagation(); b.f(); }}
                        style={{ minWidth: 30, height: 30, borderRadius: 999, display: 'flex', alignItems: 'center', gap: 4, justifyContent: 'center', padding: b.label ? '0 9px' : 0, fontFamily: 'var(--display)', fontWeight: 800, fontSize: b.label ? 11 : 15, background: b.label === 'Depot' ? 'var(--sky)' : 'var(--panel-2)', color: b.label === 'Depot' ? 'white' : 'var(--ink)', border: '1.5px solid var(--line)', whiteSpace: 'nowrap' }}>
                        <span style={{ fontSize: 13 }}>{b.g}</span>{b.label || ''}
                      </button>
                    ))}
                  </div>
                </React.Fragment>
              )}
              {editMode && !sel && !visiting && (
                <div style={{ position: 'absolute', inset: -6, border: '2px dashed var(--line)', borderRadius: 10, pointerEvents: 'none', opacity: .6 }} />
              )}
            </div>
          );
        })}

        {/* ===== CAT (L5 walking, or seated z) ===== */}
        {(() => {
          let catLeft = catX, catBottomPct = 6, z = computeZ(5, 50);
          const isSitting = seatedItem && anim === 'sitting';
          if (isSitting) {
            const it = window.ALL_ITEMS[seatedItem.ref];
            catLeft = seatedItem.x; catBottomPct = 100 - seatedItem.y - 4;
            z = computeZ(it.layer || 3, seatedItem.y) + 5; // dynamic z: tuck behind the seat's front frame
          }
          // no CSS transition while walking (rAF drives it); smooth snap when sitting
          const trans = anim === 'walking' ? 'none' : 'left .35s ease, bottom .4s cubic-bezier(.34,1.4,.6,1)';
          // v14 footwear physics — lift + bob behavior keyed to the worn shoe
          const shoeId = worn.shoes && worn.shoes.id;
          const moving = anim === 'walking';
          const PHYS = {
            c_jetshoe: { lift: 22, anim: moving ? 'hoverglide 0.6s ease-in-out infinite' : 'hoverglide 1.4s ease-in-out infinite', fx: 'jet' },
            c_moon:    { lift: moving ? 30 : 4, anim: moving ? 'moonhop 0.6s ease-in-out infinite' : 'none', fx: 'moondust' },
            c_wingshoe:{ lift: moving ? 16 : 2, anim: moving ? 'winghop 0.55s ease-in-out infinite' : 'none', fx: 'wings' },
          };
          const phys = PHYS[shoeId] || { lift: 0, anim: null };
          const liftBottom = catBottomPct + (isSitting ? 0 : phys.lift * 0.12);
          return (
            <div onClick={handleCatClick} style={{ position: 'absolute', left: `${catLeft}%`, bottom: `${liftBottom}%`, transform: 'translateX(-50%)', zIndex: z, transition: trans, cursor: editMode ? 'default' : 'pointer' }}>
              {/* footwear FX layer */}
              {!isSitting && phys.fx === 'jet' && (
                <div style={{ position: 'absolute', bottom: -6, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 18, zIndex: -1, pointerEvents: 'none' }}>
                  {[0, 1].map((i) => <div key={i} style={{ width: 9, height: moving ? 26 : 16, borderRadius: '50% 50% 40% 40%', background: 'linear-gradient(180deg, oklch(0.85 0.16 60), oklch(0.70 0.20 30), oklch(0.65 0.18 20 / 0))', filter: 'blur(1px)', animation: `thruster ${0.25 + i * 0.05}s ease-in-out infinite`, transformOrigin: 'top center' }} />)}
                </div>
              )}
              ))}
              <div style={{ animation: phys.anim || 'none' }}>
                <Cat worn={worn} custom={{ ...catColors, idleAct }} scale={visiting ? 0.8 : 0.92} anim={isSitting ? 'sitting' : anim} facing={facing} />
              </div>
            </div>
          );
        })()}

        {/* ===== FRIEND'S PET (v6 multiplayer) — the host, wearing THEIR fitted outfit ===== */}
        {visiting && friendPet && (() => {
          const fworn = {};
          (friendPet.worn || []).forEach((id) => { const it = window.ALL_ITEMS[id]; if (it && it.slot) fworn[it.slot] = it; });
          return (
            <div style={{ position: 'absolute', left: '30%', bottom: '6%', transform: 'translateX(-50%)', zIndex: computeZ(5, 49) }}>
              <div style={{ position: 'absolute', top: -34, left: '50%', transform: 'translateX(-50%)', whiteSpace: 'nowrap', background: 'var(--panel)', border: '2px solid var(--line)', borderRadius: 999, padding: '3px 12px', fontFamily: 'var(--display)', fontWeight: 700, fontSize: 12, boxShadow: '0 3px 0 var(--line)' }}>
                {friendPet.name}
              </div>
              <Cat worn={fworn} custom={friendPet.custom} scale={0.88} facing="left" />
            </div>
          );
        })()}

        {/* ===== PARTICLES — dust / dirt / droplets near the pet ===== */}
        {puffs.map((pf) => (
          <div key={pf.id} style={{ position: 'absolute', left: `${pf.x}%`, bottom: pf.kind === 'water' ? '14%' : '5.5%', zIndex: 545, pointerEvents: 'none' }}>
            {pf.kind === 'dig' ? (
