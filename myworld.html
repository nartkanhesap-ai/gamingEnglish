<script type="text/babel" data-presets="react">
// hud.jsx — top currency HUD + bottom dock toolbar + toast/coin FX.
// Exports: TopHUD, Dock, GemCount
const { useState: useHudState, useEffect: useHudEffect, useRef: useHudRef } = React;

// animated rolling number
function GemCount({ value }) {
  const [shown, setShown] = useHudState(value);
  const raf = useHudRef(null);
  useHudEffect(() => {
    if (document.hidden) { setShown(value); return; } // rAF is paused in hidden tabs — jump straight to the value
    const from = shown, to = value, t0 = performance.now(), dur = 550;
    cancelAnimationFrame(raf.current);
    const tick = (t) => {
      const k = Math.min(1, (t - t0) / dur);
      const e = 1 - Math.pow(1 - k, 3);
      setShown(Math.round(from + (to - from) * e));
      if (k < 1) raf.current = requestAnimationFrame(tick);
    };
    raf.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf.current);
  }, [value]);
  return <span className="tabular">{shown.toLocaleString()}</span>;
}

function Gem({ size = 20 }) {
  return (
    <span style={{ width: size, height: size, display: 'inline-grid', placeItems: 'center', flex: '0 0 auto' }}>
      <span style={{ width: size, height: size, display: 'block', background: 'linear-gradient(140deg, oklch(0.92 0.10 200), var(--gem) 55%, var(--gem-d))', clipPath: 'polygon(50% 0,85% 32%,72% 100%,28% 100%,15% 32%)', boxShadow: '0 1px 3px var(--shadow)' }} />

      {/* gem balance */}

function useCountdown(target) {
  const [now, setNow] = useShopState(Date.now());
  useShopEffect(() => { const t = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(t); }, []);
  let d = Math.max(0, Math.floor((target - now) / 1000));
  const days = Math.floor(d / 86400); d -= days * 86400;
  const h = Math.floor(d / 3600); d -= h * 3600;
  const m = Math.floor(d / 60); const s = d - m * 60;
  return { days, h, m, s };
}

}

}

<script type="text/babel" data-presets="react">
// mysterybox.jsx — gacha: select box -> shake -> burst -> rarity reveal.
// Exports: MysteryBox
const { useState: useMbState, useEffect: useMbEffect, useRef: useMbRef } = React;

function rollRarity(odds) {
  const r = Math.random() * 100; let acc = 0;
  for (const k of window.RARITY_ORDER) { acc += odds[k] || 0; if (r <= acc) return k; }
  return 'common';
}
function pickItem(rarity) {
  const pool = [...window.CLOTHES, ...window.FURNITURE].filter((i) => i.rarity === rarity);
  if (!pool.length) return [...window.CLOTHES, ...window.FURNITURE][0];
  return pool[Math.floor(Math.random() * pool.length)];
}

function Sparks({ color }) {
  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
      {[...Array(16)].map((_, i) => {
        const a = (i / 16) * Math.PI * 2, dist = 90 + Math.random() * 70;
        return <div key={i} style={{
          position: 'absolute', top: '50%', left: '50%', width: 9, height: 9, borderRadius: '50%',
          background: color, '--sx': `${Math.cos(a) * dist}px`, '--sy': `${Math.sin(a) * dist}px`,
          animation: `spark ${0.7 + Math.random() * 0.5}s ease-out forwards`,
        }} />;
      })}
    </div>
  );
}

function RevealItem({ item }) {
  const R = window.RARITY[item.rarity];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, animation: 'popin .5s' }}>
      <div style={{ '--g': R.glow, fontSize: 92, lineHeight: 1, animation: 'glowpulse 1.6s ease-in-out infinite' }}>
        {item.type ? '🧱' : item.art}
      </div>
      <span className="rarity-chip" style={{ background: R.soft, color: R.ink, fontSize: 14, padding: '4px 16px' }}>{R.label}</span>
      <div style={{ fontFamily: 'var(--display)', fontWeight: 700, fontSize: 22, whiteSpace: 'nowrap' }}>{item.name}</div>
      <div style={{ color: 'var(--ink-soft)', fontWeight: 700, fontSize: 13 }}>Added to your Closet!</div>
    </div>
  );
}

function MysteryBox({ open, onClose, gems, onSpend, onWin, revealStyle, mode }) {
  const [phase, setPhase] = useMbState('select'); // select | opening | reveal
  const [box, setBox] = useMbState(null);
  const [won, setWon] = useMbState(null);
  const [slotIdx, setSlotIdx] = useMbState(0);
  const timers = useMbRef([]);

  useMbEffect(() => { if (!open) { reset(); } }, [open]);
  function reset() { timers.current.forEach(clearTimeout); timers.current = []; setPhase('select'); setBox(null); setWon(null); }
  const after = (ms, fn) => { const t = setTimeout(fn, ms); timers.current.push(t); };

  function startOpen(b) {
    if (gems < b.price) return;
    onSpend(b.price);
    const rarity = rollRarity(b.odds);
    const item = pickItem(rarity);
    setBox(b); setWon(item); setPhase('opening');
    if (revealStyle === 'slot') {
      const pool = [...window.CLOTHES, ...window.FURNITURE];
      let i = 0; const spin = () => { setSlotIdx((x) => (x + 1) % pool.length); i++; if (i < 28) after(60 + i * 4, spin); else after(300, () => finish(item)); };
      spin();
    } else {
      after(revealStyle === 'flip' ? 1500 : 1800, () => finish(item));
    }
  }
  function finish(item) { onWin(item, box); setPhase('reveal'); }

  if (!open) return null;
  const pool = [...window.CLOTHES, ...window.FURNITURE];

  return (
    <div onClick={phase === 'select' ? onClose : undefined} style={window.overlayStyle}>
      <div onClick={(e) => e.stopPropagation()} className="card sheet-anim" style={{ width: 'min(640px, 95vw)', padding: 24, textAlign: 'center', position: 'relative' }}>
        <button className="iconbtn" onClick={onClose} style={{ position: 'absolute', top: 14, right: 14, width: 40, height: 40, fontSize: 18, zIndex: 5 }}>✕</button>

        {/* ===== SELECT ===== */}
        {phase === 'select' && (
          <React.Fragment>
            <h2 style={{ fontSize: 24, marginBottom: 4 }}>🎁 Mystery Boxes</h2>
            <p style={{ color: 'var(--ink-soft)', fontWeight: 700, fontSize: 14, marginTop: 0, marginBottom: 20 }}>Spend Gems for a surprise item. Better boxes = better odds!</p>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px,1fr))', gap: 14 }}>
              {window.BOXES.map((b) => {
                const afford = gems >= b.price;
                return (
                  <div key={b.id} className="card" style={{ padding: 16, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, borderColor: b.tone, boxShadow: `0 0 0 1.5px ${b.tone}, 0 10px 24px -12px var(--shadow)` }}>
                    <div style={{ fontSize: 56, lineHeight: 1, filter: `drop-shadow(0 4px 8px ${b.tone})` }}>{b.art}</div>
                    <div style={{ fontFamily: 'var(--display)', fontWeight: 700, fontSize: 16, whiteSpace: 'nowrap' }}>{b.name}</div>
                    <div style={{ fontSize: 12, color: 'var(--ink-soft)', fontWeight: 700, minHeight: 32 }}>{b.blurb}</div>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, justifyContent: 'center' }}>
                      {window.RARITY_ORDER.map((k) => b.odds[k] ? (
                        <span key={k} className="rarity-chip" style={{ background: window.RARITY[k].soft, color: window.RARITY[k].ink, fontSize: 10 }}>{window.RARITY[k].label} {b.odds[k]}%</span>
                      ) : null)}
                    </div>
                    <button className="btn3d" disabled={!afford} onClick={() => startOpen(b)} style={{ width: '100%', marginTop: 4, fontSize: 14 }}>
                      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, justifyContent: 'center' }}><Gem size={16} />{b.price.toLocaleString()}</span>
                    </button>
                  </div>
                );
              })}
            </div>
          </React.Fragment>
        )}

        {/* ===== OPENING ===== */}
        {phase === 'opening' && box && (
          <div style={{ height: 320, display: 'grid', placeItems: 'center', position: 'relative' }}>
            {/* BURST style */}
            {revealStyle !== 'flip' && revealStyle !== 'slot' && (
              <div style={{ position: 'relative', display: 'grid', placeItems: 'center' }}>
                <div style={{ position: 'absolute', width: 120, height: 120, borderRadius: '50%', background: box.tone, animation: 'burst 1.8s ease-out forwards', animationDelay: '1.2s' }} />
                <div style={{ fontSize: 110, animation: 'shake .5s ease-in-out 3', filter: `drop-shadow(0 0 18px ${box.tone})` }}>{box.art}</div>
                <div style={{ position: 'absolute', animationDelay: '1.2s' }}><Sparks color={box.tone} /></div>
                <div style={{ position: 'absolute', bottom: -28, fontFamily: 'var(--display)', fontWeight: 700, color: 'var(--ink-soft)' }}>Opening…</div>
              </div>
            )}
            {/* FLIP style — three cards, middle reveals */}
            {revealStyle === 'flip' && (
              <div style={{ display: 'flex', gap: 14 }}>
                {[0, 1, 2].map((i) => (
                  <div key={i} style={{ width: 84, height: 116, borderRadius: 14, position: 'relative', transformStyle: 'preserve-3d', animation: `flipcard 1.4s ease ${0.15 * i}s forwards`, transformOrigin: 'center' }}>
                    <div style={{ position: 'absolute', inset: 0, borderRadius: 14, background: box.tone, display: 'grid', placeItems: 'center', fontSize: 34, color: 'white', backfaceVisibility: 'hidden' }}>?</div>
                  </div>
                ))}
              </div>
            )}
            {/* SLOT style — spinning reel */}
            {revealStyle === 'slot' && (
              <div style={{ width: 150, height: 150, borderRadius: 18, border: '3px solid var(--line)', overflow: 'hidden', display: 'grid', placeItems: 'center', background: 'var(--panel-2)', boxShadow: `inset 0 0 0 4px ${box.tone}` }}>
                <div style={{ fontSize: 80, lineHeight: 1 }}>{pool[slotIdx] && (pool[slotIdx].type ? '🧱' : pool[slotIdx].art)}</div>
              </div>
            )}
          </div>
        )}

        {/* ===== REVEAL ===== */}
        {phase === 'reveal' && won && (
          <div style={{ padding: '20px 0', position: 'relative' }}>
            <Sparks color={window.RARITY[won.rarity].glow} />
            <RevealItem item={won} />
            <div style={{ display: 'flex', gap: 10, justifyContent: 'center', marginTop: 22 }}>
              <button className="btn3d ghost" onClick={onClose}>Done</button>
              <button className="btn3d" onClick={() => reset()} disabled={!box || gems < box.price}>Open Another</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

Object.assign(window, { MysteryBox });

</script>

<script type="text/babel" data-presets="react">
// wardrobe.jsx — Closet (v10): horizontal slider with nav arrows, item stacking ×N,
// drag-to-place deducts from depot; Store-to-Depot returns items here.
// Exports: Closet
const { useState: useClosetState, useRef: useClosetRef } = React;

const CLOSET_TABS = [
  { id: 'clothes', label: '🎽 Clothes' },
  { id: 'furniture', label: '🛋️ Furniture' },
  { id: 'walls', label: '🧱 Walls/Floors' },
];

function Closet({ open, onClose, owned, counts, worn, mode, isGarden, onCarryStart, onToggleWear, onApplySurface, editMode, onToggleEdit }) {
  const [tab, setClosetTab] = useClosetState('clothes');
  const stripRef = useClosetRef(null);
  if (!open) return null;

  const ownedClothes = window.CLOTHES.filter((i) => owned.has(i.id));
  // furniture shows only items with depot stock > 0 (placed copies live in the room).
  // In the garden, ONLY outdoor furniture may be placed.
  const ownedFurn = window.FURNITURE.filter((i) => (counts[i.id] || 0) > 0 && (isGarden ? i.outdoor : true));
  const ownedSurfaces = [...window.WALLS, ...window.FLOORS].filter((i) => owned.has(i.id) || i.price === 0);
  const tabs = isGarden ? CLOSET_TABS.filter((t) => t.id !== 'walls') : CLOSET_TABS;

  let list = [];
  if (tab === 'clothes') list = ownedClothes;
  else if (tab === 'furniture') list = ownedFurn;
  else list = ownedSurfaces;

  const wornIds = new Set(Object.values(worn).filter(Boolean).map((i) => i.id));
  const scrollBy = (dx) => { if (stripRef.current) stripRef.current.scrollBy({ left: dx, behavior: 'smooth' }); };

  return (
    <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, zIndex: 40, pointerEvents: 'none' }}>
      <div className="card" style={{
        margin: '0 10px 8px', padding: '10px 12px', borderRadius: 'var(--r-lg)', pointerEvents: 'auto',
        animation: 'slideup .25s ease', display: 'flex', flexDirection: 'column', gap: 8,
      }}>
        {/* header row */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontFamily: 'var(--display)', fontWeight: 700, fontSize: 15 }}>🎽 Closet</span>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', flex: 1 }}>
            {tabs.map((t) => (
              <button key={t.id} onClick={() => setClosetTab(t.id)} style={{
                padding: '5px 11px', borderRadius: 999, fontFamily: 'var(--body)', fontWeight: 700, fontSize: 12,
                background: tab === t.id ? 'var(--ink)' : 'var(--panel-2)', color: tab === t.id ? 'var(--panel)' : 'var(--ink-soft)',
                border: '1.5px solid var(--line)',
              }}>{t.label}</button>
            ))}
          </div>
          {(tab === 'furniture') && (
            <button className={'btn3d ' + (editMode ? '' : 'ghost')} onClick={onToggleEdit} style={{ fontSize: 12, padding: '7px 12px' }}>
              {editMode ? '✓ Arranging' : '✋ Arrange room'}
            </button>
          )}
          <button className="iconbtn" onClick={onClose} style={{ width: 38, height: 38, fontSize: 16 }}>✕</button>
        </div>

        {/* hint */}
        <div style={{ fontSize: 11.5, color: 'var(--ink-soft)', fontWeight: 700, paddingLeft: 2 }}>
          {tab === 'furniture' ? (isGarden ? '🌳 Garden: only outdoor furniture can be placed here.' : '⬆ Drag an item up into the room (count goes down). In Arrange mode, tap a placed item → 📦 Depot brings it back here.')
            : tab === 'walls' ? 'Tap a wallpaper or floor to apply it to this room.'
            : 'Tap an item to wear it. Tap again to take it off.'}
        </div>

        {/* slider with nav arrows */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <button onClick={() => scrollBy(-260)} aria-label="Scroll left" style={{ flex: '0 0 auto', width: 34, height: 64, borderRadius: 12, background: 'var(--panel-2)', border: '1.5px solid var(--line)', fontFamily: 'var(--display)', fontSize: 20, fontWeight: 700, color: 'var(--ink)', boxShadow: '0 3px 0 var(--line)' }}>‹</button>
          <div ref={stripRef} className="scroll noscroll" style={{ display: 'flex', gap: 10, overflowX: 'auto', paddingBottom: 4, minHeight: 96, flex: 1, scrollSnapType: 'x proximity' }}>
            {list.length === 0 && (
              <div style={{ padding: '18px 10px', color: 'var(--ink-soft)', fontWeight: 700, fontSize: 13 }}>
                {tab === 'furniture' ? 'Depot is empty — buy furniture in 🛍️ The Boutique, or store placed items back here!' : 'Nothing here yet — visit 🛍️ The Boutique to buy some!'}
              </div>
            )}
            {list.map((it) => {
              const isWorn = wornIds.has(it.id);
              const surface = it.type === 'wall' || it.type === 'floor';
              const n = counts[it.id] || 0;
              return (
                <div key={it.id}
                  onPointerDown={(e) => { if (tab === 'furniture') onCarryStart(it, e); }}
                  onClick={() => { if (it.slot) onToggleWear(it); else if (surface) onApplySurface(it); }}
                  style={{
                    flex: '0 0 auto', width: 82, padding: 8, borderRadius: 'var(--r-md)', textAlign: 'center',
                    background: isWorn ? 'var(--mint)' : 'var(--panel-2)', border: '1.5px solid var(--line)',
                    cursor: tab === 'furniture' ? 'grab' : 'pointer', position: 'relative', touchAction: 'none',
                    boxShadow: isWorn ? '0 3px 0 var(--mint-d)' : '0 2px 0 var(--line)', scrollSnapAlign: 'start',
                  }}>
                  {isWorn && <div style={{ position: 'absolute', top: 3, right: 5, fontSize: 11, fontWeight: 800, color: 'oklch(0.25 0.05 165)' }}>✓</div>}
                  {/* stack count badge */}
                  {tab === 'furniture' && (
                    <div style={{ position: 'absolute', top: -7, right: -6, minWidth: 24, height: 24, borderRadius: 999, background: n > 1 ? 'var(--primary)' : 'var(--panel)', color: n > 1 ? 'var(--primary-ink)' : 'var(--ink-soft)', border: '2px solid var(--line)', display: 'grid', placeItems: 'center', fontFamily: 'var(--display)', fontWeight: 800, fontSize: 11, padding: '0 5px', boxShadow: '0 2px 5px -2px var(--shadow)', zIndex: 2 }}>×{n}</div>
                  )}
                  <div style={{ height: 44, display: 'grid', placeItems: 'center' }}>
                    {surface ? <div style={{ width: 44, height: 30, borderRadius: 7, background: it.css, border: '1.5px solid var(--line)' }} />
                      : it.slot ? <ClothThumb it={it} size={40} />
                      : <FurnArt it={it} w={Math.min(44, (it.w || 44) * 0.5)} />}
                  </div>
                  <div style={{ fontSize: 10.5, fontWeight: 700, lineHeight: 1.1, marginTop: 3, color: isWorn ? 'oklch(0.25 0.05 165)' : 'var(--ink)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{it.name}</div>
                </div>
              );
            })}
          </div>
          <button onClick={() => scrollBy(260)} aria-label="Scroll right" style={{ flex: '0 0 auto', width: 34, height: 64, borderRadius: 12, background: 'var(--panel-2)', border: '1.5px solid var(--line)', fontFamily: 'var(--display)', fontSize: 20, fontWeight: 700, color: 'var(--ink)', boxShadow: '0 3px 0 var(--line)' }}>›</button>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { Closet });

</script>

<script type="text/babel" data-presets="react">
// customize.jsx — Pet Salon (v10): species selection, fur, glow-eyes studio,
// blush + face marks (Aesthetics), with CEFR-gated trait locks.
// Exports: CustomizePanel
const { useState: useCzState, useEffect: useCzEffect, useRef: useCzRef } = React;

const CZ_TABS = [
  { id: 'species', label: '🐾 Species', list: () => window.SPECIES,   key: 'speciesId' },
  { id: 'coat',    label: '🎨 Fur',     list: () => window.PET_COATS, key: 'coatId' },
  { id: 'eyes',    label: '👁 Eyes',    list: () => window.PET_EYES,  key: 'eyeId' },
  { id: 'blush',   label: '😊 Blush',   list: () => window.PET_BLUSH, key: 'blushId' },
  { id: 'marks',   label: '✨ Marks',   list: () => window.PET_MARKS, key: 'markId' },
];

function CzSwatch({ kind, opt }) {
  if (kind === 'species') {
    return <div style={{ width: 46, height: 46, borderRadius: '50%', background: opt.coat, border: `3px solid ${opt.coatD}`, display: 'grid', placeItems: 'center', fontSize: 24 }}>{opt.emoji}</div>;
  }
  if (kind === 'eyes') {
    return (
      <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'white', border: '2px solid oklch(0.80 0.03 70)', display: 'grid', placeItems: 'center', overflow: 'hidden' }}>
        <div style={{ width: 28, height: 34, borderRadius: '50%', background: opt.fx === 'galaxy' ? 'radial-gradient(circle at 50% 38%, oklch(0.60 0.18 300), oklch(0.22 0.10 280))' : `radial-gradient(circle at 50% 38%, ${opt.iris}, oklch(0.25 0.05 270))`, position: 'relative', marginTop: 8 }}>
          {opt.fx === 'star'
            ? <div style={{ position: 'absolute', top: 7, left: 7, width: 14, height: 14, background: 'white', clipPath: 'polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)' }} />
            : <div style={{ position: 'absolute', top: 4, left: 5, width: 9, height: 9, background: 'white', borderRadius: '50%' }} />}
          {(opt.fx === 'glitter' || opt.fx === 'galaxy') && <div style={{ position: 'absolute', bottom: 5, right: 4, fontSize: 8, color: 'white' }}>✦</div>}
        </div>
      </div>
    );
  }
  if (kind === 'coat') {
    if (opt.natural) {
      return <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'conic-gradient(oklch(0.97 0.012 70), oklch(0.78 0.12 45), oklch(0.85 0.06 75), oklch(0.70 0.08 55), oklch(0.97 0.012 70))', border: '3px solid oklch(0.70 0.05 60)', display: 'grid', placeItems: 'center', fontSize: 18 }}>🐾</div>;
    }
    return <div style={{ width: 44, height: 44, borderRadius: '50%', background: opt.coat, border: `3px solid ${opt.coatD}` }} />;
  }
  if (kind === 'marks') {
    return (
      <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'oklch(0.96 0.012 70)', border: '2px solid oklch(0.84 0.03 60)', display: 'grid', placeItems: 'center' }}>
        {opt.kind === 'none' && <span style={{ fontSize: 16, color: 'var(--ink-soft)', fontWeight: 800 }}>—</span>}
        {opt.kind === 'freckles' && <div style={{ display: 'flex', gap: 3 }}>{[0, 1, 2].map((i) => <div key={i} style={{ width: 4, height: 4, borderRadius: '50%', background: 'oklch(0.60 0.08 50)' }} />)}</div>}
        {opt.kind === 'mole' && <div style={{ width: 6, height: 6, borderRadius: '50%', background: 'oklch(0.40 0.04 50)' }} />}
        {opt.kind === 'decal' && <span style={{ fontSize: 17, color: opt.color }}>{opt.glyph}</span>}
        {(opt.kind === 'earstud' || opt.kind === 'nosestud') && <div style={{ width: 9, height: 9, borderRadius: '50%', background: 'radial-gradient(circle at 35% 30%, oklch(0.95 0.08 90), oklch(0.78 0.13 85))', boxShadow: '0 0 5px oklch(0.85 0.13 88)' }} />}
      </div>
    );
  }
  // blush
  return (
    <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'oklch(0.96 0.012 70)', border: '2px solid oklch(0.84 0.03 60)', display: 'grid', placeItems: 'center' }}>
      {opt.blush === 'transparent'
        ? <span style={{ fontSize: 16, color: 'var(--ink-soft)', fontWeight: 800 }}>—</span>
        : <div style={{ width: 24, height: 13, borderRadius: '50%', background: opt.blush, opacity: .75 }} />}
    </div>
  );
}

function CustomizePanel({ open, onClose, gems, onSpend, custom, setCustom, ownedCz, setOwnedCz, worn, petName, onRename, catColors, unlockedIdx = 0 }) {
  const [tab, setTab] = useCzState('species');
  const [editing, setEditing] = useCzState(false);
  const snapshot = useCzRef(null);

  useCzEffect(() => { if (open) { snapshot.current = { ...custom }; setTab('species'); } }, [open]);
  if (!open) return null;

  const tabObj = CZ_TABS.find((t) => t.id === tab);
  const list = tabObj.list();
  const tierIdx = (t) => window.CEFR.findIndex((l) => l.id === t);

  function pick(opt) {
    const locked = opt.tier && tierIdx(opt.tier) > unlockedIdx;
    if (locked) return;
    const isOwned = ownedCz.has(opt.id) || !opt.price;
    if (!isOwned) {
      if (gems < opt.price) return;
      onSpend(opt.price);
      setOwnedCz((s) => new Set(s).add(opt.id));
    }
    setCustom((c) => {
      const next = { ...c, [tabObj.key]: opt.id };
      // v11: switching species snaps the coat back to that animal's NATURAL color
      if (tabObj.key === 'speciesId') next.coatId = 'coat_natural';
      return next;
    });
  }
  function cancel() { if (snapshot.current) setCustom(snapshot.current); onClose(); }

  return (
    <div style={window.overlayStyle}>
      <div onClick={(e) => e.stopPropagation()} className="card sheet-anim" data-screen-label="Pet Salon" style={{ width: 'min(900px, 96vw)', height: 'min(88vh, 640px)', display: 'flex', overflow: 'hidden', padding: 0 }}>

        {/* ===== SALON STAGE (left) ===== */}
        <div style={{ width: 300, flex: '0 0 auto', position: 'relative', overflow: 'hidden', background: 'repeating-linear-gradient(90deg, oklch(0.88 0.045 220) 0 34px, oklch(0.84 0.05 220) 34px 68px)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'flex-end' }}>
          {[[14, 12], [70, 8], [42, 22], [84, 30], [10, 38]].map(([x, y], i) => (
            <div key={i} style={{ position: 'absolute', left: `${x}%`, top: `${y}%`, fontSize: 17, opacity: .25 }}>🐾</div>
          ))}
          <div style={{ position: 'absolute', left: '8%', top: '46%', fontSize: 16, opacity: .5 }}>✂️</div>
          <div style={{ position: 'absolute', right: '8%', top: '40%', fontSize: 15, opacity: .5 }}>✨</div>
          <div style={{ position: 'absolute', top: -20, left: '50%', transform: 'translateX(-50%)', width: 300, height: 420, background: 'radial-gradient(ellipse 52% 60% at 50% 70%, oklch(1 0.02 95 / .55), transparent 70%)', pointerEvents: 'none' }} />

          <div style={{ position: 'relative', zIndex: 2, marginBottom: -6, filter: 'drop-shadow(0 10px 14px oklch(0.3 0.05 220 / .35))' }}>
            <Cat worn={worn} custom={catColors} scale={0.94} />
          </div>
          <div style={{ position: 'relative', zIndex: 1, width: 210, height: 30, borderRadius: '50%', background: 'linear-gradient(180deg, oklch(0.85 0.10 75), oklch(0.74 0.11 70))', border: '2.5px solid oklch(0.60 0.10 65)' }} />
          <div style={{ width: 240, height: 26, borderRadius: '50%', background: 'linear-gradient(180deg, oklch(0.80 0.10 70), oklch(0.70 0.11 65))', border: '2.5px solid oklch(0.58 0.10 62)', marginTop: -14 }} />

          <div style={{ position: 'relative', zIndex: 3, margin: '14px 0 18px', display: 'flex', alignItems: 'center', gap: 8 }}>
            {editing ? (
              <input autoFocus defaultValue={petName}
                onKeyDown={(e) => { if (e.key === 'Enter') { onRename(e.target.value.slice(0, 14) || petName); setEditing(false); } }}
                onBlur={(e) => { onRename(e.target.value.slice(0, 14) || petName); setEditing(false); }}
                style={{ width: 150, textAlign: 'center', fontFamily: 'var(--display)', fontWeight: 700, fontSize: 16, padding: '7px 12px', borderRadius: 999, border: '2px solid var(--primary)', outline: 'none', background: 'var(--panel)', color: 'var(--ink)' }} />
            ) : (
              <button onClick={() => setEditing(true)} title="Rename your pet" style={{ display: 'flex', alignItems: 'center', gap: 8, background: 'var(--panel)', border: '2px solid var(--line)', borderRadius: 999, padding: '7px 18px', boxShadow: '0 4px 0 var(--line)' }}>
                <span style={{ fontSize: 13 }}>✏️</span>
                <span style={{ fontFamily: 'var(--display)', fontWeight: 700, fontSize: 16, color: 'var(--ink)' }}>{petName}</span>
              </button>
            )}
          </div>
        </div>

        {/* ===== CATALOG (right) ===== */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 18px', borderBottom: '2px solid var(--line)' }}>
            <span style={{ fontSize: 22 }}>🪞</span>
            <div>
              <h2 style={{ fontSize: 19, lineHeight: 1 }}>Character Studio</h2>
              <div style={{ fontSize: 11.5, color: 'var(--ink-soft)', fontWeight: 700, marginTop: 3 }}>Species, fur, glow-eyes & face marks. 🔒 traits unlock at higher CEFR levels.</div>
            </div>
            <div style={{ flex: 1 }} />
            <div className="pill"><Gem size={18} /><GemCount value={gems} /></div>
          </div>

          <div style={{ display: 'flex', gap: 6, padding: '12px 18px 0', flexWrap: 'wrap' }}>
            {CZ_TABS.map((t) => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                padding: '8px 14px', borderRadius: 999, fontFamily: 'var(--display)', fontWeight: 700, fontSize: 12.5,
                background: tab === t.id ? 'var(--ink)' : 'var(--panel-2)', color: tab === t.id ? 'var(--panel)' : 'var(--ink)',
                border: '1.5px solid var(--line)',
              }}>{t.label}</button>
            ))}
          </div>

          <div className="scroll" style={{ flex: 1, overflowY: 'auto', padding: 18, display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(106px, 1fr))', gap: 12, alignContent: 'start' }}>
            {list.map((opt) => {
              const locked = opt.tier && tierIdx(opt.tier) > unlockedIdx;
              const isOwned = ownedCz.has(opt.id) || !opt.price;
              const isActive = custom[tabObj.key] === opt.id;
              const afford = gems >= (opt.price || 0);
              return (
                <button key={opt.id} onClick={() => pick(opt)} disabled={locked || (!isOwned && !afford)} title={locked ? `Reach ${opt.tier} on the Gaming English curriculum to unlock` : ''} style={{
                  display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 7, padding: '12px 8px 10px',
                  borderRadius: 'var(--r-md)', background: isActive ? 'var(--mint)' : 'var(--panel)',
                  border: '2px solid', borderColor: isActive ? 'var(--mint-d)' : locked ? 'var(--line)' : 'var(--line)',
                  boxShadow: isActive ? '0 4px 0 var(--mint-d)' : '0 3px 0 var(--line)',
                  opacity: locked ? .5 : (!isOwned && !afford ? .55 : 1),
                  cursor: locked || (!isOwned && !afford) ? 'not-allowed' : 'pointer',
                  position: 'relative', filter: locked ? 'grayscale(.5)' : 'none',
                }}>
                  {isActive && <div style={{ position: 'absolute', top: 6, right: 8, fontSize: 13, fontWeight: 900, color: 'oklch(0.30 0.06 165)' }}>✓</div>}
                  {locked && <div style={{ position: 'absolute', top: 5, right: 7, fontSize: 14 }}>🔒</div>}
                  <CzSwatch kind={tab} opt={opt} />
                  <div style={{ fontFamily: 'var(--display)', fontWeight: 700, fontSize: 12, color: isActive ? 'oklch(0.25 0.05 165)' : 'var(--ink)', textAlign: 'center', lineHeight: 1.15 }}>{opt.name}</div>
                  {locked
                    ? <div style={{ fontSize: 10, fontWeight: 800, color: 'var(--ink-soft)' }}>Unlocks at {opt.tier}</div>
                    : isOwned
                      ? <div style={{ fontSize: 10.5, fontWeight: 800, color: 'var(--ink-soft)' }}>{isActive ? 'Wearing' : 'Owned'}</div>
                      : <div style={{ display: 'flex', alignItems: 'center', gap: 4, fontFamily: 'var(--display)', fontWeight: 700, fontSize: 12, color: afford ? 'var(--ink)' : 'var(--heart)' }}><Gem size={13} />{opt.price}</div>}
                </button>
              );
            })}
          </div>

          <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10, padding: '12px 18px', borderTop: '2px solid var(--line)' }}>
            <button onClick={cancel} title="Cancel changes" style={{ width: 46, height: 46, borderRadius: '50%', background: 'var(--heart)', color: 'white', fontSize: 20, fontWeight: 800, boxShadow: '0 4px 0 oklch(0.50 0.16 18)', border: 'none' }}>✕</button>
            <button onClick={onClose} title="Keep this look" style={{ width: 46, height: 46, borderRadius: '50%', background: 'var(--primary)', color: 'var(--primary-ink)', fontSize: 20, fontWeight: 800, boxShadow: '0 4px 0 var(--primary-d)', border: 'none' }}>✓</button>
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { CustomizePanel });

</script>

          {/* the river — sweeping band across the lower map, with sparkles + bridge */}

<script type="text/babel" data-presets="react">
// fishing.jsx — The Grammatical Fishing Pier (v7). Catch word-fish in the right order.
// Exports: FishingGame
const { useState: useFishState, useEffect: useFishEffect, useMemo: useFishMemo, useRef: useFishRef } = React;

function shuffleFish(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function FishingGame({ level, worn, catColors, onExit, onReward }) {
  const pools = window.FISHING_POOLS[level.id];
  const [round, setRound] = useFishState(0);
  const challenge = pools[round % pools.length];
  const [caught, setCaught] = useFishState([]);          // words captured so far (in order)
  const [state, setGState] = useFishState('fishing');    // fishing | reeling | celebrate | done
  const [reelTarget, setReelTarget] = useFishState(null); // fish being reeled
  const [shakeWrong, setShakeWrong] = useFishState(null);
  const [earned, setEarned] = useFishState(0);

  // build the school: remaining correct words + decoys
  const fish = useFishMemo(() => {
    const remaining = challenge.words.filter((w, i) => i >= caught.length);
    const decoys = window.FISH_DECOYS.slice(0, Math.max(2, 6 - remaining.length));
    const all = shuffleFish([...remaining.map((w) => ({ w, ok: true })), ...decoys.map((w) => ({ w, ok: false }))]);
    return all.map((f, i) => ({ ...f, key: round + '-' + caught.length + '-' + i,
      x: 8 + (i % 4) * 23 + Math.random() * 6, y: 12 + Math.floor(i / 4) * 30 + Math.random() * 10,
      dur: 4 + Math.random() * 4, delay: -Math.random() * 4, size: 26 + Math.random() * 10 }));
  }, [round, caught.length]);

  const nextWord = challenge.words[caught.length];

  function castAt(f) {
    if (state !== 'fishing') return;
    if (f.w === nextWord && f.ok !== false || (f.ok && f.w === nextWord)) {
      setGState('reeling'); setReelTarget(f.key);
      setTimeout(() => {
        const newCaught = [...caught, f.w];
        setCaught(newCaught); setReelTarget(null);
        if (newCaught.length === challenge.words.length) {
          const pay = level.pay; // merit payout
          setEarned(pay); setGState('celebrate');
          setTimeout(() => { onReward(pay, `Sentence complete! +${pay}`); setGState('done'); }, 2200);
        } else setGState('fishing');
      }, 900);
    } else {
      setShakeWrong(f.key);
      setTimeout(() => setShakeWrong(null), 600);
    }
  }
  function nextRound() { setCaught([]); setRound((r) => r + 1); setGState('fishing'); }

  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 60, borderRadius: 'var(--r-lg)', overflow: 'hidden', border: '3px solid var(--line)' }} data-screen-label="Fishing Pier">
      {/* sky + sea */}
      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg, oklch(0.90 0.05 230) 0%, oklch(0.93 0.06 80) 30%, oklch(0.78 0.10 230) 42%, oklch(0.62 0.12 240) 100%)' }} />
      {/* sun glitter on water */}
      <div style={{ position: 'absolute', top: '42%', left: 0, right: 0, height: 5, background: 'repeating-linear-gradient(90deg, oklch(0.97 0.04 90 / .8) 0 14px, transparent 14px 38px)', animation: 'wavebob 4s ease-in-out infinite' }} />
      <div style={{ position: 'absolute', top: '52%', left: 0, right: 0, height: 4, background: 'repeating-linear-gradient(90deg, oklch(0.95 0.04 220 / .5) 0 10px, transparent 10px 46px)', animation: 'wavebob 5.4s ease-in-out infinite reverse' }} />

      {/* the dock (left) */}
      <div style={{ position: 'absolute', left: 0, top: '30%', width: '26%', height: 16, background: 'repeating-linear-gradient(90deg, oklch(0.72 0.07 60) 0 26px, oklch(0.66 0.08 58) 26px 30px)', borderRadius: '0 8px 8px 0', boxShadow: '0 5px 8px -3px oklch(0.3 0.05 240 / .5)' }} />
      {[8, 18].map((x) => <div key={x} style={{ position: 'absolute', left: `${x}%`, top: 'calc(30% + 12px)', width: 11, height: '26%', background: 'linear-gradient(180deg, oklch(0.62 0.08 58), oklch(0.50 0.07 55))', borderRadius: 5 }} />)}

      {/* pet + rod — ONE locked composition: the cat sits flat on the pier edge,
          the rod is positioned in rig-space so it stays mathematically inside the paw */}
      <div style={{ position: 'absolute', left: '11%', top: 'calc(30% + 12px - 230px)', width: 150, height: 230, zIndex: 5 }}>
        <div style={{ position: 'absolute', inset: 0, transform: 'scale(0.72)', transformOrigin: 'bottom center' }}>
          <Cat worn={worn} custom={catColors} anim={state === 'celebrate' ? 'juggle' : 'sitting'} facing="right" />
          {state !== 'celebrate' && (
            <React.Fragment>
              {/* bamboo rod — anchored at the paw (rig coords) */}
              <div style={{ position: 'absolute', left: 92, top: 142, width: 150, height: 6, background: 'linear-gradient(90deg, oklch(0.60 0.09 60), oklch(0.74 0.10 85))', borderRadius: 3, transform: 'rotate(-32deg)', transformOrigin: 'left center', border: '1.5px solid oklch(0.45 0.07 55)' }} />
              {/* paw grip over the rod butt */}
              <div style={{ position: 'absolute', left: 88, top: 134, width: 18, height: 18, borderRadius: '50%', background: 'oklch(0.92 0.02 70)', border: '2px solid oklch(0.78 0.04 60)' }} />
              {/* line from rod tip down to the water */}
              <div style={{ position: 'absolute', left: 217, top: 60, width: 2.5, height: state === 'reeling' ? 110 : 330, background: 'oklch(0.35 0.02 240 / .55)', transition: 'height .8s' }} />
              <div style={{ position: 'absolute', left: 209, top: state === 'reeling' ? 162 : 382, fontSize: 16, transition: 'top .8s' }}>🪝</div>
            </React.Fragment>
          )}
        </div>
      </div>

      {/* celebrate: glowing fish + starburst */}
      {state === 'celebrate' && (
        <div style={{ position: 'absolute', left: '11%', top: 'calc(30% - 230px)', zIndex: 6, animation: 'popin .5s' }}>
          <div style={{ fontSize: 64, '--g': 'oklch(0.85 0.14 90)', animation: 'glowpulse 1s ease-in-out infinite', transform: 'scaleX(-1)' }}>🐟</div>
          <div style={{ position: 'absolute', inset: -20, pointerEvents: 'none' }}>
            {[...Array(8)].map((_, i) => { const a = i / 8 * Math.PI * 2; return (
              <div key={i} style={{ position: 'absolute', top: '50%', left: '50%', fontSize: 15, color: 'oklch(0.88 0.14 88)', '--sx': `${Math.cos(a) * 60}px`, '--sy': `${Math.sin(a) * 60}px`, animation: 'sparklepop 1s ease-out infinite' }}>✦</div>
            ); })}
          </div>
        </div>
      )}

      {/* word-fish school */}
      {(state === 'fishing' || state === 'reeling') && fish.map((f) => (
        <button key={f.key} onClick={() => castAt(f)} style={{
          position: 'absolute', left: `${30 + f.x * 0.66}%`, top: `${46 + f.y * 0.46}%`, zIndex: 3,
          background: 'none', border: 'none', cursor: 'pointer', padding: 0,
          '--swim': `${30 + f.size}px`,
          animation: reelTarget === f.key ? 'none' : `fishswim ${f.dur}s ease-in-out infinite ${f.delay}s`,
          transition: reelTarget === f.key ? 'all .8s ease' : 'none',
          ...(reelTarget === f.key ? { left: '24%', top: '32%', opacity: 0 } : {}),
          ...(shakeWrong === f.key ? { animation: 'shake .5s ease' } : {}),
        }}>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2 }}>
            <div style={{ background: 'oklch(0.97 0.02 220 / .92)', border: '2px solid oklch(0.75 0.06 230)', borderRadius: 999, padding: '4px 12px', fontFamily: 'var(--display)', fontWeight: 700, fontSize: 14, color: 'oklch(0.30 0.05 240)', boxShadow: '0 3px 8px -3px oklch(0.3 0.05 240 / .5)' }}>{f.w}</div>
            <div style={{ fontSize: f.size }}>🐠</div>
          </div>
        </button>
      ))}

      {/* HUD: objective tracker */}
      <div style={{ position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)', zIndex: 10, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, width: 'min(560px, 92%)' }}>
        <div className="pill" style={{ fontSize: 14, whiteSpace: 'nowrap' }}>🎣 {challenge.prompt} <span style={{ color: 'var(--ink-soft)', fontSize: 12 }}>· {level.id} · +{level.pay}💎</span></div>
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'center' }}>
          {challenge.words.map((w, i) => (
            <div key={i} style={{
              padding: '6px 13px', borderRadius: 999, fontFamily: 'var(--display)', fontWeight: 700, fontSize: 14,
              background: i < caught.length ? 'var(--mint)' : 'oklch(1 0 0 / .85)',
              color: i < caught.length ? 'oklch(0.25 0.05 165)' : 'var(--ink-soft)',
              border: '2px solid', borderColor: i < caught.length ? 'var(--mint-d)' : i === caught.length ? 'var(--primary)' : 'var(--line)',
              boxShadow: i === caught.length ? '0 0 0 3px oklch(0.58 0.10 135 / .3)' : 'none',
            }}>{i < caught.length ? w : i === caught.length ? '?' : '·'}</div>
          ))}
        </div>
      </div>

      {/* done panel */}
      {state === 'done' && (
        <div style={{ position: 'absolute', inset: 0, zIndex: 20, background: 'oklch(0.2 0.03 240 / .4)', display: 'grid', placeItems: 'center' }}>
          <div className="card" style={{ padding: 28, textAlign: 'center', width: 320 }}>
            <div style={{ fontSize: 44 }}>🏆</div>
            <h2 style={{ fontSize: 21, margin: '8px 0 4px' }}>Great catch!</h2>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: 'var(--display)', fontWeight: 700, fontSize: 17 }}><Gem size={18} />+{earned}</div>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'center', marginTop: 18 }}>
              <button className="btn3d ghost" onClick={onExit}>← Town</button>
              <button className="btn3d" onClick={nextRound}>Fish again 🎣</button>
            </div>
          </div>
        </div>
      )}

      <button className="btn3d ghost" onClick={onExit} style={{ position: 'absolute', bottom: 12, left: 12, zIndex: 10, fontSize: 13 }}>← Leave pier</button>
    </div>
  );
}

Object.assign(window, { FishingGame });

</script>

<script type="text/babel" data-presets="react">
// bowling.jsx — The Lexical Bowling Alley (v7). Aim the oscillating slider at the right pin.
// Exports: BowlingGame
const { useState: useBowlState, useEffect: useBowlEffect, useRef: useBowlRef, useMemo: useBowlMemo } = React;

function BowlingGame({ level, worn, catColors, onExit, onReward }) {
  const pool = window.BOWLING_POOLS[level.id];
  const [round, setRound] = useBowlState(0);
  const q = pool[round % pool.length];
  const pins = useBowlMemo(() => {
    const all = [q.correct, ...q.decoys].map((w) => ({ w, ok: w === q.correct }));
    return all.sort(() => Math.random() - 0.5);
  }, [round]);

  const [aim, setAim] = useBowlState(50);        // 0..100 across the lane
  const [phase, setPhase] = useBowlState('aim'); // aim | rolling | strike | gutter | done
  const [ballX, setBallX] = useBowlState(50);
  const [hitIdx, setHitIdx] = useBowlState(null);
  const [earned, setEarned] = useBowlState(0);
  const dirRef = useBowlRef(1);
  const aimRef = useBowlRef(50);

  // oscillating aim slider (interval-driven so it survives throttling)
  useBowlEffect(() => {
    if (phase !== 'aim') return;
    const t = setInterval(() => {
      let a = aimRef.current + dirRef.current * 1.1; // v11: slower sweep — easier to time
      if (a > 96) { a = 96; dirRef.current = -1; }
      if (a < 4) { a = 4; dirRef.current = 1; }
      aimRef.current = a; setAim(a);
    }, 16);
    return () => clearInterval(t);
  }, [phase, round]);

  function release() {
    if (phase !== 'aim') return;
    const a = aimRef.current;
    setPhase('rolling');
    // v9 RIGID COLLISION HANDSHAKE: the throw is an ANSWER, not a physics dice-roll.
    // True gutters exist only at the outer lane edges; everywhere else the ball's
    // trajectory vector locks 1:1 onto the nearest pin — a correct pick can NEVER
    // misregister as a gutter or a false negative.
    if (a < 10 || a > 90) {
      setBallX(a);
      setTimeout(() => { setPhase('gutter'); setTimeout(() => setPhase('done0'), 1600); }, 950);
      return;
    }
    const idx = Math.min(3, Math.max(0, Math.round((a - 20) / 20)));
    setBallX(20 + idx * 20); // trajectory locked onto the chosen pin

      {[['🎳', 8, 10], ['✨', 88, 12], ['🌟', 80, 4]].map(([e, x, y], i) => (
        <div key={i} style={{ position: 'absolute', left: `${x}%`, top: `${y}%`, fontSize: 22, filter: 'drop-shadow(0 0 8px oklch(0.8 0.15 320))' }}>{e}</div>

      {/* the lane (perspective trapezoid) */}
      <div style={{ position: 'absolute', left: '50%', bottom: 0, transform: 'translateX(-50%)', width: 'min(520px, 86%)', height: '66%', background: laneFloor, clipPath: 'polygon(28% 0, 72% 0, 100% 100%, 0 100%)', boxShadow: 'inset 0 0 30px oklch(0.4 0.06 70 / .5)' }}>

              <div style={{ position: 'absolute', top: 14, left: 0, right: 0, height: 6, background: 'oklch(0.62 0.16 20)', borderRadius: 3 }} />

      </div>

      {/* prompt */}
      <div style={{ position: 'absolute', top: 44, left: '50%', transform: 'translateX(-50%)', zIndex: 10 }}>
        <div className="pill" style={{ fontSize: 14.5, whiteSpace: 'nowrap' }}>🎯 {q.prompt} <span style={{ color: 'var(--ink-soft)', fontSize: 12 }}>· {level.id} · +{level.pay}💎</span></div>
      </div>

      {/* rolling ball */}
      {phase === 'rolling' && (
        <div style={{ position: 'absolute', bottom: '13%', left: `calc(50% + ${(ballX - 50) * 3.3}px)`, zIndex: 4, animation: 'ballroll .95s ease-in forwards' }}>
          <div style={{ width: 40, height: 40, borderRadius: '50%', background: 'radial-gradient(circle at 35% 30%, oklch(0.75 0.14 340), oklch(0.50 0.16 320))', border: '2.5px solid oklch(0.35 0.10 310)', boxShadow: '0 4px 10px -3px black' }} />

<script type="text/babel" data-presets="react">
// park.jsx — The Central Lexical Park (v7). Keep the ball up by answering fast; combos pay gems.
// Exports: ParkGame
const { useState: useParkState, useEffect: useParkEffect, useRef: useParkRef } = React;

const ROUND_SECONDS = 14;

function ParkGame({ level, worn, catColors, onExit, onReward }) {
  const pool = window.PARK_POOLS[level.id];
  const [qIdx, setQIdx] = useParkState(0);
  const q = pool[qIdx % pool.length];
  const [typed, setTyped] = useParkState('');
  const [combo, setCombo] = useParkState(0);
  const [timeLeft, setTimeLeft] = useParkState(ROUND_SECONDS);
  const [phase, setPhase] = useParkState('play'); // play | fountain | dropped
  const [earned, setEarned] = useParkState(0);
  const [shake, setShake] = useParkState(false);
  const inputRef = useParkRef(null);

  // countdown — the ball "drops" when time runs out
  useParkEffect(() => {
    if (phase !== 'play') return;
    const t = setInterval(() => setTimeLeft((s) => {
      if (s <= 1) { clearInterval(t); endRun(); return 0; }
      return s - 1;
    }), 1000);
    return () => clearInterval(t);
  }, [phase, qIdx]);

  useParkEffect(() => { if (inputRef.current) inputRef.current.focus(); }, [qIdx, phase]);

  function endRun() {
    setPhase('dropped');
  }
  function submit(e) {
    e && e.preventDefault();
    if (phase !== 'play') return;
    if (typed.trim().toLowerCase() === q.answer.toLowerCase()) {
      const newCombo = combo + 1;
      setCombo(newCombo); setTyped(''); setTimeLeft(ROUND_SECONDS);
      if (newCombo % 3 === 0) {
        // every 3 in a row: gem fountain!
        const pay = Math.round(level.pay * (1 + newCombo / 10)); // merit payout, combo-boosted
        setEarned(pay); setPhase('fountain');
        setTimeout(() => { onReward(pay, `Combo ×${newCombo}! +${pay}`); setPhase('play'); setQIdx((i) => i + 1); }, 1800);
      } else {
        setQIdx((i) => i + 1);
      }
    } else {
      setShake(true); setTimeout(() => setShake(false), 500);
      setTyped('');
    }
  }
  function restart() { setCombo(0); setTimeLeft(ROUND_SECONDS); setQIdx((i) => i + 1); setPhase('play'); }

  const urgency = timeLeft <= 4;

  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 60, borderRadius: 'var(--r-lg)', overflow: 'hidden', border: '3px solid var(--line)' }} data-screen-label="Central Park">
      {/* park scene */}
      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg, oklch(0.88 0.05 230) 0%, oklch(0.92 0.04 210) 30%, oklch(0.80 0.11 142) 31%, oklch(0.74 0.12 140) 100%)' }} />
      {/* trees + flowers + playground */}
      {[[6, 16, 54, '🌳'], [88, 14, 60, '🌳'], [70, 24, 40, '🌲']].map(([x, y, s, e], i) => (
        <div key={i} style={{ position: 'absolute', left: `${x}%`, top: `${y}%`, fontSize: s, filter: 'drop-shadow(0 4px 4px oklch(0.4 0.07 145 / .4))' }}>{e}</div>
      ))}
      {[[12, 62, '🌷'], [26, 76, '🌼'], [78, 66, '🌷'], [90, 80, '🌻'], [60, 84, '🌼'], [40, 64, '🌸']].map(([x, y, e], i) => (
        <div key={'f' + i} style={{ position: 'absolute', left: `${x}%`, top: `${y}%`, fontSize: 19 }}>{e}</div>
      ))}
      {/* butterflies bounce */}
      {[[30, 30], [62, 38], [82, 46]].map(([x, y], i) => (
        <div key={'b' + i} style={{ position: 'absolute', left: `${x}%`, top: `${y}%`, fontSize: 17, animation: `bobble ${2 + i * 0.5}s ease-in-out infinite ${i * 0.4}s` }}>🦋</div>
      ))}
      {/* slide */}
      <div style={{ position: 'absolute', left: '8%', bottom: '14%', width: 90, height: 70 }}>
        <div style={{ position: 'absolute', left: 0, bottom: 0, width: 12, height: 56, background: 'oklch(0.70 0.10 235)', borderRadius: 5, border: '2px solid oklch(0.50 0.09 235)' }} />
        <div style={{ position: 'absolute', left: 6, top: 0, width: 76, height: 16, background: 'oklch(0.80 0.12 90)', borderRadius: 8, border: '2px solid oklch(0.60 0.10 80)', transform: 'rotate(32deg)', transformOrigin: 'left center' }} />
      </div>

      {/* pet juggling */}
      <div style={{ position: 'absolute', left: '50%', bottom: '8%', transform: 'translateX(-50%)', zIndex: 5 }}>
        <Cat worn={worn} custom={catColors} scale={0.92} anim={phase === 'dropped' ? 'sitting' : 'juggle'} facing="right" />
        {phase === 'dropped' && <div style={{ position: 'absolute', bottom: -8, left: 100, fontSize: 30, opacity: .8 }}>⚽</div>}
      </div>

      {/* gem fountain on combo */}
      {phase === 'fountain' && (
        <div style={{ position: 'absolute', left: '50%', bottom: '36%', zIndex: 8, pointerEvents: 'none' }}>
          {[...Array(12)].map((_, i) => (
            <div key={i} style={{ position: 'absolute', '--gx': `${(i - 6) * 16}px`, animation: `gemfountain ${0.8 + (i % 4) * 0.2}s ease-out ${i * 0.06}s forwards` }}>
              <Gem size={16 + (i % 3) * 5} />
            </div>
          ))}
          <div style={{ position: 'absolute', top: -60, left: '50%', transform: 'translateX(-50%)', fontFamily: 'var(--display)', fontWeight: 800, fontSize: 30, color: 'oklch(0.88 0.14 88)', textShadow: '0 2px 0 oklch(0.55 0.12 80)', whiteSpace: 'nowrap', animation: 'popin .4s' }}>COMBO ×{combo}!</div>
        </div>
      )}

      {/* challenge HUD */}
      <div style={{ position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)', zIndex: 10, width: 'min(540px, 92%)', display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'center' }}>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <div className="pill" style={{ fontSize: 13, whiteSpace: 'nowrap' }}>🌳 Central Park · {level.id} · +{level.pay}💎</div>
          <div className="pill" style={{ fontSize: 13, background: combo > 0 ? 'var(--mint)' : 'var(--panel)' }}>🔥 Combo {combo}</div>
          <div className="pill tabular" style={{ fontSize: 13, color: urgency ? 'var(--heart)' : 'var(--ink)', animation: urgency ? 'popin .4s infinite alternate' : 'none' }}>⏱ {timeLeft}s</div>
        </div>
        {phase !== 'dropped' && (
          <div className="card" style={{ padding: '14px 18px', width: '100%', textAlign: 'center', animation: shake ? 'shake .5s' : 'none' }}>
            <div style={{ fontFamily: 'var(--display)', fontWeight: 700, fontSize: 17 }}>{q.clue}</div>
            <form onSubmit={submit} style={{ display: 'flex', gap: 8, marginTop: 10, justifyContent: 'center' }}>
              <input ref={inputRef} value={typed} onChange={(e) => setTyped(e.target.value)} placeholder="type your answer…"
                disabled={phase !== 'play'}
                style={{ width: 220, padding: '10px 14px', borderRadius: 999, border: '2px solid var(--line)', outline: 'none', fontFamily: 'var(--body)', fontWeight: 700, fontSize: 14, background: 'var(--panel-2)', color: 'var(--ink)', textAlign: 'center' }} />
              <button type="submit" className="btn3d" style={{ fontSize: 13 }}>Throw! ⚽</button>
            </form>
          </div>
        )}
      </div>

      {/* dropped panel */}
      {phase === 'dropped' && (
        <div style={{ position: 'absolute', inset: 0, zIndex: 20, background: 'oklch(0.25 0.05 145 / .4)', display: 'grid', placeItems: 'center' }}>
          <div className="card" style={{ padding: 26, textAlign: 'center', width: 330 }}>
            <div style={{ fontSize: 42 }}>⚽💨</div>
            <h2 style={{ fontSize: 20, margin: '8px 0 4px' }}>The ball dropped!</h2>
            <p style={{ fontSize: 13, fontWeight: 700, color: 'var(--ink-soft)', margin: '0 0 6px' }}>The answer was “{q.answer}”. Best combo this visit: ×{combo}</p>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'center', marginTop: 14 }}>
              <button className="btn3d ghost" onClick={onExit}>← Town</button>
              <button className="btn3d" onClick={restart}>Play again ⚽</button>
            </div>
          </div>
        </div>
      )}

      <button className="btn3d ghost" onClick={onExit} style={{ position: 'absolute', bottom: 12, left: 12, zIndex: 25, fontSize: 13 }}>← Leave park</button>
    </div>
  );
}

Object.assign(window, { ParkGame });

</script>

  const [streak, setStreak] = useHospState(0);

  function clickSpot(h) {
    if (phase !== 'scan') return;
    if (h.id === q.target) {
      const newStreak = streak + 1;
      setStreak(newStreak);
      setPhase('success');
      setTimeout(() => {
        if (newStreak >= 3) {
          const pay = level.pay;
          setEarned(pay);
          onReward(pay, `Flawless diagnostics! +${pay}`);
          onRecord && onRecord({ game: 'hospital', level: level.id, streak: newStreak, perfect: true });
          setPhase('done');
        } else {
          setRound((r) => r + 1); setPhase('scan');
        }
      }, 1400);
    } else {
      setMissAt(h.id); setPhase('miss');
      setTimeout(() => { setMissAt(null); setStreak(0); setPhase('scan'); }, 1500);
    }

<script type="text/babel" data-presets="react">
// pocket.jsx — v14 slide-out snack pocket. Opens from the top-left avatar, sits in the

const { useState: usePocketState } = React;

function Pocket({ open, onClose, pantry, onEat }) {
  const [sel, setSel] = usePocketState(null);
  if (!open) return null;
  const items = Object.entries(pantry || {}).map(([id, n]) => {
    const it = [...window.FOODS, ...window.DRINKS].find((f) => f.id === id);
    return it ? { it, n } : null;
  }).filter(Boolean);
  const selItem = sel && items.find((x) => x.it.id === sel);
  const isDrink = selItem && window.DRINKS.some((d) => d.id === selItem.it.id);

  return (
    <div style={{ position: 'absolute', top: 64, left: 12, zIndex: 70, width: 270, animation: 'slidein .22s ease' }}>

        {items.length === 0 ? (
          <div style={{ fontSize: 12.5, fontWeight: 700, color: 'var(--ink-soft)', padding: '14px 6px', lineHeight: 1.4 }}>
            Your pocket is empty! Visit the 🛒 Food Market on the Town Map to buy snacks &amp; drinks.
          </div>
        ) : (
          <React.Fragment>
            <div className="scroll" style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 6, maxHeight: 132, overflowY: 'auto' }}>

                }}>
                  {it.art}
                  <span style={{ position: 'absolute', top: -5, right: -4, minWidth: 15, height: 15, borderRadius: 999, background: 'var(--primary)', color: 'var(--primary-ink)', fontFamily: 'var(--display)', fontWeight: 800, fontSize: 9, display: 'grid', placeItems: 'center', padding: '0 3px' }}>{n}</span>
                </button>
              ))}
            </div>
            {selItem && (
              <div style={{ marginTop: 9, display: 'flex', alignItems: 'center', gap: 9, padding: '8px 10px', borderRadius: 'var(--r-md)', background: 'var(--panel-2)', border: '1.5px solid var(--line)', animation: 'popin .18s' }}>
                <span style={{ fontSize: 26 }}>{selItem.it.art}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: 'var(--display)', fontWeight: 700, fontSize: 13 }}>{selItem.it.name}</div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--mint-d)' }}>+{selItem.it.restore}🍽 {selItem.it.happy ? `· +${selItem.it.happy}💛` : ''}</div>
                </div>
                <button className="btn3d mint" onClick={() => { onEat(selItem.it); setSel(null); }} style={{ fontSize: 12, padding: '8px 14px' }}>{isDrink ? 'DRINK' : 'EAT'}</button>
              </div>
            )}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

// FX overlay: the pet chomps; crumbs/splash fly; joyful sparkle burst
function EatFx({ fx }) {
  if (!fx) return null;
  const drink = fx.drink;
  return (
    <div style={{ position: 'absolute', left: '50%', bottom: '24%', transform: 'translateX(-50%)', zIndex: 45, pointerEvents: 'none' }}>

<script type="text/babel" data-presets="react">
// mythicfx.jsx — v14 full-screen interactive overlays for mythic furniture:
// DJ Mixing Booth (10-track global swap), Celestial Telescope (drag starfield),
// Retro Arcade (playable 30s mini-game). Exports window.MythicOverlay.
const { useState: useMfxState, useEffect: useMfxEffect, useRef: useMfxRef } = React;

function DJBooth({ onClose }) {
  const [cur, setCur] = useMfxState(window.MyAudio.currentTrack());
  const tracks = window.MyAudio.tracks();
  return (
    <div style={ovl()}>
      <div onClick={(e) => e.stopPropagation()} className="card sheet-anim" style={panel(440)}>
        <Hd icon="🎧" title="DJ Mixing Booth" sub="Swap the global vibe — plays across the whole town" onClose={onClose} />
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, padding: 16 }}>
          {tracks.map((t) => (
            <button key={t.id} onClick={() => { window.MyAudio.setTrack(t.id); setCur(t.id); }} style={{
              display: 'flex', alignItems: 'center', gap: 8, padding: '11px 13px', borderRadius: 'var(--r-md)', cursor: 'pointer',
              background: cur === t.id ? 'var(--primary)' : 'var(--panel-2)', color: cur === t.id ? 'var(--primary-ink)' : 'var(--ink)',
              border: '1.5px solid', borderColor: cur === t.id ? 'var(--primary-d)' : 'var(--line)', fontFamily: 'var(--display)', fontWeight: 700, fontSize: 13.5,
            }}>
              <span style={{ fontSize: 16 }}>{cur === t.id ? '▶' : '🎵'}</span>{t.name}
              {cur === t.id && <span style={{ marginLeft: 'auto', display: 'flex', gap: 2, alignItems: 'flex-end', height: 14 }}>
                {[0, 1, 2].map((i) => <span key={i} style={{ width: 3, height: 14, background: 'var(--primary-ink)', borderRadius: 2, transformOrigin: 'bottom', animation: `eqbar ${0.5 + i * 0.15}s ease-in-out infinite` }} />)}
              </span>}
            </button>
          ))}
        </div>
        <div style={{ padding: '0 16px 14px', fontSize: 12, fontWeight: 700, color: 'var(--ink-soft)' }}>🎚️ The chosen track keeps playing everywhere until you change it.</div>
      </div>
    </div>
  );
}

function Telescope({ onClose }) {
  const [off, setOff] = useMfxState({ x: 0, y: 0 });
  const drag = useMfxRef(null);
  // a few hidden constellations placed in the pannable starfield
  const CONS = [
    { name: 'The Great Cat', x: 120, y: 90, pts: [[0, 0], [30, -20], [60, 10], [90, -15], [120, 5]] },
    { name: 'Owl\u2019s Eyes', x: -180, y: 140, pts: [[0, 0], [40, 0], [20, 30], [60, 30]] },
    { name: 'The Bone', x: 60, y: -160, pts: [[0, 0], [50, 10], [100, 0], [80, 30], [20, -30]] },
  ];
  function down(e) { drag.current = { sx: e.clientX, sy: e.clientY, ox: off.x, oy: off.y }; }
  function move(e) { const d = drag.current; if (!d) return; setOff({ x: d.ox + (e.clientX - d.sx), y: d.oy + (e.clientY - d.sy) }); }
  function up() { drag.current = null; }
  return (
    <div style={ovl(true)}>
      <button className="iconbtn" onClick={onClose} style={{ position: 'absolute', top: 20, right: 20, zIndex: 6, width: 50, height: 50, fontSize: 22 }}>✕</button>
      <div style={{ position: 'absolute', top: 22, left: '50%', transform: 'translateX(-50%)', zIndex: 6 }}>
        <div className="pill" style={{ fontSize: 14 }}>🔭 Drag to explore the night sky — find the constellations!</div>
      </div>
      {/* circular lens viewport */}
      <div onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerLeave={up}
        style={{ position: 'absolute', left: '50%', top: '52%', transform: 'translate(-50%,-50%)', width: 'min(70vw, 70vh)', height: 'min(70vw, 70vh)', borderRadius: '50%', overflow: 'hidden', border: '10px solid oklch(0.55 0.04 260)', boxShadow: '0 0 0 6px oklch(0.30 0.03 270), inset 0 0 60px oklch(0.05 0.02 280)', cursor: 'grab', background: 'radial-gradient(120% 120% at 60% 30%, oklch(0.26 0.07 290), oklch(0.10 0.03 280))', touchAction: 'none' }}>
        <div style={{ position: 'absolute', left: '50%', top: '50%', transform: `translate(calc(-50% + ${off.x}px), calc(-50% + ${off.y}px))`, width: 1, height: 1 }}>
          {[...Array(80)].map((_, i) => <div key={i} style={{ position: 'absolute', left: ((i * 137) % 900) - 450, top: ((i * 211) % 900) - 450, width: i % 7 === 0 ? 4 : 2, height: i % 7 === 0 ? 4 : 2, borderRadius: '50%', background: 'white', opacity: 0.5 + (i % 5) * 0.1 }} />)}
          {CONS.map((c, ci) => (
            <div key={ci} style={{ position: 'absolute', left: c.x, top: c.y }}>
              <svg width="160" height="80" style={{ overflow: 'visible' }}>
                <polyline points={c.pts.map((p) => p.join(',')).join(' ')} fill="none" stroke="oklch(0.85 0.10 280)" strokeWidth="1.5" strokeDasharray="3 3" />
                {c.pts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="3.5" fill="oklch(0.95 0.06 90)"><animate attributeName="opacity" values="1;.4;1" dur={`${1.2 + i * 0.2}s`} repeatCount="indefinite" /></circle>)}
              </svg>
              <div style={{ fontFamily: 'var(--display)', fontWeight: 700, fontSize: 12, color: 'oklch(0.85 0.08 280)', marginTop: 4 }}>✨ {c.name}</div>
            </div>
          ))}
        </div>
        {/* crosshair */}
        <div style={{ position: 'absolute', left: '50%', top: 0, bottom: 0, width: 1, background: 'oklch(0.7 0.05 280 / .3)' }} />
        <div style={{ position: 'absolute', top: '50%', left: 0, right: 0, height: 1, background: 'oklch(0.7 0.05 280 / .3)' }} />
      </div>
    </div>
  );
}

function Arcade({ onClose, onReward }) {
  // simple 30s "catch the falling star" reflex game
  const [phase, setPhase] = useMfxState('ready'); // ready | play | done
  const [score, setScore] = useMfxState(0);
  const [time, setTime] = useMfxState(30);
  const [stars, setStars] = useMfxState([]);
  const idRef = useMfxRef(0);
  useMfxEffect(() => {
    if (phase !== 'play') return;
    const spawn = setInterval(() => setStars((s) => [...s, { id: idRef.current++, x: 8 + Math.random() * 84, y: -6, v: 0.8 + Math.random() * 1.2, g: Math.random() < 0.18 }]), 700);
    const fall = setInterval(() => setStars((s) => s.map((st) => ({ ...st, y: st.y + st.v })).filter((st) => st.y < 104)), 30);
    const clock = setInterval(() => setTime((t) => { if (t <= 1) { clearInterval(clock); end(); return 0; } return t - 1; }), 1000);
    return () => { clearInterval(spawn); clearInterval(fall); clearInterval(clock); };
  }, [phase]);
  function end() { setPhase('done'); }
  useMfxEffect(() => { if (phase === 'done' && score > 0) onReward(Math.min(120, score * 4), `Arcade high score: ${score}!`); }, [phase]);
  function hit(st) { if (st.g) { setScore((s) => Math.max(0, s - 3)); } else { setScore((s) => s + 1); } setStars((s) => s.filter((x) => x.id !== st.id)); }

  return (
    <div style={ovl()}>
      <div onClick={(e) => e.stopPropagation()} className="card sheet-anim" style={{ ...panel(420), height: 'min(80vh, 560px)', display: 'flex', flexDirection: 'column' }}>
        <Hd icon="🕹️" title="Retro Arcade" sub="Catch the ⭐ — dodge the 💣! 30 seconds" onClose={onClose} />
        <div style={{ display: 'flex', gap: 12, padding: '4px 16px', fontFamily: 'var(--display)', fontWeight: 800, fontSize: 14 }}>
          <span>⭐ {score}</span><span style={{ marginLeft: 'auto', color: time <= 5 ? 'var(--heart)' : 'var(--ink)' }}>⏱ {time}s</span>
        </div>
        <div style={{ flex: 1, position: 'relative', margin: 14, borderRadius: 'var(--r-md)', overflow: 'hidden', background: 'linear-gradient(180deg, oklch(0.22 0.05 280), oklch(0.14 0.03 270))', border: '3px solid var(--line)', cursor: 'crosshair' }}>
          {[...Array(30)].map((_, i) => <div key={i} style={{ position: 'absolute', left: `${(i * 53) % 98}%`, top: `${(i * 31) % 98}%`, width: 2, height: 2, borderRadius: '50%', background: 'white', opacity: .4 }} />)}
          {phase === 'ready' && <div style={{ position: 'absolute', inset: 0, display: 'grid', placeItems: 'center' }}><button className="btn3d" onClick={() => { setScore(0); setTime(30); setStars([]); setPhase('play'); }}>▶ Start</button></div>}
          {phase === 'play' && stars.map((st) => (
            <button key={st.id} onClick={() => hit(st)} style={{ position: 'absolute', left: `${st.x}%`, top: `${st.y}%`, fontSize: 26, background: 'none', border: 'none', cursor: 'pointer', padding: 0, lineHeight: 1, transform: 'translate(-50%,-50%)' }}>{st.g ? '💣' : '⭐'}</button>
          ))}
          {phase === 'done' && <div style={{ position: 'absolute', inset: 0, display: 'grid', placeItems: 'center', background: 'oklch(0.1 0.02 280 / .6)' }}>
            <div style={{ textAlign: 'center', color: 'white' }}>
              <div style={{ fontSize: 40 }}>🏆</div>
              <div style={{ fontFamily: 'var(--display)', fontWeight: 800, fontSize: 22, margin: '6px 0' }}>Score: {score}</div>
              <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
                <button className="btn3d ghost" onClick={onClose}>Done</button>
                <button className="btn3d" onClick={() => { setScore(0); setTime(30); setStars([]); setPhase('play'); }}>Again</button>
              </div>
            </div>
          </div>}
        </div>
      </div>
    </div>
  );
}

function ovl(dark) { return { position: 'fixed', inset: 0, zIndex: 120, background: dark ? 'oklch(0.06 0.02 280 / .92)' : 'oklch(0.2 0.03 60 / 0.5)', backdropFilter: 'blur(3px)', display: 'grid', placeItems: 'center', padding: 16 }; }
function panel(w) { return { width: `min(${w}px, 96vw)`, overflow: 'hidden', padding: 0 }; }
function Hd({ icon, title, sub, onClose }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '16px 18px', borderBottom: '2px solid var(--line)' }}>
      <span style={{ fontSize: 24 }}>{icon}</span>
      <div><h2 style={{ fontSize: 19, lineHeight: 1 }}>{title}</h2><div style={{ fontSize: 11.5, color: 'var(--ink-soft)', fontWeight: 700, marginTop: 3 }}>{sub}</div></div>
      <div style={{ flex: 1 }} />
      <button className="iconbtn" onClick={onClose} style={{ width: 40, height: 40, fontSize: 18 }}>✕</button>
    </div>
  );
}

function MythicOverlay({ mode, onClose, onReward }) {
  if (!mode) return null;
  if (mode === 'dj') return <DJBooth onClose={onClose} />;
  if (mode === 'stars') return <Telescope onClose={onClose} />;
  if (mode === 'arcade') return <Arcade onClose={onClose} onReward={onReward} />;
  return null;
}

Object.assign(window, { MythicOverlay });

</script>

  const modules = window.SCHOOL_MODULES[level.id] || [];
  const [modIdx, setModIdx] = useSchState(null);
  const bank = modIdx !== null ? modules[modIdx] : null;
  const [phase, setPhase] = useSchState('pick'); // pick | lesson | exam | feedback | result
  const [slide, setSlide] = useSchState(0);
  const [qIdx, setQIdx] = useSchState(0);
  const [answers, setAnswers] = useSchState([]); // true/false per question
  const [picked, setPicked] = useSchState(null);
  const [earned, setEarned] = useSchState(0);

  const isPerfect = (m) => progress.some((p) => p.game === 'school' && p.level === level.id && p.module === m.id && p.perfect);
  const exam = bank ? bank.exam : [];
  const correctCount = answers.filter(Boolean).length;
  const perfect = answers.length === exam.length && correctCount === exam.length;

  function answer(i) {
    if (picked !== null) return;
    setPicked(i);
    const ok = i === exam[qIdx].a;
    setTimeout(() => {
      const newAnswers = [...answers, ok];
      setAnswers(newAnswers); setPicked(null);
      if (qIdx + 1 < exam.length) setQIdx(qIdx + 1);
      else {
        const allOk = newAnswers.every(Boolean);
        if (allOk) {
          const pay = level.pay * 2; // PERFECT-SCORE bounty — the only way school pays
          setEarned(pay);
          onReward(pay, `Perfect score! +${pay}`);
          onRecord && onRecord({ game: 'school', level: level.id, module: bank.id, topic: bank.name, score: newAnswers.length + '/' + newAnswers.length, perfect: true });
        } else {
          onRecord && onRecord({ game: 'school', level: level.id, module: bank.id, topic: bank.name, score: newAnswers.filter(Boolean).length + '/' + newAnswers.length, perfect: false });
        }
        setPhase('result');
      }
    }, ok ? 700 : 1600);
  }
  function retryExam() { setAnswers([]); setQIdx(0); setPicked(null); setPhase('exam'); }

  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 60, borderRadius: 'var(--r-lg)', overflow: 'hidden', border: '3px solid var(--line)' }} data-screen-label="Town School">
      {/* classroom: warm wall, wood floor, windows */}

        <div style={{ position: 'absolute', top: 14, left: 14, width: 10, height: 50, background: 'oklch(0.66 0.08 55)', borderRadius: 4 }} />

            </div>

                const done = isPerfect(m);

                  <button key={m.id} onClick={() => { setModIdx(i); setSlide(0); setAnswers([]); setQIdx(0); setPicked(null); setPhase('lesson'); }} style={{
                    display: 'flex', alignItems: 'center', gap: 10, padding: '11px 13px', borderRadius: 10, textAlign: 'left',
                    background: done ? 'oklch(0.80 0.13 145 / .25)' : 'oklch(1 0 0 / .12)',
                    border: done ? '2px solid oklch(0.80 0.13 145)' : '2px solid oklch(1 0 0 / .35)', cursor: 'pointer',
                  }}>
                    <span style={{ fontSize: 22 }}>{m.icon}</span>
                    <span style={{ flex: 1 }}>
                      <span style={{ display: 'block', fontFamily: 'var(--display)', fontWeight: 700, fontSize: 13.5, color: 'oklch(0.97 0.02 90)' }}>{m.name}</span>
                      <span style={{ display: 'block', fontSize: 10.5, fontWeight: 700, opacity: .7 }}>{m.exam.length} questions · 100% = +{level.pay * 2} 💎</span>
                    </span>
                    {done && <span style={{ fontSize: 16, color: 'oklch(0.85 0.13 145)' }}>✓</span>}
                  </button>
                );

            </div>
            <div style={{ marginTop: 12, fontSize: 12, fontWeight: 700, opacity: .75 }}>🦉 “Perfect-score every {level.id} module to unlock the next level across the whole town!”</div>
          </Blackboard>

        {/* phase: LESSON */}
        {phase === 'lesson' && bank && (
          <Blackboard>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>

                  <button key={i} onClick={() => answer(i)} style={{
                    padding: '11px 13px', borderRadius: 10, fontFamily: 'var(--display)', fontWeight: 700, fontSize: 14.5,

                    color: showState ? 'oklch(0.20 0.04 145)' : 'oklch(0.97 0.02 90)',

            {picked !== null && picked !== exam[qIdx].a && (

            )}

        )}

        {/* phase: RESULT */}
        {phase === 'result' && bank && (
          <Blackboard>
            <div style={{ textAlign: 'center', padding: '6px 0' }}>
              <div style={{ fontSize: 46 }}>{perfect ? '🔔' : '📚'}</div>
              <h2 style={{ fontSize: 26, margin: '6px 0', color: 'oklch(0.97 0.04 90)' }}>{perfect ? 'PERFECT SCORE!' : `${correctCount} / ${exam.length}`}</h2>
              {perfect ? (
                <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: 'var(--display)', fontWeight: 700, fontSize: 18, background: 'oklch(1 0 0 / .15)', borderRadius: 999, padding: '6px 18px' }}><Gem size={18} />+{earned}</div>
              ) : (
                <p style={{ fontSize: 14.5, fontWeight: 700, margin: '4px 0 0' }}>🦉 “So close! Review the lesson and try again — a perfect score earns the full bounty!”</p>
              )}
              <div style={{ display: 'flex', gap: 10, justifyContent: 'center', marginTop: 16, flexWrap: 'wrap' }}>
                <button className="btn3d ghost" onClick={() => setPhase('pick')} style={{ fontSize: 13 }}>📚 Modules</button>
                {!perfect && <button className="btn3d ghost" onClick={() => { setPhase('lesson'); setSlide(0); setAnswers([]); setQIdx(0); }} style={{ fontSize: 13 }}>📖 Re-read lesson</button>}
                <button className="btn3d" onClick={retryExam} style={{ fontSize: 13 }}>{perfect ? 'Take it again' : 'Retry exam 📝'}</button>
              </div>
            </div>
          </Blackboard>
        )}
      </div>

      {/* perfect-score confetti burst over the pet */}
      {phase === 'result' && perfect && (
        <div style={{ position: 'absolute', left: '12%', bottom: '30%', zIndex: 10, pointerEvents: 'none' }}>
          {[...Array(16)].map((_, i) => {
            const a = (i / 16) * Math.PI * 2;
            return <div key={i} style={{ position: 'absolute', width: 9, height: 13, borderRadius: 2, background: ['oklch(0.75 0.15 25)', 'oklch(0.80 0.13 90)', 'oklch(0.72 0.13 145)', 'oklch(0.70 0.13 250)', 'oklch(0.72 0.14 330)'][i % 5], '--sx': `${Math.cos(a) * (70 + i * 6)}px`, '--sy': `${Math.sin(a) * (55 + i * 4)}px`, animation: `sparklepop ${1 + (i % 4) * 0.22}s ease-out infinite` }} />;
          })}
        </div>
      )}

      <button className="btn3d ghost" onClick={onExit} style={{ position: 'absolute', bottom: 12, right: 12, zIndex: 10, fontSize: 13 }}>← Leave school</button>
    </div>
  );
}

Object.assign(window, { SchoolGame });

  const bank = scenes[sceneIdx % scenes.length];

  const [mistakes, setMistakes] = useCafState(0);
  const [phase, setPhase] = useCafState('chat'); // chat | done
  const [earned, setEarned] = useCafState(0);
  const [history, setHistory] = useCafState([]); // {who, text}

  const t = bank.turns[turn];
  const npcTone = level.id <= 'A2' ? 'oklch(0.88 0.07 80)' : level.id <= 'B2' ? 'oklch(0.82 0.06 235)' : 'oklch(0.80 0.05 300)';

  function pick(i) {
    if (picked !== null) return;
    setPicked(i);
    const ok = i === t.a;
    if (!ok) setMistakes((m) => m + 1);
    setTimeout(() => {
      setHistory((h) => [...h, { who: 'npc', text: t.say }, { who: 'me', text: t.opts[t.a], wasWrong: !ok }]);
      setPicked(null);
      if (turn + 1 < bank.turns.length) setTurn(turn + 1);
      else {
        const flawless = mistakes === 0 && ok;
        const pay = Math.round(level.pay * (flawless ? 1.5 : 1) * ((bank.turns.length - (mistakes + (ok ? 0 : 1))) / bank.turns.length));
        const finalPay = Math.max(3, pay);
        setEarned(finalPay);
        onReward(finalPay, flawless ? `Flawless chat! +${finalPay}` : `Nice chat! +${finalPay}`);
        onRecord && onRecord({ game: 'cafe', level: level.id, scene: bank.scene, flawless });
        setPhase('done');
      }
    }, ok ? 800 : 1700);
  }
  function again() { setTurn(0); setPicked(null); setMistakes(0); setHistory([]); setSceneIdx((i) => i + 1); setPhase('chat'); } // next scene — never the same chat twice in a row

  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 60, borderRadius: 'var(--r-lg)', overflow: 'hidden', border: '3px solid var(--line)' }} data-screen-label="Cozy Café">

          <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>

              return (
