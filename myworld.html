<script type="text/babel" data-presets="react">
// runway.jsx — The Fashion Boutique Runway (v8): dress the description, hit Strut, cameras flash.
// Exports: RunwayGame
const { useState: useRwState, useMemo: useRwMemo } = React;

function shuffleRw(a) { return [...a].sort(() => Math.random() - 0.5); }

function RunwayGame({ level, catColors, onExit, onReward, onRecord }) {
  const pool = window.RUNWAY_BANK[level.id];
  const [round, setRound] = useRwState(0);
  const look = pool[round % pool.length];
  const [fitted, setFitted] = useRwState({});   // slot -> item
  const [phase, setPhase] = useRwState('dress'); // dress | strut | flop | done
  const [earned, setEarned] = useRwState(0);

  // conveyor: needed items + distractors, shuffled
  const conveyor = useRwMemo(() => {
    const need = look.need.map((id) => window.ALL_ITEMS[id]);
    const distractors = shuffleRw(window.CLOTHES.filter((c) => !look.need.includes(c.id))).slice(0, 6);
    return shuffleRw([...need, ...distractors]);
  }, [round]);

  function toggleItem(it) {
    if (phase !== 'dress') return;
    setFitted((f) => {
      const cur = { ...f };
      if (cur[it.slot] && cur[it.slot].id === it.id) delete cur[it.slot];
      else cur[it.slot] = it;
      return cur;
    });
  }
  function strut() {
    if (phase !== 'dress') return;
    const wornIds = Object.values(fitted).map((i) => i.id).sort();
    const ok = look.need.length === wornIds.length && look.need.slice().sort().every((id, i) => id === wornIds[i]);
    if (ok) {
      const pay = level.pay; // merit payout
      setEarned(pay); setPhase('strut');
      setTimeout(() => { onReward(pay, `Stunning! +${pay}`); onRecord && onRecord({ game: 'runway', level: level.id, look: look.desc, ok: true }); setPhase('done'); }, 2300);
    } else {
      setPhase('flop');
      setTimeout(() => setPhase('dress'), 1600);
    }
  }
  function nextLook() { setFitted({}); setRound((r) => r + 1); setPhase('dress'); }

  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 60, borderRadius: 'var(--r-lg)', overflow: 'hidden', border: '3px solid var(--line)' }} data-screen-label="Fashion Runway">
      {/* venue: dark glam hall + lit runway */}
      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg, oklch(0.30 0.05 320) 0%, oklch(0.38 0.07 330) 55%, oklch(0.26 0.05 315) 100%)' }} />
      {/* spotlights */}
      <div style={{ position: 'absolute', top: 0, left: '30%', width: 200, height: '70%', background: 'radial-gradient(ellipse 50% 60% at 50% 0%, oklch(0.9 0.05 90 / .25), transparent 70%)', transform: 'skewX(-8deg)' }} />
      <div style={{ position: 'absolute', top: 0, right: '26%', width: 200, height: '70%', background: 'radial-gradient(ellipse 50% 60% at 50% 0%, oklch(0.9 0.05 330 / .22), transparent 70%)', transform: 'skewX(8deg)' }} />
      {/* marquee */}
      <div style={{ position: 'absolute', top: '4%', left: '50%', transform: 'translateX(-50%)', fontFamily: 'var(--display)', fontWeight: 800, fontSize: 21, color: 'oklch(0.90 0.12 330)', textShadow: '0 0 14px oklch(0.80 0.16 330), 0 0 28px oklch(0.80 0.16 330 / .5)', letterSpacing: 3, whiteSpace: 'nowrap', zIndex: 2 }}>✦ BOUTIQUE RUNWAY ✦</div>

      {/* the runway: red carpet strip with perspective */}
      <div style={{ position: 'absolute', left: '50%', bottom: 0, transform: 'translateX(-50%)', width: 'min(300px, 46%)', height: '58%', background: 'linear-gradient(180deg, oklch(0.50 0.16 20), oklch(0.58 0.18 22))', clipPath: 'polygon(32% 0, 68% 0, 100% 100%, 0 100%)', boxShadow: '0 0 30px oklch(0.55 0.18 20 / .5)', zIndex: 1 }}>
        <div style={{ position: 'absolute', inset: 0, background: 'repeating-linear-gradient(0deg, transparent 0 36px, oklch(1 0 0 / .07) 36px 38px)', clipPath: 'inherit' }} />
      </div>
      {/* edge lightbulbs */}
      {[12, 26, 40, 54, 68, 82].map((y, i) => (
        <React.Fragment key={i}>
          <div style={{ position: 'absolute', bottom: `${y * 0.58}%`, left: `calc(50% - ${(100 - y) * 0.85}px)`, width: 9, height: 9, borderRadius: '50%', background: 'oklch(0.92 0.10 90)', boxShadow: '0 0 8px oklch(0.92 0.12 90)', animation: `glowpulse 1.2s ease-in-out infinite ${i * 0.18}s`, '--g': 'oklch(0.92 0.12 90)', zIndex: 2 }} />
          <div style={{ position: 'absolute', bottom: `${y * 0.58}%`, left: `calc(50% + ${(100 - y) * 0.85}px)`, width: 9, height: 9, borderRadius: '50%', background: 'oklch(0.92 0.10 90)', boxShadow: '0 0 8px oklch(0.92 0.12 90)', animation: `glowpulse 1.2s ease-in-out infinite ${i * 0.18 + 0.09}s`, '--g': 'oklch(0.92 0.12 90)', zIndex: 2 }} />
        </React.Fragment>

      {/* audience silhouettes with cameras */}

      {/* the pet on the runway, wearing the fitted look */}
      <div style={{ position: 'absolute', left: '50%', bottom: phase === 'strut' ? '34%' : '13%', transform: 'translateX(-50%)', zIndex: 5, transition: 'bottom 1.6s ease-in-out' }}>

        {phase === 'flop' && <div style={{ position: 'absolute', top: 30, left: 50, fontSize: 26 }}>🙈</div>}

            <div key={i} style={{ position: 'absolute', left: `${x}%`, top: `${y}%`, width: 60, height: 60, borderRadius: '50%', background: 'radial-gradient(circle, oklch(1 0 0 / .95), transparent 70%)', animation: `burst .55s ease-out ${i * 0.32}s infinite`, zIndex: 8, pointerEvents: 'none' }} />
          ))}
          <div style={{ position: 'absolute', top: '38%', left: '50%', transform: 'translate(-50%,-50%)', zIndex: 9, fontFamily: 'var(--display)', fontWeight: 800, fontSize: 46, color: 'oklch(0.92 0.12 90)', textShadow: '0 0 18px oklch(0.9 0.14 90)', animation: 'popin .4s' }}>FABULOUS!</div>
        </React.Fragment>
      )}
      {phase === 'flop' && (
        <div style={{ position: 'absolute', top: '38%', left: '50%', transform: 'translate(-50%,-50%)', zIndex: 9, fontFamily: 'var(--display)', fontWeight: 800, fontSize: 30, color: 'oklch(0.85 0.04 320)', textShadow: '0 2px 0 oklch(0.3 0.04 320)', animation: 'popin .4s', whiteSpace: 'nowrap' }}>Not quite the brief… 🧵</div>
      )}

      {/* ===== the design brief ===== */}
      <div style={{ position: 'absolute', top: '11%', left: '50%', transform: 'translateX(-50%)', zIndex: 10, width: 'min(520px, 90%)', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
        <div className="card" style={{ padding: '10px 22px', textAlign: 'center', borderRadius: 14, width: '100%' }}>
          <div style={{ fontFamily: 'var(--display)', fontWeight: 700, fontSize: 11.5, color: 'var(--ink-soft)', letterSpacing: 1, whiteSpace: 'nowrap' }}>👗 TONIGHT'S BRIEF · {level.id} · +{level.pay}💎</div>
          <div style={{ fontSize: 15.5, fontWeight: 800, marginTop: 4, lineHeight: 1.35, textWrap: 'pretty' }}>“{look.desc}”</div>

      {/* ===== conveyor belt of items ===== */}
      {phase === 'dress' && (
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 12, background: 'oklch(0.22 0.04 315 / .9)', borderTop: '2.5px solid oklch(0.55 0.08 330)', padding: '10px 12px 12px', backdropFilter: 'blur(4px)' }}>

            <button className="btn3d" onClick={strut} style={{ fontSize: 14, padding: '8px 22px' }}>STRUT! ✨</button>
            <span style={{ flex: 1 }} />
            <span style={{ fontSize: 11.5, fontWeight: 700, color: 'oklch(0.75 0.04 330)' }}>{Object.keys(fitted).length} item(s) on</span>
          </div>
          <div className="scroll noscroll" style={{ display: 'flex', gap: 9, overflowX: 'auto' }}>
            {conveyor.map((it) => {
              const on = fitted[it.slot] && fitted[it.slot].id === it.id;
              return (
                <button key={it.id} onClick={() => toggleItem(it)} style={{
                  flex: '0 0 auto', width: 76, padding: '8px 6px', borderRadius: 12, textAlign: 'center',

                  <div style={{ fontSize: 10, fontWeight: 700, marginTop: 3, color: on ? 'oklch(0.25 0.05 165)' : 'oklch(0.88 0.03 330)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{it.name}</div>

function useToast() {

    const id = Math.random();
    setToasts((t) => [...t, { id, msg, icon }]);

  const pickPal = (id, p) => setPalPref((m) => ({ ...m, [id]: p }));

  // ---- pet identity & customization (v6) ----
  const [petName, setPetName] = useState('Mochi');
  const [petCustom, setPetCustom] = useState({ speciesId: 'cat', coatId: 'coat_natural', eyeId: 'eye_forest', blushId: 'bl_peach', markId: 'mk_none' });
  const [ownedCz, setOwnedCz] = useState(() => new Set(['coat_natural', 'coat_cream', 'eye_forest', 'bl_peach', 'mk_none']));
  const catColors = (() => {
    const spDef = window.SPECIES.find((s) => s.id === (petCustom.speciesId || 'cat')) || {};
    const c = petCustom.coatId === 'coat_natural'
      ? { coat: spDef.coat, coatD: spDef.coatD }
      : window.PET_COATS.find((x) => x.id === petCustom.coatId) || {};
    const e = window.PET_EYES.find((x) => x.id === petCustom.eyeId) || {};
    const b = window.PET_BLUSH.find((x) => x.id === petCustom.blushId) || {};
    const m = window.PET_MARKS.find((x) => x.id === petCustom.markId);
    return { species: petCustom.speciesId || 'cat', coat: c.coat, coatD: c.coatD, iris: e.iris, eyeFx: e.fx || null, blush: b.blush, mark: m && m.kind !== 'none' ? m : null };
  })();

  // ---- rooms ----
  const [rooms, setRooms] = useState(() => window.STARTER_ROOMS.map((r) => ({ ...r, placed: r.placed.map((p) => ({ ...p })) })));
  const [roomIdx, setRoomIdx] = useState(0);
  const [seatUid, setSeatUid] = useState(null);
  const [editMode, setEditMode] = useState(false);

  // ---- v4 garden + limited drops ----
  const [garden, setGarden] = useState({ stage: 'empty' }); // empty | dug | planted | grown
  const [dropStock, setDropStock] = useState(() => { const s = {}; window.SPECIALS.forEach((sp) => s[sp.id] = sp.stock); return s; });

  // ---- panels ----
  const [panel, setPanel] = useState(null); // closet | store | mystery | friends | style
  const [town, setTown] = useState(null);   // null | 'map' | {spot} (level select) 
  const [game, setGame] = useState(null);   // null | { id, level }
  const [friends, setFriends] = useState(() => window.FRIENDS.map((f) => ({ ...f, cards: [...f.cards] })));
  const [visiting, setVisiting] = useState(null); // {friend, roomIndex, sentToday}

  const stageRef = useRef(null);
  // ── TAŞINDI: hydrate + save effect'leri tüm state tanımlarından sonra (TDZ fix) ──
  useEffect(() => {
    if (!window.MyCloud) { console.warn('MyCloud henüz hazır değil'); return; }
    window.MyCloud.onAuth(async (who) => {
      const me = await window.MyCloud.loadMe();
      if (!me) return;
      if (me.wallet) setGems(me.wallet.gems != null ? me.wallet.gems : (me.gems != null ? me.gems : 0));
      if (me.profile && me.profile.name) setPetName((n) => me.pet && me.pet.name ? me.pet.name : n);
      if (me.pet) {
        if (me.pet.custom) setPetCustom((c) => ({ ...c, ...me.pet.custom, speciesId: me.pet.custom.speciesId || (me.pet.species ? me.pet.species : c.speciesId) }));
        if (Array.isArray(me.pet.worn)) { const w = {}; me.pet.worn.forEach((id) => { const it = window.ALL_ITEMS[id]; if (it && it.slot) w[it.slot] = it; }); if (Object.keys(w).length) setWorn(w); }
      }
      if (me.inventory && Array.isArray(me.inventory.owned)) setOwned(new Set(me.inventory.owned));
      if (me.inventory && me.inventory.counts) setInvCounts(me.inventory.counts);
      if (Array.isArray(me.rooms) && me.rooms.length) setRooms(me.rooms);
      if (me.needs) { if (me.needs.hunger != null) setHunger(me.needs.hunger); if (me.needs.happy != null) setHappy(me.needs.happy); }
      if (Array.isArray(me.progress)) setProgress(me.progress);
      if (me.pantry) setPantry(me.pantry);
      setSession({ user: (who && who.name) || (me.profile && me.profile.name) || 'Student', synced: true });
      cloudReady.current = true;
      push(window.MyCloud.isLive() ? 'Synced from your account ✓' : 'Gems synced ✓', '🔗');
    });
  }, []);
  useEffect(() => {
    if (!cloudReady.current || !window.MyCloud) return;
    window.MyCloud.save({
      wallet: { gems }, needs: { hunger, happy, lastSeen: Date.now() },
      pet: { name: petName, species: petCustom.speciesId, custom: petCustom, worn: Object.values(worn).filter(Boolean).map((i) => i.id) },
      inventory: { owned: [...owned], counts: invCounts },
      rooms, progress, pantry,
    });
  }, [gems, hunger, happy, petName, petCustom, worn, owned, invCounts, rooms, progress, pantry]);
  const { toasts, push } = useToast();
  // v12 hunger drifts gently down over active play
  // v14 real-world decay: 100 pts over 90 min of active play ≈ 1.111 pts/min.
  // We tick every 6s, so subtract 1.111/10 per tick. Also reconcile elapsed real time.
  const RATE_PER_MIN = 100 / 90;
  useEffect(() => {
    const t = setInterval(() => {
      const dec = RATE_PER_MIN * (6 / 60); // 6-second tick
      setHunger((h) => Math.max(0, h - dec));
      setHappy((h) => Math.max(0, h - dec));
    }, 6000);
    return () => clearInterval(t);
  }, []);
  // v14 5h+ absence: on load, read last-seen UNIX ts; if ≥5h, drain stats + “Miss you!”
  const [missYou, setMissYou] = useState(false);
  useEffect(() => {
    try {
      const KEY = 'myworld_lastSeen';
      const last = parseInt(localStorage.getItem(KEY) || '0', 10);
      const now = Date.now();
      if (last) {
        const hoursAway = (now - last) / 3.6e6;
        if (hoursAway >= 5) {
          const drain = Math.min(60, Math.floor(hoursAway * 6)); // partial drain, capped
          setHunger((h) => Math.max(5, h - drain));
          setHappy((h) => Math.max(5, h - drain));
          setMissYou(true);
          setTimeout(() => setMissYou(false), 5200);
        }
      }
      const save = () => localStorage.setItem(KEY, String(Date.now()));
      const iv = setInterval(save, 30000);
      window.addEventListener('beforeunload', save);
      return () => { clearInterval(iv); window.removeEventListener('beforeunload', save); save(); };
    } catch (e) { /* storage blocked — skip absence logic */ }
  }, []);

  const activeRoom = visiting ? null : rooms[roomIdx];

  // wealth of my house (for ranking vs friends)
  const myWealth = [...owned].reduce((s, id) => s + ((window.ALL_ITEMS[id] && window.ALL_ITEMS[id].price) || 0), 0);

  // ---------- ECONOMY ----------
  function spend(n) { setGems((g) => Math.max(0, g - n)); }
  // v9 merit economy — no passive rewards; gems flow ONLY from town-game mastery (gameReward)

  // ---------- v9 GATED PROGRESSION ----------
  // A tier unlocks when EVERY school module of the previous tier has a perfect score.
  const unlockedIdx = (() => {
    let idx = 0;
    for (let i = 0; i < window.CEFR.length - 1; i++) {
      const tier = window.CEFR[i].id;
      const mods = window.SCHOOL_MODULES[tier] || [];
      const allPerfect = mods.length > 0 && mods.every((m) => progress.some((p) => p.game === 'school' && p.level === tier && p.module === m.id && p.perfect));
      if (allPerfect) idx = i + 1; else break;
    }
    return idx;
  })();
  const prevUnlocked = useRef(0);
  useEffect(() => {
    if (unlockedIdx > prevUnlocked.current) {
      push(`🎉 Level ${window.CEFR[unlockedIdx].id} unlocked across the whole town!`, '🔓');
    }
    prevUnlocked.current = unlockedIdx;
  }, [unlockedIdx]);

  // v9 Magical Wardrobe — quick-change into a random owned outfit
  function magicOutfit() {
    const ownedClothes = window.CLOTHES.filter((c) => owned.has(c.id));
    if (ownedClothes.length === 0) { push('Buy some clothes first!', '🪬'); return; }
    const bySlot = {};
    ownedClothes.forEach((c) => { (bySlot[c.slot] = bySlot[c.slot] || []).push(c); });
    const next = {};
    Object.entries(bySlot).forEach(([slot, list]) => {
      if (Math.random() < 0.75) next[slot] = list[Math.floor(Math.random() * list.length)];
    });
    setWorn(next);
    push('✨ Magical quick-change!', '🪬');
  }

  function buy(it, price, specialId, qty = 1, pal = 0) {
    const isFurn = !!it.layer;
    const total = price * qty;
    if (gems < total) return;
    if (!isFurn && owned.has(it.id)) return; // non-stackables are single-purchase
    if (specialId) {
      if ((dropStock[specialId] || 0) <= 0) return;
      setDropStock((d) => ({ ...d, [specialId]: d[specialId] - 1 }));
    }
    spend(total);
    setOwned((o) => new Set(o).add(it.id));
    if (pal) setPalPref((m) => ({ ...m, [it.id]: pal }));
    if (isFurn) setInvCounts((c) => ({ ...c, [it.id]: (c[it.id] || 0) + qty })); // stack in the depot
    setGemPulse(true); setTimeout(() => setGemPulse(false), 450);
    // v10 real estate: architectural shell shift — a whole new themed room
    if (it.shell) {
      const floor = it.shell === 'undersea' || it.shell === 'space' ? 'fl_tile' : 'fl_wood';
      setRooms((rs) => [...rs, { id: 'r' + Date.now(), name: it.name.replace(' Shell', ''), shell: it.shell, floor, placed: [] }]);
      push(`${it.name} built! Use the room arrows →`, it.art);
    } else {
      push(qty > 1 ? `Bought ${it.name} ×${qty}!` : `Bought ${it.name}!`, '🛍️');
    }
  }

  // ---------- WEAR / EQUIP ----------
  function toggleWear(it) {
    setWorn((w) => {
      const next = { ...w };
      if (next[it.slot] && next[it.slot].id === it.id) delete next[it.slot];
      else next[it.slot] = it;
      return next;
    });
  }
  function equipFromStore(it) {
    if (it.slot) { toggleWear(it); push(`Wearing ${it.name}`, '👗'); }
    else if (it.type) { applySurface(it); }
    else { setPanel('closet'); setEditMode(true); push(`Open Closet → drag ${it.name} in`, '🛋️'); }
  }
  function applySurface(it) {
    if (visiting) return;
    if (rooms[roomIdx] && rooms[roomIdx].type === 'garden') { push("Can't change a garden's walls or floor!", '🌱'); return; }
    setRooms((rs) => rs.map((r, i) => i === roomIdx ? { ...r, [it.type]: it.id } : r));
    push(`Applied ${it.name}`, it.type === 'wall' ? '🧱' : '🟫');
  }

  // ---------- PLACE FURNITURE (carry drag from closet into room) ----------
  const carry = useRef(null);
  const [carryGhost, setCarryGhost] = useState(null);
  function carryStart(it, e) {
    if (visiting) return;
    if ((invCounts[it.id] || 0) <= 0) return; // depot empty for this item
    carry.current = { it, id: e.pointerId };
    setCarryGhost({ it, x: e.clientX, y: e.clientY });
    window.addEventListener('pointermove', carryMove);
    window.addEventListener('pointerup', carryEnd);
  }
  function carryMove(e) { if (carry.current) setCarryGhost((g) => g ? { ...g, x: e.clientX, y: e.clientY } : g); }
  function carryEnd(e) {
    window.removeEventListener('pointermove', carryMove);
    window.removeEventListener('pointerup', carryEnd);
    const c = carry.current; carry.current = null; setCarryGhost(null);
    if (!c || !stageRef.current) return;
    const r = stageRef.current.getBoundingClientRect();
    if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) {
      const x = ((e.clientX - r.left) / r.width) * 100;
      const y = ((e.clientY - r.top) / r.height) * 100;
      const uid = 'u' + Date.now();
      setRooms((rs) => rs.map((rm, i) => i === roomIdx ? { ...rm, placed: [...rm.placed, { uid, ref: c.it.id, x: Math.round(x), y: Math.round(y), pal: palPref[c.it.id] || 0 }] } : rm));
      setInvCounts((cm) => ({ ...cm, [c.it.id]: Math.max(0, (cm[c.it.id] || 0) - 1) })); // deduct from depot
      // v3: magical pop + sparkle particles at the drop point
      window.dispatchEvent(new CustomEvent('mw-sparkle', { detail: { x: Math.round(x), y: Math.round(y), uid } }));
      push(`Placed ${c.it.name}`, '✨');
    }
  }
  function moveItem(uid, x, y) {
    setRooms((rs) => rs.map((rm, i) => i === roomIdx ? { ...rm, placed: rm.placed.map((p) => p.uid === uid ? { ...p, x: Math.round(x), y: Math.round(y) } : p) } : rm));
  }
  function updateItem(uid, patch) {
    setRooms((rs) => rs.map((rm, i) => i === roomIdx ? { ...rm, placed: rm.placed.map((p) => p.uid === uid ? { ...p, ...patch } : p) } : rm));
  }
  // ---------- GARDEN (v4) ----------
  function gardenAdvance(next) {
    setGarden({ stage: next });
    const msg = next === 'dug' ? 'Nice digging! Now plant a seed 🌱' : next === 'planted' ? 'Seed planted! Water it 💧' : 'It grew into a fruit tree! 🍎';
    push(msg, next === 'dug' ? '🥄' : next === 'planted' ? '🌱' : '🌳');
  }
  function harvest() {
    const amt = 120;
    setGems((g) => g + amt); setGemPulse(true); setTimeout(() => setGemPulse(false), 450);
    setGarden({ stage: 'empty' });
    push(`Harvested! +${amt} Gems 🍎`, '🧺');
  }
  function removeItem(uid) {
    // v10 Store-to-Depot: despawn from the room canvas, return to inventory (count++)
    const placed = rooms[roomIdx] && rooms[roomIdx].placed.find((p) => p.uid === uid);
    if (placed) {
      setInvCounts((cm) => ({ ...cm, [placed.ref]: (cm[placed.ref] || 0) + 1 }));
      const it = window.ALL_ITEMS[placed.ref];
      push(`${it ? it.name : 'Item'} stored to Depot 📦`, '📦');
    }
    setRooms((rs) => rs.map((rm, i) => i === roomIdx ? { ...rm, placed: rm.placed.filter((p) => p.uid !== uid) } : rm));
    if (seatUid === uid) setSeatUid(null);
  }

  // ---------- ROOM NAV ----------
  function nextRoom() { setSeatUid(null); if (visiting) { setVisiting((v) => ({ ...v, roomIndex: (v.roomIndex + 1) % v.friend.rooms.length })); } else setRoomIdx((i) => (i + 1) % rooms.length); }
  function prevRoom() { setSeatUid(null); if (visiting) { setVisiting((v) => ({ ...v, roomIndex: (v.roomIndex - 1 + v.friend.rooms.length) % v.friend.rooms.length })); } else setRoomIdx((i) => (i - 1 + rooms.length) % rooms.length); }

  // ---------- VISIT (v6: true cross-student fetch — async, with loading state) ----------
  function visit(friend) {
    setPanel(null); setEditMode(false); setSeatUid(null);
    setVisiting({ friend, roomIndex: 0, sentToday: false, loading: true });
    push(`Fetching ${friend.name}'s world…`, '📡');
    // v15: true cross-student fetch from the cloud (read-only); falls back to the catalog object
    window.MyCloud.loadStudent(friend.id).then((doc) => {
      setVisiting((v) => {
        if (!v || v.friend.id !== friend.id) return v;
        const merged = doc ? { ...friend, pet: doc.pet || friend.pet, rooms: doc.rooms || friend.rooms, cards: (doc.social && doc.social.board) || friend.cards } : friend;
        return { ...v, friend: merged, loading: false };
      });
      push(`Welcome to ${friend.name}'s house!`, '✨');
    }).catch(() => {
      setVisiting((v) => v && v.friend.id === friend.id ? { ...v, loading: false } : v);
    });
  }
  function leaveVisit() { setVisiting(null); setSeatUid(null); }
  function sendCard(text) {
    setFriends((fs) => fs.map((f) => f.id === visiting.friend.id ? { ...f, cards: [text, ...f.cards] } : f));
    setVisiting((v) => ({ ...v, friend: { ...v.friend, cards: [text, ...v.friend.cards] }, sentToday: true }));
    setHearts((h) => h + 1);
    push('Greeting card left! +1 ♥', '💌');
  }

  // visiting room → as a RoomStage-compatible object
  let stageRoom, stageName, stageIdx, stageCount, stageWall, stageFloor;
  if (visiting) {
    const vr = visiting.friend.rooms[visiting.roomIndex];
    stageRoom = { wall: vr.wall, floor: vr.floor, placed: vr.items.map((it, i) => ({ uid: 'v' + i, ref: it.ref, x: it.x, y: it.y })) };
    stageName = `${visiting.friend.name}'s Room`; stageIdx = visiting.roomIndex; stageCount = visiting.friend.rooms.length;
  } else {
    stageRoom = activeRoom; stageName = activeRoom.name; stageIdx = roomIdx; stageCount = rooms.length;
  }
  const wallData = {}; window.WALLS.forEach((w) => wallData[w.id] = w);
  const floorData = {}; window.FLOORS.forEach((f) => floorData[f.id] = f);
  const surfaceData = { ...wallData, ...floorData };

  function dockSelect(id) {
    if (id === 'closet') setPanel(panel === 'closet' ? null : 'closet');
    else if (id === 'style') setPanel('style');
    else if (id === 'store') setPanel('store');
    else if (id === 'mystery') setPanel('mystery');
    else if (id === 'friends') setPanel('friends');
    else if (id === 'rooms') { setPanel(null); setTown('map'); }
    else if (id === 'trophy') push('Awards coming soon! 🏆', '🏆');
  }

  // ---------- TOWN & MINIGAMES (v7) ----------
  const [hood, setHood] = useState(false); // v10 Neighbourhood portal
  function pickSpot(spot) {
    if (spot.id === 'house') { setTown(null); setGame(null); push('Welcome home!', '🏡'); return; }
    if (spot.id === 'hood') { setTown(null); setHood(true); return; }
    if (spot.id === 'market') { setTown(null); setPanel('market'); return; }
    if (spot.id === 'mega') { setTown(null); setPanel('store'); return; }
    setTown({ spot });
  }
  function startGame(levelObj) {
    setGame({ id: town.spot.id, level: levelObj });
    setTown(null); setPanel(null); setEditMode(false);
  }
  function exitGame() { setGame(null); setTown('map'); }
  function gameReward(amount, msg) {
    const bonus = greenZone ? 1.1 : 1;
    const total = Math.round(amount * bonus);
    setGems((g) => g + total);
    setGemPulse(true); setTimeout(() => setGemPulse(false), 450);
    push(greenZone ? `${msg} (×1.1 happy bonus!)` : msg, '💎');
  }
  // v12 buy a consumable into the pantry
  function buyFood(it) {
    if (gems < it.price) return;
    spend(it.price);
    setPantry((p) => ({ ...p, [it.id]: (p[it.id] || 0) + 1 }));
    setGemPulse(true); setTimeout(() => setGemPulse(false), 450);
    push(`Bought ${it.name} 🧺`, it.art);
  }
  // v12 feed: consume from pantry, restore hunger + a little happiness, play eat FX
  const [eatFx, setEatFx] = useState(null);
  function consume(it) {
    setPantry((p) => { const n = { ...p }; if (!n[it.id]) return p; n[it.id]--; if (n[it.id] <= 0) delete n[it.id]; return n; });
    setHunger((h) => Math.min(100, h + it.restore));
    setHappy((h) => Math.min(100, h + (it.happy || 0)));
    const drink = window.DRINKS.some((d) => d.id === it.id);
    setEatFx({ art: it.art, drink, key: Date.now() });
    setTimeout(() => setEatFx(null), 1500);
    push(`Yum! +${it.restore}🍽`, it.art);
  }
  // per-student isolated progress log declared above (near ownership)
  function recordResult(entry) {
    setProgress((p) => [...p, { ...entry, userId: session.user, at: Date.now() }]);
  }

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', maxWidth: 1280, margin: '0 auto', position: 'relative' }}>
      <TopHUD gems={gems} level={14} petName={petName} session={session} hunger={hunger} happy={happy}
        species={petCustom.speciesId} onAvatarClick={() => setPocketOpen((o) => !o)}
        hudStyle={tweaks.hudStyle} pulse={gemPulse} />

      {/* STAGE AREA */}
      <div style={{ flex: 1, position: 'relative', padding: '4px 10px 0', minHeight: 0 }}>
        <div style={{ position: 'relative', width: '100%', height: '100%' }}>
          {visiting && !visiting.loading && <VisitBar friend={visiting.friend} onLeave={leaveVisit} />}
          {visiting && !visiting.loading && <GreetingBoard friend={visiting.friend} greetings={window.GREETINGS} onSend={sendCard} sentToday={visiting.sentToday} />}
          {game && game.id === 'fishing' && <window.FishingGame level={game.level} worn={worn} catColors={catColors} onExit={exitGame} onReward={gameReward} />}
          {game && game.id === 'bowling' && <window.BowlingGame level={game.level} worn={worn} catColors={catColors} onExit={exitGame} onReward={gameReward} />}
          {game && game.id === 'park' && <window.ParkGame level={game.level} worn={worn} catColors={catColors} onExit={exitGame} onReward={gameReward} />}
          {game && game.id === 'school' && <window.SchoolGame level={game.level} worn={worn} catColors={catColors} onExit={exitGame} onReward={gameReward} onRecord={recordResult} progress={progress} />}
          {game && game.id === 'cafe' && <window.CafeGame level={game.level} worn={worn} catColors={catColors} onExit={exitGame} onReward={gameReward} onRecord={recordResult} />}
          {game && game.id === 'runway' && <window.RunwayGame level={game.level} catColors={catColors} onExit={exitGame} onReward={gameReward} onRecord={recordResult} />}
          {game && game.id === 'hospital' && <window.HospitalGame level={game.level} worn={worn} catColors={catColors} onExit={exitGame} onReward={gameReward} onRecord={recordResult} />}
          {!game && visiting && visiting.loading ? (
            <div className="card" style={{ position: 'absolute', inset: 0, display: 'grid', placeItems: 'center', zIndex: 50 }}>
              <div style={{ textAlign: 'center' }}>
                <div style={{ width: 64, height: 64, margin: '0 auto 14px', borderRadius: '50%', border: '5px solid var(--line)', borderTopColor: 'var(--primary)', animation: 'ringspin .9s linear infinite' }}></div>
                <div style={{ fontFamily: 'var(--display)', fontWeight: 700, fontSize: 18 }}>Connecting to {visiting.friend.name}'s world…</div>
                <div style={{ fontSize: 12.5, fontWeight: 700, color: 'var(--ink-soft)', marginTop: 6, fontFamily: 'monospace' }}>GET /api/students/{visiting.friend.id}/world</div>
              </div>
            </div>
          ) : !game ? (
          <RoomStage
            room={stageRoom} wallData={wallData} floorData={floorData} worn={worn} mode={mode} catColors={catColors}
            friendPet={visiting ? visiting.friend.pet : null} onMagicOutfit={magicOutfit}
            onMythic={(kind) => setMythicMode(kind)}
            onInteract={(it) => { if (it.rarity === 'mythic') { setHappy((h) => Math.min(100, h + 6)); push('Happiness +6! 💛', '💛'); } }}
            editMode={editMode && !visiting} visiting={!!visiting}
            seatUid={seatUid} onSeat={setSeatUid} onMove={moveItem} onRemove={removeItem} onUpdate={updateItem}
            garden={garden} onGardenAdvance={gardenAdvance} onHarvest={harvest}
            stageRef={stageRef} roomName={stageName} roomIndex={stageIdx} roomCount={stageCount}
            roomKey={visiting ? `visit-${visiting.friend.id}-${stageIdx}` : `home-${rooms[roomIdx].id}`}
            onPrev={prevRoom} onNext={nextRoom} />
          ) : null}
        </div>
      </div>

      {/* FRIENDS RIBBON (hidden while a bottom panel is open to save space) */}
      {!panel && !visiting && (
        <div style={{ position: 'relative', zIndex: 20 }}>
          <FriendsRibbon friends={friends} onVisit={visit} />
        </div>
      )}

      {/* DOCK */}
      <Dock active={panel === 'closet' ? 'closet' : null} onSelect={dockSelect} editMode={editMode} />

      {/* v12 PANTRY TRAY — feed the pet from owned consumables */}
      {!visiting && !game && !panel && Object.keys(pantry).length > 0 && (
        <div style={{ position: 'absolute', left: 12, bottom: 92, zIndex: 25, display: 'flex', flexDirection: 'column', gap: 5, maxWidth: 92 }}>
          <div style={{ fontFamily: 'var(--display)', fontWeight: 700, fontSize: 11, color: 'var(--ink-soft)', textAlign: 'center' }}>🧺 Pantry</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, justifyContent: 'center' }}>
            {Object.entries(pantry).map(([id, n]) => {
              const it = [...window.FOODS, ...window.DRINKS].find((f) => f.id === id); if (!it) return null;
              return (
                <button key={id} title={`Feed ${it.name} (+${it.restore}🍽)`} onClick={() => consume(it)}
                  style={{ position: 'relative', width: 38, height: 38, borderRadius: 10, background: 'var(--panel)', border: '1.5px solid var(--line)', boxShadow: '0 2px 0 var(--line)', fontSize: 20, cursor: 'pointer' }}>
                  {it.art}
                  <span style={{ position: 'absolute', top: -6, right: -5, minWidth: 16, height: 16, borderRadius: 999, background: 'var(--primary)', color: 'var(--primary-ink)', fontFamily: 'var(--display)', fontWeight: 800, fontSize: 9.5, display: 'grid', placeItems: 'center', padding: '0 3px' }}>{n}</span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* CLOSET (bottom sheet, keeps room visible) */}
      <Closet open={panel === 'closet'} onClose={() => { setPanel(null); setEditMode(false); }}
        owned={owned} counts={invCounts} worn={worn} mode={mode} isGarden={rooms[roomIdx] && rooms[roomIdx].type === 'garden'}
        onCarryStart={carryStart} onToggleWear={toggleWear} onApplySurface={applySurface}
        editMode={editMode} onToggleEdit={() => setEditMode((e) => !e)} />

      {/* OVERLAYS */}
      <Boutique open={panel === 'store'} onClose={() => setPanel(null)} owned={owned} gems={gems}
        onBuy={buy} onEquip={equipFromStore} storeLayout={tweaks.storeLayout} mode={mode} specialsEnd={SPECIALS_END} dropStock={dropStock}
        unlockedIdx={unlockedIdx} palPref={palPref} onPickPal={pickPal} />
      <MysteryBox open={panel === 'mystery'} onClose={() => setPanel(null)} gems={gems}
        onSpend={spend} onWin={(it) => { setOwned((o) => new Set(o).add(it.id)); }} revealStyle={tweaks.revealStyle} mode={mode} />
      <FriendsPanel open={panel === 'friends'} onClose={() => setPanel(null)} friends={friends} onVisit={visit} mode={mode} myWealth={myWealth} />
      <window.TownMap open={town === 'map'} onClose={() => setTown(null)} onPick={pickSpot} />
      <window.Neighbourhood open={hood} onClose={() => setHood(false)} friends={friends} onVisit={(f) => { setHood(false); visit(f); }} />
      <window.FoodMarket open={panel === 'market'} onClose={() => setPanel(null)} gems={gems} hunger={hunger} pantry={pantry} onBuy={buyFood} />
      <window.Pocket open={pocketOpen} onClose={() => setPocketOpen(false)} pantry={pantry} onEat={consume} />
      <window.MythicOverlay mode={mythicMode} onClose={() => setMythicMode(null)} onReward={(amt, msg) => { gameReward(amt, msg); setHappy((h) => Math.min(100, h + 4)); }} />
      {!visiting && !game && <window.EatFx fx={eatFx} />}
      {missYou && !visiting && !game && (
        <div style={{ position: 'absolute', left: '50%', top: '34%', transform: 'translateX(-50%)', zIndex: 46, pointerEvents: 'none', animation: 'missyou 5.2s ease-in-out forwards' }}>
          <div className="card" style={{ padding: '8px 16px', borderRadius: '16px 16px 16px 4px', fontFamily: 'var(--display)', fontWeight: 800, fontSize: 15, color: 'var(--heart)' }}>🥺 Miss you!</div>
        </div>
      )}
      {town && town.spot && <window.LevelSelect spot={town.spot} onStart={startGame} onBack={() => setTown('map')} unlockedIdx={unlockedIdx} />}
      <window.CustomizePanel open={panel === 'style'} onClose={() => setPanel(null)} gems={gems} onSpend={spend}
        custom={petCustom} setCustom={setPetCustom} ownedCz={ownedCz} setOwnedCz={setOwnedCz} unlockedIdx={unlockedIdx}
        worn={worn} petName={petName} onRename={(n) => { setPetName(n); push(`Renamed to ${n}!`, '✏️'); }} catColors={catColors} />

      {/* CARRY GHOST */}
      {carryGhost && (
        <div style={{ position: 'fixed', left: carryGhost.x, top: carryGhost.y, transform: 'translate(-50%,-50%) scale(1.05)', zIndex: 999, pointerEvents: 'none', opacity: .9 }}>
          <FurnArt it={carryGhost.it} w={carryGhost.it.w || 70} />
        </div>
      )}

      {/* TOASTS */}
      <div style={{ position: 'fixed', bottom: 96, left: '50%', transform: 'translateX(-50%)', zIndex: 500, display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'center', pointerEvents: 'none' }}>
        {toasts.map((t) => (
          <div key={t.id} className="card" style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '10px 18px', borderRadius: 999, fontFamily: 'var(--display)', fontWeight: 700, fontSize: 14, animation: 'toastin 2.2s ease forwards', boxShadow: '0 10px 24px -10px var(--shadow)' }}>
            <span style={{ fontSize: 18 }}>{t.icon}</span>{t.msg}
          </div>
        ))}
      </div>

      {/* TWEAKS PANEL */}
      {window.TweaksPanel && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakRadio label="Store layout" value={tweaks.storeLayout} onChange={(v) => setTweak('storeLayout', v)}
            options={[{ value: 'grid', label: 'Grid' }, { value: 'carousel', label: 'Carousel' }, { value: 'shelf', label: 'Shelf' }]} />
          <window.TweakRadio label="HUD style" value={tweaks.hudStyle} onChange={(v) => setTweak('hudStyle', v)}
            options={[{ value: 'float', label: 'Float' }, { value: 'bar', label: 'Bar' }, { value: 'compact', label: 'Compact' }]} />
          <window.TweakRadio label="Mystery reveal" value={tweaks.revealStyle} onChange={(v) => setTweak('revealStyle', v)}
            options={[{ value: 'burst', label: 'Burst' }, { value: 'flip', label: 'Flip' }, { value: 'slot', label: 'Slot' }]} />
          <window.TweakSection label="Demo tools">
            <window.TweakButton label="+5,000 gems (demo)" onClick={() => { setGems((g) => g + 5000); setGemPulse(true); setTimeout(() => setGemPulse(false), 450); push('+5,000 demo gems', '🛠️'); }} />
            <window.TweakButton label="Unlock all levels (demo)" onClick={() => {
              const log = [];
              window.CEFR.forEach((t) => (window.SCHOOL_MODULES[t.id] || []).forEach((m) => log.push({ game: 'school', level: t.id, module: m.id, topic: m.name, score: '5/5', perfect: true, userId: session.user, at: Date.now() })));
              setProgress((p) => [...p, ...log]);
              push('All CEFR tiers unlocked', '🛠️');
            }} />
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

/* ===========================================================================
   HER ZAMAN YATAY — telefon/tablet
   - YATAY tutuş: oyun TAM EKRAN doldurur (ekran oranına göre dinamik tuval)
   - DİK tutuş: "Telefonu yan çevir" ekranı gösterilir, oyun gizlenir
   - Bilgisayar (ince işaretçi) HİÇ etkilenmez
   =========================================================================== */
(function () {
  // Temel tasarım yüksekliği — genişlik ekrana göre esner (tam ekran için)
  var BASE_H = 720;
  var MIN_W = 1100;   // oyunun düzeninin bozulmadığı en dar genişlik
  var MAX_W = 1700;   // çok geniş ekranlarda aşırı uzamayı sınırla

  function isTouchLike() {
    var coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
    var noHover = window.matchMedia && window.matchMedia('(hover: none)').matches;
    return coarse || noHover;
  }

  // "Telefonu yan çevir" ekranını oluştur (bir kez)
  function ensureRotatePrompt() {
    var el = document.getElementById('mw-rotate-prompt');
    if (el) return el;
    el = document.createElement('div');
    el.id = 'mw-rotate-prompt';
    el.innerHTML =
      '<div class="mw-rp-inner">'
      + '<div class="mw-rp-phone"><div class="mw-rp-phone-body"></div></div>'
      + '<div class="mw-rp-title">Telefonu yan çevir</div>'
      + '<div class="mw-rp-text">My World en iyi yatay modda oynanır 🎮<br>Cihazını yana döndür ve maceraya başla!</div>'
      + '</div>';
    document.body.appendChild(el);
    return el;
  }

  function applyScale() {
    var body = document.body;
    if (!isTouchLike()) {
      body.classList.remove('mw-scaled');
      body.style.removeProperty('--mw-scale');
      body.style.removeProperty('--mw-h');
      body.style.removeProperty('--mw-w');
      var rp0 = document.getElementById('mw-rotate-prompt');
      if (rp0) rp0.style.display = 'none';
      return;
    }

    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var portrait = vh > vw;
    var rp = ensureRotatePrompt();

    if (portrait) {
      // DİK TUTUŞ: oyunu gizle, "yan çevir" ekranını göster.
      body.classList.remove('mw-scaled');
      body.style.removeProperty('--mw-scale');
      body.style.removeProperty('--mw-h');
      body.style.removeProperty('--mw-w');
      rp.style.display = 'flex';
      return;
    }

    // YATAY TUTUŞ: TAM EKRAN doldur.
    // Tuvali ekranın en-boy oranına göre boyutla: yükseklik sabit BASE_H,
    // genişlik = BASE_H * (ekran oranı) → ölçeklenince ekranı tam kaplar.
    rp.style.display = 'none';
    body.classList.add('mw-scaled');

    var aspect = vw / vh;
    var designW = Math.round(BASE_H * aspect);
    designW = Math.max(MIN_W, Math.min(MAX_W, designW));

    // Yüksekliğe göre ölçekle (tam ekran kaplasın)
    var scale = vh / BASE_H;

    body.style.setProperty('--mw-scale', scale.toFixed(4));
    body.style.setProperty('--mw-h', BASE_H + 'px');
    body.style.setProperty('--mw-w', designW + 'px');
  }

  var raf;
  function schedule() {
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(applyScale);
  }

  window.addEventListener('resize', schedule);
  window.addEventListener('orientationchange', function () {
    setTimeout(applyScale, 120);
    setTimeout(applyScale, 400);
  });
  // İlk çalıştırma
  applyScale();
  setTimeout(applyScale, 200);
})();


</script>
</body>
