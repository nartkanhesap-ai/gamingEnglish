<html lang="tr">
<head>
  <meta charset="UTF-8">

<style>@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --paper:      #F3ECDB;
  --paper-2:    #FBF6EA;
  --surface:    #FFFFFF;
  --surface-2:  #FBF7EE;
  --ink:        #1C2E22;
  --ink-soft:   #51645A;
  --ink-faint:  #8A9890;
  --green:      #1E8A53;
  --green-deep: #14633A;
  --green-soft: #E4F2E8;
  --amber:      #F2A23C;
  --amber-soft: #FCE9CC;
  --coral:      #E5603C;
  --coral-soft: #FBE0D6;
  --sky:        #2E9BD6;
  --sky-soft:   #DCEFF9;
  --violet:     #7C6BF0;
  --violet-soft:#E8E4FC;
  --line:       rgba(28,46,34,0.10);
  --line-2:     rgba(28,46,34,0.16);
  --shadow:     0 14px 34px -12px rgba(20,60,40,0.28);
  --shadow-sm:  0 6px 16px -8px rgba(20,60,40,0.20);
  --r-xl: 28px; --r-lg: 20px; --r-md: 14px; --r-sm: 10px;
  --display: 'Baloo 2', system-ui, sans-serif;
  --body: 'Nunito', system-ui, sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; }
body { font-family:var(--body); background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased; min-height:100vh; }
::-webkit-scrollbar { width:8px; } ::-webkit-scrollbar-thumb { background:var(--line-2); border-radius:99px; }

/* Topographic bg */
.topo-bg { position:absolute; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(120% 90% at 12% 18%, transparent 0, transparent 38%, rgba(28,46,34,0.045) 38.4%, transparent 39%),
    radial-gradient(120% 90% at 12% 18%, transparent 0, transparent 48%, rgba(28,46,34,0.045) 48.4%, transparent 49%),
    radial-gradient(140% 110% at 88% 82%, transparent 0, transparent 30%, rgba(28,46,34,0.045) 30.4%, transparent 31%),
    radial-gradient(140% 110% at 88% 82%, transparent 0, transparent 44%, rgba(28,46,34,0.045) 44.4%, transparent 45%); }

/* Layout */
.game-shell { min-height:100vh; display:flex; flex-direction:column; }

/* Topbar */
.game-topbar { background:var(--green); color:#fff; padding:14px 22px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; position:relative; overflow:hidden; box-shadow:var(--shadow-sm); }
.game-topbar .topo-bg { opacity:.35; }
.game-title-area { display:flex; align-items:center; gap:10px; position:relative; }
.game-emoji { font-size:26px; }
.game-title { font-family:var(--display); font-weight:800; font-size:20px; color:#fff; }
.home-btn { background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.5); color:#fff; border-radius:99px; padding:7px 16px; font-family:var(--display); font-weight:700; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:7px; text-decoration:none; transition:background .16s; }
.home-btn:hover { background:rgba(255,255,255,0.32); }
.score-row { display:flex; align-items:center; gap:10px; position:relative; flex-wrap:wrap; }
.score-box { background:rgba(255,255,255,0.18); border:1.5px solid rgba(255,255,255,0.35); border-radius:12px; padding:7px 14px; display:flex; align-items:center; gap:7px; }
.score-label { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; opacity:.82; }
.score-value { font-family:var(--display); font-weight:800; font-size:20px; line-height:1; }

/* Difficulty / Set pill bar */
.diff-bar { background:var(--surface); border-bottom:1.5px solid var(--line); padding:10px 22px; display:flex; align-items:center; gap:8px; }
.diff-label { font-size:12px; font-weight:800; color:var(--ink-faint); letter-spacing:.4px; }
.diff-btn { border:2px solid var(--line-2); background:transparent; color:var(--ink-soft); border-radius:99px; padding:6px 14px; font-family:var(--display); font-weight:700; font-size:12.5px; cursor:pointer; transition:all .16s; }
.diff-btn.active, .diff-btn:hover { border-color:var(--green); background:var(--green-soft); color:var(--green-deep); }
.diff-btn.active { background:var(--green); color:#fff; border-color:var(--green); }

/* Progress bar */
.progress-wrap { padding:0 22px 14px; background:var(--surface); border-bottom:1.5px solid var(--line); }
.progress-track { height:8px; border-radius:99px; background:var(--line); overflow:hidden; }
.progress-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--green),var(--green-deep)); transition:width .6s cubic-bezier(.22,1,.36,1); }

/* Game area */
.game-area { flex:1; padding:22px; max-width:680px; margin:0 auto; width:100%; }

/* Card */
.card { background:var(--surface); border-radius:var(--r-lg); box-shadow:var(--shadow-sm); border:1.5px solid var(--line); }

/* Buttons */
.btn { font-family:var(--display); font-weight:700; border:none; cursor:pointer; border-radius:99px; display:inline-flex; align-items:center; justify-content:center; gap:8px; transition:transform .14s cubic-bezier(.34,1.56,.64,1), box-shadow .18s; white-space:nowrap; line-height:1; user-select:none; }
.btn:active { transform:translateY(1px) scale(.98); }
.btn-lg { font-size:17px; padding:15px 28px; }
.btn-md { font-size:15px; padding:12px 20px; }
.btn-sm { font-size:13px; padding:8px 15px; }
.btn-primary { background:var(--green); color:#fff; box-shadow:0 7px 0 var(--green-deep), var(--shadow-sm); }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 9px 0 var(--green-deep), var(--shadow); }
.btn-primary:active { transform:translateY(4px); box-shadow:0 2px 0 var(--green-deep); }
.btn-ghost { background:transparent; color:var(--ink); border:2px solid var(--line-2); }
.btn-ghost:hover { border-color:var(--green); color:var(--green); transform:translateY(-2px); }
.btn-soft { background:var(--surface); color:var(--ink); box-shadow:var(--shadow-sm); border:1.5px solid var(--line); }
.btn-soft:hover { transform:translateY(-2px); box-shadow:var(--shadow); }
.btn-amber { background:var(--amber); color:#3a2509; box-shadow:0 7px 0 #c87f22; }
.btn-amber:hover { transform:translateY(-2px); }

/* Result feedback modal */
.result-overlay { display:none; position:fixed; inset:0; z-index:500; background:rgba(12,24,18,0.52); backdrop-filter:blur(6px); align-items:center; justify-content:center; padding:20px; }
.result-overlay.active { display:flex; }
.result-modal { background:var(--surface); border-radius:var(--r-xl); padding:32px 28px; text-align:center; width:min(420px,94vw); box-shadow:var(--shadow); border:1.5px solid var(--line); animation:popIn .35s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{transform:scale(.7);opacity:0;} to{transform:scale(1);opacity:1;} }
@keyframes shake { 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-7px);} 40%,80%{transform:translateX(7px);} }
@keyframes correctPulse { 0%{transform:scale(1);} 40%{transform:scale(1.06);} 100%{transform:scale(1);} }
@keyframes floaty { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
@keyframes fadeUp { from{transform:translateY(16px);opacity:0;} to{transform:translateY(0);opacity:1;} }
.result-icon { font-size:58px; margin-bottom:8px; line-height:1; }
.result-title { font-family:var(--display); font-weight:800; font-size:26px; color:var(--ink); margin-bottom:6px; }
.result-text { font-size:15px; color:var(--ink-soft); font-weight:600; margin-bottom:18px; }
.result-points { font-family:var(--display); font-weight:800; font-size:20px; color:var(--amber); margin-bottom:20px; }

/* Option buttons (quiz/game choices) */
.option-btn { width:100%; padding:15px 18px; border-radius:var(--r-md); border:2px solid var(--line); background:var(--surface-2); color:var(--ink); font-family:var(--body); font-weight:800; font-size:15.5px; cursor:pointer; text-align:left; display:flex; align-items:center; gap:12px; transition:all .18s; }
.option-btn:hover:not(:disabled) { border-color:var(--sky); background:var(--sky-soft); transform:translateX(4px); }
.option-btn.correct { background:var(--green-soft); border-color:var(--green); color:var(--green-deep); animation:correctPulse .5s; }
.option-btn.wrong { background:var(--coral-soft); border-color:var(--coral); color:var(--coral); }
.option-btn:disabled { cursor:default; }
.option-letter { width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-family:var(--display); font-weight:800; font-size:14px; background:var(--surface); color:var(--ink-soft); flex-shrink:0; transition:all .18s; }
.option-btn.correct .option-letter { background:var(--green); color:#fff; }
.option-btn.wrong .option-letter { background:var(--coral); color:#fff; }

/* Chip */
.chip { display:inline-flex; align-items:center; gap:5px; font-family:var(--body); font-weight:800; font-size:12px; padding:5px 11px; border-radius:99px; }
.chip-green { background:var(--green-soft); color:var(--green-deep); }
.chip-amber { background:var(--amber-soft); color:#b5781e; }
.chip-violet { background:var(--violet-soft); color:var(--violet); }
.chip-sky { background:var(--sky-soft); color:var(--sky); }
.chip-coral { background:var(--coral-soft); color:var(--coral); }

/* Feedback banner */
.feedback-bar { padding:12px 16px; border-radius:var(--r-md); display:flex; align-items:center; gap:10px; font-weight:800; font-size:14.5px; margin-top:14px; animation:fadeUp .3s cubic-bezier(.22,1,.36,1); }
.feedback-bar.correct { background:var(--green-soft); color:var(--green-deep); border:1.5px solid var(--green); }
.feedback-bar.wrong   { background:var(--coral-soft); color:var(--coral); border:1.5px solid var(--coral); }

/* Set import banner */
.import-banner { position:fixed; top:72px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,#f093fb,#f5576c); color:#fff; padding:10px 22px; border-radius:99px; font-family:var(--display); font-size:13px; font-weight:800; z-index:9999; box-shadow:0 4px 16px rgba(240,83,240,.4); white-space:nowrap; pointer-events:none; animation:fadeUp .4s cubic-bezier(.22,1,.36,1); }

@media (max-width:640px) {
  .game-area { padding:14px 14px 30px; }
  .game-topbar { padding:12px 16px; }
  .game-title { font-size:17px; }
  .score-value { font-size:17px; }
}

  .btn-secondary-games {
    background: #fff;
    color: var(--primary, #1E8A53);

    padding: 12px 20px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
    font-family: inherit;
  }
  .btn-secondary-games:hover { background: #f0faf4; }
</style>

      const savedTheme = (function(){ try { return localStorage.getItem('gamingEnglishTheme'); } catch(e) { return null; } })() || 'default';
      applyThemeToGame(savedTheme);
      gameState.currentQuestionIndex = 0;
      gameState.score = 0;
      gameState.correct = 0;
      gameState.wrong = 0;
      gameState.selectedAnswer = null;
      gameState.isAnswered = false;
      (function() {
        try {
          if (window.location.search.indexOf('mode=imported') > -1) {
            var imp = localStorage.getItem('ge_active_set');
            if (imp) {
              var data = JSON.parse(imp);
              if (data && data.words && data.words.length >= 2) {
                var converted = convertSetForDinleme(data.words);
                gameState.questionList = converted;
                fallbackDatabase['easy'] = fallbackDatabase['medium'] = fallbackDatabase['hard'] = converted;
                showImportBanner(data.setName, data.words.length);
                var db = document.querySelector(".diff-buttons"); if(db) db.style.display="none";
                loadQuestion(); return;
              }
            }
          }
        } catch(e) { console.error("Import error:", e); }
        gameState.questionList = [...(fallbackDatabase[gameState.difficulty] || fallbackDatabase['easy'])];
        loadQuestion();
      })();
}

    function applyThemeToGame(t) {
  // Quest World design - tema otomatik CSS token'lardan
}

    function setDifficulty(level) {
      document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
      if (event && event.target) event.target.classList.add('active');
      gameState.difficulty = level;
      gameState.currentQuestionIndex = 0;
      gameState.score = 0;
      gameState.correct = 0;
      gameState.wrong = 0;
      // Aktif set varsa koru
      try {
        var active = localStorage.getItem('ge_active_set');
        if (active) {
          var data = JSON.parse(active);
          if (data && data.words && data.words.length >= 2) {
            gameState.questionList = convertSetForDinleme(data.words);
            updateUI(); loadQuestion(); return;
          }
        }
      } catch(e) {}
      gameState.questionList = [...(fallbackDatabase[level] || fallbackDatabase['easy'])];
      updateUI(); loadQuestion();
    }

    function loadQuestion() {
      if (gameState.currentQuestionIndex >= gameState.questionList.length) {
        showCompletion(); return;
      }
      const question = gameState.questionList[gameState.currentQuestionIndex];
      gameState.selectedAnswer = null;
      gameState.isAnswered = false;

      let options = [...question.options].sort(() => Math.random() - 0.5);
      const grid = document.getElementById('optionsGrid');
      grid.innerHTML = '';
      options.forEach(function(option) {
        var card = document.createElement('div');
        card.className = 'option-card';
        var txt = document.createElement('div');
        txt.className = 'option-text';
        txt.textContent = option;
        card.appendChild(txt);
        card.addEventListener('click', function() { selectAnswer(card, option); });
        grid.appendChild(card);
      });
      updateProgress();
      // Otomatik seslendir
      setTimeout(function() { if (typeof playAudio === 'function') playAudio(); }, 300);
    }

    function selectAnswer(element, answer) {
      if (gameState.isAnswered) return;

      document.querySelectorAll('.option-card').forEach(card => card.classList.remove('selected'));
      element.classList.add('selected');
      gameState.selectedAnswer = answer;
      submitAnswer();
    }

    function playAudio() {
      const question = gameState.questionList[gameState.currentQuestionIndex];
      const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(question.sentence)}&tl=en&client=tw-ob`;
      
      const audio = new Audio(url);
      audio.play().catch(err => {
        console.log('Audio playback error:', err);
        // Fallback to Web Speech API
        const utterance = new SpeechSynthesisUtterance(question.sentence);
        utterance.lang = 'en-US';
        utterance.rate = 0.85;
        utterance.pitch = 1.1;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      });
    }

    function submitAnswer() {
      if (gameState.isAnswered) return;

      const question = gameState.questionList[gameState.currentQuestionIndex];
      const isCorrect = gameState.selectedAnswer === question.sentence;

      gameState.isAnswered = true;

      if (isCorrect) {
        gameState.correct++;
        const points = gameState.difficulty === 'easy' ? 10 : gameState.difficulty === 'medium' ? 20 : 30;
        gameState.score += points;
        showResult(true, points);
        // Doğru cevapı vurgula
        document.querySelectorAll('.option-card').forEach(card => {
          if (card.querySelector('.option-text').textContent === question.sentence) {
            card.classList.add('correct');
          }
        });
      } else {
        gameState.wrong++;
        showResult(false, 0);
        // Doğru cevapı göster
        document.querySelectorAll('.option-card').forEach(card => {
          if (card.querySelector('.option-text').textContent === question.sentence) {
            card.classList.add('correct');
          } else if (card.classList.contains('selected')) {
            card.classList.add('wrong');
          }
        });
      }

      updateUI();
    }

    function showResult(isCorrect, points) {
      const modal = document.getElementById('resultModal');
      const icon = document.getElementById('resultIcon');
      const title = document.getElementById('resultTitle');
      const text = document.getElementById('resultText');
      const pointsElem = document.getElementById('pointsEarned');

      if (isCorrect) {
        icon.textContent = '✅';
        title.textContent = 'Harika!';
        text.textContent = 'Doğru cevap!';
        pointsElem.textContent = points;
      } else {
        icon.textContent = '❌';
        title.textContent = 'Yanlış!';
        text.textContent = `Doğru cevap: ${gameState.questionList[gameState.currentQuestionIndex].sentence}`;
        pointsElem.textContent = '0';
      }

      modal.classList.add('active');
    }

    function nextQuestion() {
      document.getElementById('resultModal').classList.remove('active');
      gameState.currentQuestionIndex++;
      loadQuestion();
    }

    function skipQuestion() {
      nextQuestion();
    }

    function resetGame() {
      const _m = document.getElementById('resultModal');
      if (_m) { _m.style.display = 'none'; _m.classList.remove('show'); }
            
      // English Coach'tan aktarılan set varsa yükle
      (function() {
        try {
          var imp = localStorage.getItem('ge_active_set');
          if (imp && window.location.search.indexOf('mode=imported') > -1) {
            var data = JSON.parse(imp);
            if (data && data.words && data.words.length >= 2) {
              // words formatını oyun formatına çevir
              var converted = data.words.map(function(w, i) {
                return { word: (w.en||'').toUpperCase(), label: w.en||'', image: '📖', tr: w.tr||'', answer: w.en||'' };
              });
              fallbackDatabase['easy'] = converted;
              fallbackDatabase['medium'] = converted;
              fallbackDatabase['hard'] = converted;
              // Banner göster
              var banner = document.createElement('div');
              banner.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 14px rgba(240,83,240,.4)';
              banner.textContent = '🎮 ' + (data.setName||'Set') + ' yüklendi! (' + data.words.length + ' kelime)';
              document.body.appendChild(banner);
              setTimeout(function(){ banner.remove(); }, 3000);
            }
          }
        } catch(e) {}
      })();
      gameState.questionList = [...(fallbackDatabase[gameState.difficulty] || fallbackDatabase['easy'])];
      gameState.currentWordIndex = 0;
      gameState.score = 0;
      gameState.correct = 0;
      gameState.wrong = 0;
      // Completion modal'ı kapat
      const modal = document.getElementById('completionModal') || document.querySelector('.completion-modal') || document.querySelector('[id*="modal"]') || document.querySelector('[id*="completion"]');
      if (modal) modal.style.display = 'none';
      loadWord();
    }

    function showCompletion() {
      const modal = document.getElementById('resultModal');
      const icon = document.getElementById('resultIcon');
      const title = document.getElementById('resultTitle');
      const text = document.getElementById('resultText');

      icon.textContent = '🏆';
      title.textContent = 'Tebrikler!';
      text.textContent = `${gameState.score} puan kazandın! Doğru: ${gameState.correct}, Yanlış: ${gameState.wrong}`;

      const btn = document.querySelector('#resultModal .btn-primary');
      btn.textContent = 'Yeniden Başla';
      btn.onclick = resetGame;
      // Başka oyunlar oyna butonu
      var otherGamesBtn = document.createElement('button');
      otherGamesBtn.className = 'btn-secondary-games';
      otherGamesBtn.textContent = '🎮 Başka Oyunlar Oyna';
      otherGamesBtn.onclick = function() { history.back(); };
      btn.parentNode.insertBefore(otherGamesBtn, btn.nextSibling);


      modal.classList.add('active');
    }

    function updateUI() {
      document.getElementById('score').textContent = gameState.score;
      document.getElementById('correct').textContent = gameState.correct;
      document.getElementById('wrong').textContent = gameState.wrong;
    }

    function updateProgress() {
      const total = gameState.questionList.length;
      const progress = ((gameState.currentQuestionIndex + 1) / total) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
    }

    init();
  

// ── Quizlet Set Converter: Dinleme Dedektifi ──────────────────
function convertSetForDinleme(words) {
  return words.map(function(w, i) {
    var others = words.filter(function(x, j) { return j !== i; })
                      .sort(function() { return Math.random()-0.5; }).slice(0, 3);
    var correct = w.en || '';
    var wrongOptions = others.map(function(x) { return x.en || ''; })
                             .filter(function(x) { return x !== correct; }).slice(0, 3);
    while (wrongOptions.length < 3) { wrongOptions.push('???'); }
    var options = [correct].concat(wrongOptions).sort(function() { return Math.random()-0.5; });
    return { sentence: correct, tr: w.tr || '', options: options };
  });
}


function showImportBanner(setName, wordCount) {
  var existing = document.getElementById('importBanner');
  if (existing) existing.remove();
  var banner = document.createElement('div');
  banner.id = 'importBanner';
  banner.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);'
    + 'background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;padding:10px 20px;'
    + 'border-radius:99px;font-size:13px;font-weight:700;z-index:9999;'
    + 'box-shadow:0 4px 14px rgba(240,83,240,.4);white-space:nowrap;pointer-events:none';
  banner.textContent = '🎮 ' + (setName || 'Set') + ' yüklendi (' + wordCount + ' kelime)';
  document.body.appendChild(banner);
  setTimeout(function() { if (banner.parentNode) banner.remove(); }, 3000);
}
